# TYPE  DATABASE        USER            ADDRESS                 METHOD

# 컨테이너 내부 로컬 접속 (초기화 스크립트, 헬스체크 등)
local   all             all                                     trust
host    all             all             127.0.0.1/32            scram-sha-256
host    all             all             ::1/128                 scram-sha-256

# 127.0.0.1로 들어온 접속도 Docker NAT를 거치면 브리지 게이트웨이 IP로 보임
# (호스트 자신에서 포트로 접속한 트래픽만 이렇게 보이므로 외부에서 위조 불가)
host    all             all             172.16.0.0/12           scram-sha-256

# 허용된 원격 호스트만 비밀번호 인증으로 접속 가능
host    all             all             192.168.0.13/32         scram-sha-256

# DATA 레이어(vmbr2) — 로컬 개발이 SSH 터널로 10.10.20.10 경유해 접속
host    all             all             10.10.20.10/32          scram-sha-256

# APP 레이어(vmbr1) — 프로덕션 백엔드 FE+BE 서버(프록스목스 104)
host    all             all             10.10.10.30/32          scram-sha-256

# 그 외 모든 원격 접속 거부
