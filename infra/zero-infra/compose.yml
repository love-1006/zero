name: zero-infra

services:
  minio:
    image: minio/minio:latest
    container_name: zero-minio
    restart: unless-stopped
    command: server /data --console-address ":9001"
    environment:
      MINIO_ROOT_USER: ${MINIO_ROOT_USER:?MINIO_ROOT_USER is required}
      MINIO_ROOT_PASSWORD: ${MINIO_ROOT_PASSWORD:?MINIO_ROOT_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "10.10.20.10:9000:9000"
      - "127.0.0.1:9001:9001"
    volumes:
      - minio-data:/data
    networks:
      - backend
    mem_limit: 2g

  mongodb:
    image: mongo:8.0
    container_name: zero-mongodb
    restart: unless-stopped
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_INITDB_ROOT_USERNAME:?MONGO_INITDB_ROOT_USERNAME is required}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_INITDB_ROOT_PASSWORD:?MONGO_INITDB_ROOT_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "10.10.20.10:27017:27017"
    volumes:
      - mongodb-data:/data/db
    networks:
      - backend
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "mongosh --quiet --username \"$${MONGO_INITDB_ROOT_USERNAME}\" --password \"$${MONGO_INITDB_ROOT_PASSWORD}\" --authenticationDatabase admin --eval 'quit(db.adminCommand({ ping: 1 }).ok ? 0 : 2)'"]
      interval: 10s
      timeout: 10s
      retries: 10
      start_period: 30s

  redis:
    image: redis:7.4-alpine
    container_name: zero-redis
    restart: unless-stopped
    environment:
      REDIS_PASSWORD: ${REDIS_PASSWORD:?REDIS_PASSWORD is required}
      TZ: ${TZ:-Asia/Seoul}
    command:
      - sh
      - -c
      - exec redis-server --appendonly yes --maxmemory 768mb --maxmemory-policy noeviction --requirepass "$$REDIS_PASSWORD"
    ports:
      - "10.10.20.10:6379:6379"
    volumes:
      - redis-data:/data
    networks:
      - backend
    mem_limit: 1g
    healthcheck:
      test: ["CMD-SHELL", "REDISCLI_AUTH=\"$${REDIS_PASSWORD}\" redis-cli ping | grep -q PONG"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

  pgbackrest-minio-tls:
    image: nginx@sha256:97d490c12ba55b4946b01546d1c3ed324e8d41ab1c9fcb2a616aa470620e5b46
    container_name: zero-pgbackrest-minio-tls
    restart: unless-stopped
    volumes:
      - ./config/pgbackrest-tls/nginx.conf:/etc/nginx/conf.d/default.conf:ro
      - ./config/pgbackrest-tls/certs:/etc/nginx/certs:ro
    networks:
      - backend

  pg-vector:
    image: zero-infra/pg-vector-pgbackrest:pg17-20260719
    container_name: zero-pg-vector
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${VECTOR_DB_USER:-vector_admin}
      POSTGRES_PASSWORD: ${VECTOR_DB_PASSWORD:?VECTOR_DB_PASSWORD is required}
      POSTGRES_DB: ${VECTOR_DB_NAME:-product_vectors}
      TZ: ${TZ:-Asia/Seoul}
    ports:
      # 로컬 개발 SSH 터널용 + DATA 레이어(백엔드/파이프라인) 접속용 이중 바인딩
      - "127.0.0.1:${VECTOR_DB_PORT:-5432}:5432"
      - "10.10.20.10:${VECTOR_DB_PORT:-5432}:5432"
    volumes:
      - pg-vector-data:/var/lib/postgresql/data
      - ./config/postgresql/init:/docker-entrypoint-initdb.d:ro
      - ./config/postgresql/pg_hba.conf:/etc/postgresql-custom/pg_hba.conf:ro
      - ./config/pgbackrest/pgbackrest.conf:/etc/pgbackrest/pgbackrest.conf:ro
      - pgbackrest-spool:/var/spool/pgbackrest
    command:
      - postgres
      - -c
      - hba_file=/etc/postgresql-custom/pg_hba.conf
      - -c
      - archive_mode=on
      - -c
      - wal_level=replica
      - -c
      - archive_command=pgbackrest --stanza=pgvector --config=/etc/pgbackrest/pgbackrest.conf archive-push %p
      - -c
      - archive_timeout=240
    networks:
      - backend
    mem_limit: 2g
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${VECTOR_DB_USER:-vector_admin} -d ${VECTOR_DB_NAME:-product_vectors}"]
      interval: 10s
      timeout: 5s
      retries: 5

  kafka:
    image: apache/kafka:3.8.0
    container_name: zero-kafka
    restart: unless-stopped
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      # 리스너 분리: INTERNAL(도커망 컨테이너 간) + EXTERNAL(서버 내부망) + LOCAL(로컬 SSH터널) + CONTROLLER
      KAFKA_LISTENERS: INTERNAL://:29092,EXTERNAL://:9092,LOCAL://:19092,CONTROLLER://:9093
      # 접속 경로별 광고 — 도커망은 컨테이너명 kafka:29092, 서버내부망은 10.10.20.10:9092,
      # 로컬터널은 localhost:19092. (INTERNAL을 localhost로 하면 다른 컨테이너가 자기 자신으로 오인)
      KAFKA_ADVERTISED_LISTENERS: INTERNAL://kafka:29092,EXTERNAL://10.10.20.10:9092,LOCAL://localhost:19092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,INTERNAL:PLAINTEXT,EXTERNAL:PLAINTEXT,LOCAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: INTERNAL
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_LOG_RETENTION_HOURS: 168
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      TZ: ${TZ:-Asia/Seoul}
    ports:
      - "10.10.20.10:9092:9092"      # EXTERNAL — 서버 내부망/백엔드
      - "10.10.20.10:19092:19092"    # LOCAL — 로컬 SSH 터널(-L 19092:10.10.20.10:19092)
    volumes:
      - kafka-data:/var/lib/kafka/data
    networks:
      - backend
    mem_limit: 2g

  kafka-ui:
    image: provectuslabs/kafka-ui:latest
    container_name: zero-kafka-ui
    depends_on:
      - kafka
    ports:
      # 호스트 8080은 cadvisor가 선점 → 8081 사용.
      - "10.10.20.10:8081:8080"     # 내부망(DATA 레이어)
      - "192.168.0.54:8081:8080"    # 사설 LAN — 브라우저 직접 접속(신뢰망 한정, 인증 없음)
    environment:
      KAFKA_CLUSTERS_0_NAME: zero
      KAFKA_CLUSTERS_0_BOOTSTRAPSERVERS: kafka:29092   # INTERNAL 리스너
      DYNAMIC_CONFIG_ENABLED: "true"
    networks:
      - backend   # kafka와 같은 도커망이어야 kafka:29092(INTERNAL)로 연결됨
    restart: unless-stopped

  # --- 레시피 파이프라인 앱 (자립형, build context = ./kafka) ---
  producer:
    build:
      context: ./kafka
      dockerfile: producer/Dockerfile
    container_name: zero-recipe-producer
    env_file: .env
    environment:
      # 컨테이너 간 통신은 도커망 내부 리스너로. (Kafka INTERNAL/advertised 설정과 §검증에서 확정)
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP:-kafka:29092}
      TZ: ${TZ:-Asia/Seoul}   # 로그 타임스탬프 KST (시각 계산은 코드가 UTC로 처리하므로 무관)
    depends_on: [kafka, pg-vector, redis]
    networks:
      - backend
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro   # Bedrock 자격증명(non-root 유저 app의 홈)
    # 주기 실행 배치. 상시 데몬 아님 → cron이 `docker compose run --rm producer`로 호출.
    # (compose up 시 1회 돌고 종료. restart 없음.)
    restart: "no"

  consumer:
    build:
      context: ./kafka
      dockerfile: consumer/Dockerfile
    container_name: zero-recipe-consumer
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP:-kafka:29092}
      TZ: ${TZ:-Asia/Seoul}
    depends_on: [kafka, pg-vector]
    networks:
      - backend
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
    restart: unless-stopped

  thumbnail:
    build:
      context: ./kafka
      dockerfile: thumbnail/Dockerfile
    container_name: zero-recipe-thumbnail
    env_file: .env
    environment:
      KAFKA_BOOTSTRAP_SERVERS: ${KAFKA_INTERNAL_BOOTSTRAP:-kafka:29092}
      TZ: ${TZ:-Asia/Seoul}
    depends_on: [kafka, pg-vector]
    networks:
      - backend
    volumes:
      - ${HOME}/.aws:/home/app/.aws:ro
      # 호스트(서버) 실제 경로 : 컨테이너 내부 경로. 컨테이너는 /data/thumbnails로 쓰고
      # 실제 파일은 서버 /opt/zero-infra/data/thumbnails 에 저장된다.
      # ⚠️ non-root 유저(uid 10001)가 쓸 수 있게 호스트 폴더 권한 필요(README 참고).
      - /opt/zero-infra/data/thumbnails:/data/thumbnails
    restart: unless-stopped

networks:
  backend:
    name: zero-infra-backend
    driver: bridge

volumes:
  minio-data:
    name: zero-infra-minio-data
  mongodb-data:
    name: zero-infra-mongodb-data
  redis-data:
    name: zero-infra-redis-data
  # 기존 pg 데이터 볼륨을 그대로 재사용(데이터 보존). 서버의 실제 볼륨명과 일치해야 함.
  pg-vector-data:
    name: zero_pg_vector_data
    external: true
  pgbackrest-spool:
    name: zero-infra-pgbackrest-spool
  kafka-data:
    name: zero-infra-kafka-data
