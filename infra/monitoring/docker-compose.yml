# 모든 컨테이너에 로그 로테이션을 강제한다(Docker 공식 json-file 로그 드라이버 옵션).
# 기본값(max-size unlimited)으로 두면 로그가 무제한으로 쌓여 호스트 디스크를 채울 수 있어서,
# 컨테이너당 최대 10MB x 3개(총 30MB)로 제한한다. YAML 앵커로 모든 서비스에 동일 적용.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  # 2026-07-19, well-architected 체크리스트 재점검 중 발견 - 이 스택 전체에
  # healthcheck/리소스 제한이 하나도 없었다(docker ps로 실측 확인). 헬스체크는
  # 각 도구 공식 문서에 명시된 엔드포인트 그대로 사용(추측 없음):
  # Prometheus /-/healthy(공식 Management API 문서), Loki/Tempo /ready(공식
  # HTTP API 문서), Grafana /api/health(공식 HTTP API 문서). 각 이미지에 실제로
  # wget이 있는지도 docker exec으로 먼저 확인 후 반영(prometheus/loki/tempo/
  # blackbox-exporter는 busybox wget, grafana는 GNU wget - 전부 --spider 지원).
  # 리소스 제한은 docker stats 실측치(각 50~100MiB대) 대비 3~5배 여유를 둔 값.
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
      # 2026-07-20, 8개 backend 서비스가 /metrics를 전혀 노출 안 하고 있는 걸
      # 실측(curl 전부 404)으로 확인 - 앱 RED 지표(요청량/에러율/응답시간)가
      # 하나도 안 보이는 상태였음. 공식문서(opentelemetry.io/docs/languages/
      # python/exporters) 확인 결과 "Prometheus OTLP Receiver를 켜고 OTLP
      # exporter를 쓰는 것"이 Best Practice로 명시돼 있어 이 방식으로 채택 -
      # 재헌님 계측 완료되면 이 플래그가 있어야 Prometheus가 직접 받는다.
      - "--web.enable-otlp-receiver"
      # 2026-07-19, 실무 기준 재점검 - retention을 암묵적 기본값(15d)에 의존
      # 중이었다. 공식 문서(prometheus.io/docs storage) 권장대로 명시 - 값은
      # 기존 기본값과 동일하게 유지(동작 안 바뀜, "우연히 15일"에서 "의도적
      # 으로 15일"로만 바꿈). retention.size는 안전 마진 - 실측 TSDB 크기
      # 494MB(15일치) 대비 4배, 디스크 여유 58GB 대비 충분히 작은 값으로
      # 급격한 메트릭 증가 시 디스크 고갈을 막는 방어선.
      - "--storage.tsdb.retention.time=15d"
      - "--storage.tsdb.retention.size=2GB"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9090/-/healthy"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 512m
    cpus: 1.0
    logging: *default-logging
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.7
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yaml
    # 기본 번들 설정(local-config.yaml) 대신 커스텀 설정을 마운트한다 - 보존 기간(retention)을
    # 명시적으로 켜기 위함(데이터보존_백업_및_접근권한_관리_정책 문서 권장값, 336h/14일 적용).
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3100/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 512m
    cpus: 0.75
    logging: *default-logging
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
      # 2026-07-20, Alloy 제거하며 앱 트레이스 수신을 여기로 직접 이전.
      # tempo.yaml의 distributor.receivers.otlp가 이미 이 포트로 리슨 중이었으나
      # host port 미노출 상태였음(Alloy가 유일한 OTLP 진입점이었음) - OTel 공식
      # 문서(opentelemetry.io/docs/collector) 확인 결과 Collector는 필수가 아니고
      # "소규모/시작 단계엔 직접 전송이 권장"이라 명시돼 있고, Tempo 자체가 OTLP를
      # 네이티브로 수신하므로(공식 configuration 문서 확인) 중계 없이 바로 연결한다.
      - "4317:4317" # OTLP gRPC
      - "4318:4318" # OTLP HTTP
    networks:
      default:
        ipv4_address: 172.18.0.10 # memberlist advertise_addr 고정용
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3200/ready"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

  # 2026-07-19, well-architected 체크리스트 Observability-3("Kafka 모니터링
  # (Consumer Lag 등) 수집") 재점검 중 발견 - dangdang-p0-alerts.yml에
  # dangdang_kafka_consumer_lag 참조 알림 규칙은 있는데, 그 메트릭을 실제로
  # 수집하는 exporter가 Prometheus scrape_configs 어디에도 없어서 계속
  # NoData였다. 공식 문서(github.com/danielqsj/kafka_exporter) 기준 표준
  # Kafka Exporter를 신규 배포 - Kafka 브로커(10.10.20.10:9092, EXTERNAL
  # 리스너, 도달 확인함)에 컨슈머로 접속해 offset/lag을 직접 수집한다.
  # exporter 자체는 Kafka와 물리적으로 같은 VM에 있을 필요 없음(공식 문서
  # 확인) - monitoring VM에 두면 이 스택의 다른 exporter들과 운영 방식이
  # 통일된다.
  kafka-exporter:
    image: danielqsj/kafka-exporter:v1.9.0
    container_name: kafka-exporter
    command:
      - "--kafka.server=10.10.20.10:9092"
    ports:
      - "9308:9308"
    mem_limit: 128m
    cpus: 0.25
    logging: *default-logging
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    container_name: blackbox-exporter
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    # blackbox_exporter는 공식 문서상 전용 헬스 엔드포인트가 없다(README 확인 -
    # /probe와 /metrics만 문서화됨) - 표준 Prometheus exporter 패턴대로 /metrics로
    # 대체(프로세스가 응답 가능한 상태인지는 이걸로 충분히 검증됨).
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:9115/metrics"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 128m
    cpus: 0.25
    logging: *default-logging
    restart: unless-stopped

  # 2026-07-20, Alloy 서비스 제거함. config.alloy 확인 결과 이 인스턴스는
  # OTLP 수신 → Prometheus remote_write/Loki push/Tempo OTLP로 중계하는
  # 역할뿐이었고(자체 노드/컨테이너 스크레이핑 없음), 24시간치 로그 확인 결과
  # 실제로 앱에서 들어온 OTLP 트래픽이 0건이라 안전하게 제거. 앱 트레이스/로그는
  # 이제 Tempo(4317/4318)·Loki(3100, /otlp)로 직접 전송한다(멘토 피드백 + OTel/
  # Tempo/Loki 공식문서 검증 결과 - Collector 계층 없이 SDK→백엔드 직결이 공식
  # 지원 경로임). 인프라(node_exporter/cAdvisor)는 애초에 Alloy를 거친 적이
  # 없었으므로(Prometheus가 직접 scrape) 이 제거는 앱 트레이스/로그 경로에만
  # 영향을 준다.

  # 2026-07-19, well-architected 체크리스트 Observability-4("cAdvisor와 Node
  # Exporter를 사용해 개별 도커 컨테이너 레벨의 리소스 점유율") 재점검 중 발견 -
  # node_exporter(호스트별 systemd 서비스, prometheus.yml의 harbor-vm/db-vm/
  # monitoring-vm job)만 있고 컨테이너 레벨 지표(cAdvisor)가 아예 없었다.
  # 공식 문서(github.com/google/cadvisor docs/running.md) 기준 구성 - v0.53.0
  # 이후 이미지 위치가 gcr.io/cadvisor/cadvisor에서 ghcr.io/google/cadvisor로
  # 이전됐다(공식 문서 확인). 컨테이너별 CPU/MEM/블록I/O를 읽으려면 호스트의
  # cgroup/docker 소켓 접근이 구조적으로 필요해서 privileged + 아래 볼륨들이
  # 전부 공식 문서에 명시된 필수 마운트다(추측 아님, README 그대로).
  cadvisor:
    image: ghcr.io/google/cadvisor:v0.60.5
    container_name: cadvisor
    privileged: true
    volumes:
      - /:/rootfs:ro
      - /var/run:/var/run:rw
      - /sys:/sys:ro
      - /var/lib/docker/:/var/lib/docker:ro
      - /dev/disk/:/dev/disk:ro
    ports:
      - "8080:8080"
    # cAdvisor 공식 문서에는 전용 헬스 엔드포인트가 문서화되어 있지 않지만
    # (UI 루트 "/"만 안내), 배포 후 docker exec으로 확인해보니 이 이미지엔
    # wget이 있다(다른 도구들과 동일 패턴 적용 가능). /metrics가 실제로
    # 응답하는지로 헬스를 검증한다.
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:8080/metrics"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.1
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      # 대시보드는 코드로 관리(2026-07-17) - 실제로 마운트해서 적용, 16패널 그대로 유지되고
      # provisioned:true로 정상 전환된 것까지 확인함.
      - ./config/grafana-dashboards-provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./dashboards/zerocheck-overview.json:/etc/grafana/provisioning/dashboards/zerocheck/zerocheck-overview.json:ro
      # 알람 규칙(config/grafana-alerting/)은 의도적으로 마운트 안 함 - 지금 살아있는 9개
      # 알람이 API/UI로 만들어져서 provenance가 "api"인데, 파일 프로비저닝을 그대로 마운트하면
      # Grafana가 "cannot change provenance from 'api' to 'file'"로 거부하며 컨테이너가
      # 크래시루프에 빠짐(실제로 겪음, 즉시 롤백해서 복구함). 기존 규칙을 지웠다가 파일로
      # 재생성하면 되지만 그 사이 알람이 잠깐 비는 위험이 있어서, 지금은 강행하지 않기로
      # 판단함 - config/grafana-alerting/*.json은 "VM을 처음부터 재구축할 때 쓰는 재해복구
      # 소스"로만 쓰고, 지금 운영 중인 알람은 계속 UI/API로 관리한다. 실시간 전환이 필요해지면
      # 저트래픽 시간대에 계획적으로: (1) UI에서 9개 규칙 삭제 (2) 이 줄 주석 해제
      # (3) docker compose up -d grafana 순서로 진행.
      # - ./config/grafana-alerting:/etc/grafana/provisioning/alerting:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # 알림에 포함되는 쿼리/Silence 링크가 노트북에서도 열리도록 Tailscale IP 기준으로 설정
      GF_SERVER_ROOT_URL: http://100.110.81.51:3000/
      GF_PUBLIC_DASHBOARDS_ENABLED: "false"
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://localhost:3000/api/health"]
      interval: 30s
      timeout: 5s
      start_period: 15s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

  # 2026-07-20, 설계도(docker 탭)의 🟠 "컨테이너 로그 (Alloy -> Loki)" 레이어 구현.
  # 오늘 제거한 Alloy(OTLP 중계용)와 역할이 완전히 다름 - 이건 로그수집 전용이다.
  # 앱 텔레메트리는 여전히 Tempo/Loki/Prometheus로 직접 전송하고, 이 Alloy는 OTel이
  # 물리적으로 못 하는 일(기성 컨테이너 stdout tail -> Loki)만 한다. config.alloy의
  # discovery.docker/discovery.relabel/loki.source.docker/loki.write는 전부 공식문서
  # (grafana.com/docs/alloy .../loki.source.docker 등) 문법 그대로. docker.sock은
  # 읽기전용 마운트(컨테이너 목록/로그 읽기 전용, 제어 불가). 우선 monitoring VM만
  # 파일럿 - 검증 후 production/harbor/db로 vm 라벨 바꿔 확장.
  alloy:
    image: grafana/alloy:v1.17.1
    container_name: alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - --storage.path=/var/lib/alloy/data
      - /etc/alloy/config.alloy
    volumes:
      - ./config/config.alloy:/etc/alloy/config.alloy:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
      - alloy_data:/var/lib/alloy/data
    ports:
      - "12345:12345" # Alloy UI/디버그
    depends_on:
      - loki
    mem_limit: 256m
    cpus: 0.5
    logging: *default-logging
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
  alloy_data:

# 2026-07-20, tempo의 memberlist가 컨테이너 시작 시점에 자기 IP 자동탐지에
# 반복 실패("no private IP address found") - 원래 compose가 암묵적으로 만드는
# default 네트워크는 IP가 매 recreate마다 바뀌어 advertise_addr(공식문서상
# 리터럴 IP만 허용, 호스트명 파싱 불가 - 실측 확인)에 고정값을 못 씀. subnet을
# 기존 값(172.18.0.0/16, 기존 default 네트워크와 동일)으로 명시해 tempo에만
# 고정 IP를 부여한다.
networks:
  default:
    ipam:
      config:
        - subnet: 172.18.0.0/16
