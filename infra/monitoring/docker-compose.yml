# 모든 컨테이너에 로그 로테이션을 강제한다(Docker 공식 json-file 로그 드라이버 옵션).
# 기본값(max-size unlimited)으로 두면 로그가 무제한으로 쌓여 호스트 디스크를 채울 수 있어서,
# 컨테이너당 최대 10MB x 3개(총 30MB)로 제한한다. YAML 앵커로 모든 서비스에 동일 적용.
x-logging: &default-logging
  driver: json-file
  options:
    max-size: "10m"
    max-file: "3"

services:
  prometheus:
    image: prom/prometheus:v3.5.0
    container_name: prometheus
    command:
      - "--config.file=/etc/prometheus/prometheus.yml"
      - "--storage.tsdb.path=/prometheus"
      - "--web.enable-remote-write-receiver"
    volumes:
      - ./config/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - prometheus_data:/prometheus
    ports:
      - "9090:9090"
    logging: *default-logging
    restart: unless-stopped

  loki:
    image: grafana/loki:3.5.7
    container_name: loki
    command: -config.file=/etc/loki/loki-config.yaml
    # 기본 번들 설정(local-config.yaml) 대신 커스텀 설정을 마운트한다 - 보존 기간(retention)을
    # 명시적으로 켜기 위함(데이터보존_백업_및_접근권한_관리_정책 문서 권장값, 336h/14일 적용).
    volumes:
      - ./config/loki-config.yaml:/etc/loki/loki-config.yaml:ro
      - loki_data:/loki
    ports:
      - "3100:3100"
    logging: *default-logging
    restart: unless-stopped

  tempo:
    image: grafana/tempo:2.9.0
    container_name: tempo
    command: -config.file=/etc/tempo.yaml
    volumes:
      - ./config/tempo.yaml:/etc/tempo.yaml:ro
      - tempo_data:/var/tempo
    ports:
      - "3200:3200"
    logging: *default-logging
    restart: unless-stopped

  blackbox-exporter:
    image: prom/blackbox-exporter:v0.26.0
    container_name: blackbox-exporter
    volumes:
      - ./config/blackbox.yml:/etc/blackbox_exporter/config.yml:ro
    ports:
      - "9115:9115"
    logging: *default-logging
    restart: unless-stopped

  alloy:
    image: grafana/alloy:v1.17.1
    container_name: alloy
    command:
      - run
      - --server.http.listen-addr=0.0.0.0:12345
      - /etc/alloy/config.alloy
    volumes:
      - ./config/config.alloy:/etc/alloy/config.alloy:ro
    ports:
      - "4317:4317" # OTLP gRPC - 앱이 여기로 로그/메트릭/트레이스 전송
      - "4318:4318" # OTLP HTTP
      - "12345:12345" # Alloy UI/디버그
    depends_on:
      - tempo
      - loki
      - prometheus
    logging: *default-logging
    restart: unless-stopped

  grafana:
    image: grafana/grafana:12.2.1
    container_name: grafana
    volumes:
      - grafana_data:/var/lib/grafana
      - ./config/grafana-datasources.yaml:/etc/grafana/provisioning/datasources/datasources.yaml:ro
      # 대시보드는 코드로 관리(2026-07-17) - 실제로 마운트해서 적용, 16패널 그대로 유지되고
      # provisioned:true로 정상 전환된 것까지 확인함.
      - ./config/grafana-dashboards-provisioning.yaml:/etc/grafana/provisioning/dashboards/dashboards.yaml:ro
      - ./dashboards/zerocheck-overview.json:/etc/grafana/provisioning/dashboards/zerocheck/zerocheck-overview.json:ro
      # 알람 규칙(config/grafana-alerting/)은 의도적으로 마운트 안 함 - 지금 살아있는 9개
      # 알람이 API/UI로 만들어져서 provenance가 "api"인데, 파일 프로비저닝을 그대로 마운트하면
      # Grafana가 "cannot change provenance from 'api' to 'file'"로 거부하며 컨테이너가
      # 크래시루프에 빠짐(실제로 겪음, 즉시 롤백해서 복구함). 기존 규칙을 지웠다가 파일로
      # 재생성하면 되지만 그 사이 알람이 잠깐 비는 위험이 있어서, 지금은 강행하지 않기로
      # 판단함 - config/grafana-alerting/*.json은 "VM을 처음부터 재구축할 때 쓰는 재해복구
      # 소스"로만 쓰고, 지금 운영 중인 알람은 계속 UI/API로 관리한다. 실시간 전환이 필요해지면
      # 저트래픽 시간대에 계획적으로: (1) UI에서 9개 규칙 삭제 (2) 이 줄 주석 해제
      # (3) docker compose up -d grafana 순서로 진행.
      # - ./config/grafana-alerting:/etc/grafana/provisioning/alerting:ro
    environment:
      GF_SECURITY_ADMIN_PASSWORD: ${GRAFANA_ADMIN_PASSWORD}
      # 알림에 포함되는 쿼리/Silence 링크가 노트북에서도 열리도록 Tailscale IP 기준으로 설정
      GF_SERVER_ROOT_URL: http://100.110.81.51:3000/
    ports:
      - "3000:3000"
    depends_on:
      - prometheus
      - loki
      - tempo
    logging: *default-logging
    restart: unless-stopped

volumes:
  prometheus_data:
  loki_data:
  tempo_data:
  grafana_data:
