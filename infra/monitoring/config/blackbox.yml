modules:
  http_2xx:
    prober: http
    timeout: 5s
    http:
      preferred_ip_protocol: ip4
      valid_status_codes: []
      method: GET

  # Harbor 등 자체 서명(self-signed) 인증서를 쓰는 내부 서비스용 - TLS 검증 생략
  http_2xx_insecure:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: []
      method: GET
      tls_config:
        insecure_skip_verify: true

  # Harbor 공식 헬스체크 API(GET /api/v2.0/health) 전용 - 상태코드 200만 보는 게 아니라
  # 응답 바디의 최상위 status 필드까지 검증한다. 실제 라이브 응답(2026-07-16 직접 확인)은
  # {"status":"healthy","components":[{"name":"core","status":"healthy"}, ...]} 형태이고,
  # Harbor 소스(src/pkg/health)의 오버롤 로직상 컴포넌트 하나라도 unhealthy면 최상위 status도
  # unhealthy로 내려간다. 다만 컴포넌트 장애 시에도 HTTP 자체는 200을 유지할 수 있는
  # 구조라(REST 헬스체크에서 흔한 패턴), 상태코드만 보면 컴포넌트 장애를 놓칠 수 있어 바디까지 본다.
  harbor_health_check:
    prober: http
    timeout: 5s
    http:
      valid_status_codes: []
      method: GET
      fail_if_body_not_matches_regexp:
        - '"status":"healthy"'
      tls_config:
        insecure_skip_verify: true
