global:
  scrape_interval: 15s

# BEGIN DANGDANG P0 RULES
rule_files:
  - /prometheus/dangdang-p0-alerts.yml
# END DANGDANG P0 RULES
scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: harbor-vm
    static_configs:
      - targets: ["192.168.0.53:9100"]

  # Harbor 자체 화이트박스 metrics(harbor-exporter, 2026-07-19 활성화) - blackbox의
  # harbor_health_check(외부 관점 접속 가능 여부)와는 다른 신호. 프로젝트별 artifact
  # 수, pull 횟수, quota 등 Harbor 내부 상태를 직접 노출한다.
  - job_name: harbor-metrics
    static_configs:
      - targets: ["192.168.0.53:9090"]

  - job_name: db-vm
    static_configs:
      - targets: ["192.168.0.54:9100"]

  - job_name: monitoring-vm
    static_configs:
      - targets: ["192.168.0.51:9100"]

  # 2026-07-20, production VM(pd VM)은 node_exporter가 아예 없었다(설계도
  # 문서에도 4개 VM 전부 있어야 한다고 명시돼 있었는데 실측 확인 결과 빠져
  # 있었음). apt로 신규 설치 후 추가 - 내부 App VLAN IP 사용(다른 3개는
  # 구 LAN IP를 쓰지만 production VM은 구 LAN에 없음, 10.10.10.30이 유일
  # 경로).
  - job_name: production-vm
    static_configs:
      - targets: ["10.10.10.30:9100"]

  # 2026-07-19, well-architected 체크리스트 Observability-4 - cAdvisor(컨테이너별
  # CPU/MEM/블록I/O). monitoring VM 자신은 같은 docker-compose 스택 안이라
  # 컨테이너명(cadvisor:8080)으로 접근, 기본 /metrics 경로 그대로 사용.
  - job_name: cadvisor-monitoring-vm
    static_configs:
      - targets: ["cadvisor:8080"]

  # harbor VM은 독립 스택(~/cadvisor/, Harbor 자체 compose와 분리)으로 배포.
  # 학원 LAN IP 대신 Tailscale IP 사용 - blackbox job과 동일한 이유(어디서든
  # 동일하게 재현 가능한 주소).
  - job_name: cadvisor-harbor-vm
    static_configs:
      - targets: ["100.96.79.73:8080"]

  # DB VM(10.10.20.10, Data 계층)과 production VM(10.10.10.30, App 계층)은
  # Tailscale에 조인돼 있지 않지만, monitoring VM에서 두 계층 모두로 직접
  # curl 도달이 실측 확인됐다(3계층 망분리 안에서도 모니터링 목적상 라우팅
  # 허용된 것으로 보임) - 그대로 내부 IP를 사용한다. production VM은
  # b-gateway가 이미 8080을 쓰고 있어서 cAdvisor를 8090으로 띄웠다.
  - job_name: cadvisor-db-vm
    static_configs:
      - targets: ["10.10.20.10:8080"]

  # 2026-07-19, well-architected 체크리스트 Observability-3 - kafka-exporter
  # (danielqsj/kafka_exporter)는 같은 docker-compose 스택 안이라 컨테이너명
  # (kafka-exporter:9308)으로 접근, 기본 /metrics 경로.
  - job_name: kafka-exporter
    static_configs:
      - targets: ["kafka-exporter:9308"]

  - job_name: cadvisor-production-vm
    static_configs:
      - targets: ["10.10.10.30:8090"]

  # Blackbox 모니터링 - 내부 지표(node_exporter)가 아니라 외부 관점에서 실제 접속 가능
  # 여부를 확인. HTTP 상태코드/응답시간/TLS 인증서 만료를 체크한다.
  # 대상은 학원 LAN(192.168.0.x)이 아니라 Tailscale IP로 지정한다 - LAN IP는 학원 네트워크
  # 안에서만 유효해서, 어디서든 동일하게 재현 가능한 Tailscale 주소를 쓰는 게 더 견고하다.
  #
  # 여기 job은 "우리 서비스 사용자가 실제로 겪는" 외부 가용성만 담는다(Grafana).
  # SonarQube는 사용자가 접속하는 대상이 아니라 CI 파이프라인이 의존하는 내부 도구라
  # 성격이 달라서 blackbox-http-ci-dependency job으로 분리했다(아래).
  #
  # ci_sandbox 앱(harbor VM :8080) 타겟은 2026-07-18 제거 - build-test.yml에서 ci_sandbox
  # 빌드/배포 파이프라인(build-test/image-scanning/deploy job) 자체를 없애면서 더 이상
  # 배포되지 않는 대상이라, 남겨두면 언젠가 컨테이너가 내려간 뒤 영구 Blackbox Probe
  # Failed 오탐이 발생한다.
  - job_name: blackbox-http
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://100.110.81.51:3000/login # Grafana (monitoring VM, Tailscale)
        labels:
          probe_name: "6. Grafana (모니터링 자체)"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # SonarQube는 사용자 대면 서비스가 아니라 code-scanning 단계가 의존하는 CI 인프라라,
  # "서비스 다운" 급 Critical이 아니라 "CI 파이프라인이 곧 막힐 수 있다" 정도로 성격이 다르다.
  # 별도 job으로 분리해 라벨(job=blackbox-http-ci-dependency)로 구분하고, 알림 규칙에서도
  # 사용자 대면 Black-box(Instance Down급)와 다르게 다룰 수 있게 한다.
  - job_name: blackbox-http-ci-dependency
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://100.96.79.73:9000 # SonarQube (harbor VM, Tailscale) - CI 의존성 헬스체크
        labels:
          probe_name: "5. SonarQube (CI 게이트)"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  - job_name: blackbox-http-insecure
    metrics_path: /probe
    params:
      module: [harbor_health_check]
    static_configs:
      - targets:
          # Harbor 공식 헬스체크 API - core/registry/portal/db/redis 등 내부 컴포넌트를
          # 개별 체크해준다. 루트 경로보다 CI가 실제 쓰는 Registry까지 포함해 더 정확하다.
          # harbor_health_check 모듈이 상태코드뿐 아니라 응답 바디의 status 필드까지 검증한다.
          - https://100.96.79.73/api/v2.0/health # Harbor (harbor VM, Tailscale, 자체 서명 인증서)
        labels:
          probe_name: "4. Harbor 레지스트리"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 2026-07-20, 사용자 접점(user-facing) 가용성 probe. SRE 관점의 블랙박스는
  # 사용자가 실제 접속하는 주소를 재야 한다(Google SRE Book ch.6). 실제 서비스
  # 접속 주소는 192.168.0.56:3001 - 구LAN NAT를 거쳐 production frontend
  # (10.10.10.30:3001, Next.js)로 포워딩되는 구조(2026-07-20 실측: 두 주소 모두
  # 동일 Next.js 응답). 처음엔 b-gateway(:8080) 루트를 진입점으로 추정해 달았다가
  # 실제 사용자 주소로 정정함. 주의: 구LAN 주소라 VLAN 전환 완료 시 접속 주소가
  # 바뀔 수 있음 - 그때 이 타겟도 따라 변경할 것.
  - job_name: blackbox-http-user-facing
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - https://zerodang.org/ # 최종 공개 도메인 (Cloudflare 경유, 2026-07-21 확정)
        labels:
          probe_name: "0. 공개 도메인 (zerodang.org)"
      - targets:
          - http://192.168.0.56:3001/ # 실제 사용자 접속 주소 (NAT -> production frontend)
        labels:
          probe_name: "1. 사용자 서비스 (NAT 경유)"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 앱 내부 관측점 2개 - 사용자 probe(위)와 조합해 장애 지점을 구분한다:
  # 사용자 X + frontend 직접 O => NAT 계층 문제(성애님 소관),
  # 사용자 X + frontend 직접 X => frontend 다운,
  # 사용자 O + gateway X => 페이지는 뜨지만 모든 API(/b/*) 죽음.
  - job_name: blackbox-http-app-internal
    metrics_path: /probe
    params:
      module: [http_2xx]
    static_configs:
      - targets:
          - http://10.10.10.30:3001/ # production frontend 직접 (Next.js)
        labels:
          probe_name: "2. Frontend 직접 (production)"
      - targets:
          - http://10.10.10.30:8080/ # production b-gateway (openresty, API 백본)
        labels:
          probe_name: "3. API 게이트웨이 (b-gateway)"
    relabel_configs:
      - source_labels: [__address__]
        target_label: __param_target
      - source_labels: [__param_target]
        target_label: instance
      - target_label: __address__
        replacement: blackbox-exporter:9115

  # 2026-07-21, 관측 스택 자기관측(철저감사에서 공백 발견) - discard율/인제스트율/
  # 컴팩션 등 내부 지표. 컨테이너명은 compose 네트워크 내부 DNS.
  - job_name: loki-self
    static_configs: [{targets: ["loki:3100"], labels: {vm: "monitoring-vm"}}]
  - job_name: tempo-self
    static_configs: [{targets: ["tempo:3200"], labels: {vm: "monitoring-vm"}}]
  - job_name: grafana-self
    static_configs: [{targets: ["grafana:3000"], labels: {vm: "monitoring-vm"}}]
