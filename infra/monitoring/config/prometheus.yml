global:
  scrape_interval: 15s

scrape_configs:
  - job_name: prometheus
    static_configs:
      - targets: ["localhost:9090"]

  - job_name: harbor-vm
    static_configs:
      - targets: ["192.168.0.53:9100"]

  - job_name: db-vm
    static_configs:
      - targets: ["192.168.0.54:9100"]

  - job_name: monitoring-vm
    static_configs:
      - targets: ["192.168.0.51:9100"]
