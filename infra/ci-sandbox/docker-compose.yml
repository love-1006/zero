services:
  ci-sandbox:
    image: harbor.hizero.local/dangdang/ci-sandbox:${IMAGE_TAG}
    container_name: ci-sandbox
    ports:
      - "8080:8000"
    restart: unless-stopped
    # 런타임 보안 (OWASP Docker Security Cheat Sheet RULE #3/#4/#7/#8)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100  # fork bomb 방지 (CIS Docker Benchmark 5.28)
