services:
  ci-sandbox:
    image: harbor.hizero.local/dangdang/ci-sandbox:${IMAGE_TAG}
    container_name: ci-sandbox
    ports:
      - "8080:8000"
    restart: unless-stopped
    # 런타임 보안 (OWASP Docker Security Cheat Sheet RULE #3/#4/#7/#8)
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    environment:
      - PYTHONDONTWRITEBYTECODE=1
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100  # fork bomb 방지 (CIS Docker Benchmark v1.8.0, 5.29)
    # 로그 로테이션 (Docker 공식 json-file 로그 드라이버 옵션) - 기본값(무제한)으로 두면
    # 호스트 디스크를 채울 수 있어 컨테이너당 최대 10MB x 3개로 제한한다.
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"
