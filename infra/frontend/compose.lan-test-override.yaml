# TEMPORARY - 실제 서비스 도메인/edge proxy가 아직 없어서, 그 전까지 LAN에서 직접
# 접속해 확인할 수 있도록 프론트 포트를 임시로 연다(2026-07-18, 지훈 지시).
# 성애님 frontend/compose.production.example.yaml 원본은 edge proxy 경유만
# 전제하므로(expose만 있고 ports 없음) 그 파일 자체는 건드리지 않고, 이 override
# 파일을 -f로 추가 지정해서만 포트를 연다.
#
# 도메인이 정해지고 edge proxy가 생기면: 이 파일을 삭제하고,
# frontend-deploy-production job에서 이 파일을 -f로 참조하는 부분을 제거할 것.
services:
  frontend:
    ports:
      - "3001:3000"
