pid /tmp/nginx.pid;

events {}

http {
    # non-root(uid 101) 실행 준비 - nginx 공식 문서(hub.docker.com/_/nginx
    # "Running as a Non-Root User") 패턴대로 쓰기 가능한 경로로 재지정. 격리된
    # 테스트 컨테이너(read_only + tmpfs /tmp)에서 실제로 기동 확인 완료
    # (2026-07-19) - master/worker 전부 non-root로 뜨고, 이 경로들이 문제없이
    # 자동 생성됨. 아직 production Dockerfile 전환 자체는 안 함(별도 승인 후).
    client_body_temp_path /tmp/client_temp;
    proxy_temp_path /tmp/proxy_temp;
    fastcgi_temp_path /tmp/fastcgi_temp;
    uwsgi_temp_path /tmp/uwsgi_temp;
    scgi_temp_path /tmp/scgi_temp;

    # Docker embedded DNS (127.0.0.11) - lets nginx re-resolve backend container
    # names at request time instead of once at startup. Needed now that upstreams
    # are container names (login-service etc.) instead of the fixed 127.0.0.1 the
    # old --network host config used, since a plain `upstream {}` block only
    # resolves hostnames once and would go stale after any backend redeploy.
    resolver 127.0.0.11 valid=10s;

    # 라이브 전환 중 실제로 겪은 버그(전부 500): proxy_pass가 "변수만"(경로 없이)일
    # 때는, static proxy_pass와 달리 rewrite ... break로 바뀐 URI를 자동으로
    # 안 붙여준다 - nginx 공식 문서(ngx_http_proxy_module) 확인. 그래서 아래처럼
    # 경로가 명시 안 된 곳들은 전부 $upstream$uri$is_args$args로 직접 붙여야 한다.

    server {
        listen 8080;

        location ~ ^/b/(social-access|administrator-login|administrator-signup|user|webhooks|api)(/.*)?$ {
            set $upstream http://login-service:8000;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location = /b/admin/me {
            set $upstream http://admin-service:8008;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location = /b/admin {
            content_by_lua_block {
                ngx.req.read_body()
                local data = ngx.req.get_body_data() or ""
                local menu = string.match(data, '"menu"%s*:%s*"([%w%-]+)"')
                local tag_menus = { ["create-tag"]=true, ["update-tag"]=true, ["deactivate-tag"]=true }
                ngx.req.set_uri("/admin")
                if menu and tag_menus[menu] then
                    return ngx.exec("@ingredients_admin")
                else
                    return ngx.exec("@product_admin")
                end
            }
        }
        location @product_admin {
            set $upstream http://product-service:8016;
            proxy_pass $upstream$uri$is_args$args;
        }
        location @ingredients_admin {
            set $upstream http://ingredients-service:8018;
            proxy_pass $upstream$uri$is_args$args;
        }

        location = /b/home/user-sugar-calorie {
            set $upstream http://diet-service:8020;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }
        location ~ ^/b/home(/.*)?$ {
            set $upstream http://main-service:8010;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location ~ ^/b/(search|product)(/.*)?$ {
            set $upstream http://product-service:8016;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location = /b/community/gam-list {
            set $upstream http://community-service:8012;
            proxy_pass $upstream/community/gam-list;
        }
        location ~ ^/b/community/gam-list/(.+)$ {
            set $upstream http://community-service:8012;
            proxy_pass $upstream/community/gam-list/$1;
        }
        location ~ ^/b/community/notice(/.*)?$ {
            set $upstream http://community-service:8012;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location = /b/ingredients/gam-list {
            set $upstream http://ingredients-service:8018;
            proxy_pass $upstream/community/gam-list;
        }
        location = /b/ingredients/gam-detail {
            set $upstream http://ingredients-service:8018;
            proxy_pass $upstream/community/gam-detail;
        }

        location ~ ^/b/recipes(/.*)?$ {
            set $upstream http://recipe-service:8014;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location ~ ^/b/diet(/.*)?$ {
            set $upstream http://diet-service:8020;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        # 식단 사진 업로드(diet-service가 MinIO diet-photos에 저장) — 기본
        # client_max_body_size(1m)로는 사진이 대부분 거부돼서 여기만 따로 올림.
        location ~ ^/b/uploads(/.*)?$ {
            client_max_body_size 12m;
            set $upstream http://diet-service:8020;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        location ~ ^/b/tags(/.*)?$ {
            set $upstream http://ingredients-service:8018;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
        }

        # AI 챗봇(MN-0111). 프론트가 /b/ai/chatbot을 호출 → ai 컨테이너의 /ai/chatbot으로.
        # LLM(Bedrock) 응답이 수 초 걸릴 수 있어 프록시 read 타임아웃을 넉넉히 둔다.
        location ~ ^/b/ai(/.*)?$ {
            set $upstream http://ai:8022;
            rewrite ^/b(/.*)$ $1 break;
            proxy_pass $upstream$uri$is_args$args;
            # chatbot-streaming-design.md §8-1 — SSE(/ai/chatbot/stream)는 버퍼링되면
            # nginx가 응답을 다 모았다 한 번에 보내서 스트리밍이 안 보인다.
            proxy_buffering off;
            proxy_cache off;
            proxy_read_timeout 120s;
        }
    }
}
