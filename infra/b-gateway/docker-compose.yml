# b-gateway를 --network host(git에 흔적 없는 수동 docker run)에서 이 파일로
# 옮긴다. 이전엔 nginx.conf가 백엔드를 127.0.0.1:포트로 참조했는데, 이는 host
# 네트워크라서 가능했던 것 - backend_default/dangdang-edge 네트워크에 붙이려면
# host 모드를 뺄 수밖에 없다(Docker는 host 모드 컨테이너를 다른 네트워크에
# 추가로 연결하는 걸 지원하지 않음 - 별도 네임스페이스가 없어서 구조적으로 불가).
#
# 리스크 평가(2026-07-18):
# - host -> bridge 전환은 컨테이너 재생성이 필요해 짧은 다운타임이 있다(핫스왑 불가).
# - nginx.conf의 업스트림을 컨테이너 이름으로 바꾸면서, 정적 upstream{} 블록 대신
#   resolver + 변수 기반 proxy_pass로 바꿨다 - 안 그러면 백엔드 재배포로 컨테이너
#   IP가 바뀔 때마다 502가 난다(nginx 공식 문서: upstream의 server는 시작/reload
#   시점에 한 번만 resolve됨). 변수 기반 proxy_pass는 매 요청 resolver로 재조회함
#   (nginx 공식 문서 확인, NGINX Plus 전용 기능 아님 - 오픈소스에서도 동작).
# - 적용 전 반드시: production VM(192.168.0.13)의 기존 nginx.conf와
#   `docker inspect b-gateway` 결과를 백업해둘 것(이미 ~/b-gateway-backup-20260718/에
#   있음). 문제 생기면 host 모드로 원복 가능해야 한다.
#
# 적용 방법 (당시엔 production VM에서 사람이 직접 실행 - 최초 host->bridge
# 전환은 자동화 안 함):
#   1) 이 디렉터리를 production VM의 ~/b-gateway/ 에 git pull 등으로 반영
#   2) docker stop b-gateway && docker rm b-gateway  (기존 --network host 컨테이너 제거)
#   3) docker network create dangdang-edge  (이미 있으면 생략)
#   4) cd ~/b-gateway && docker compose up -d
#   5) curl -s http://localhost:8080/b/search?page=1 로 라우팅 확인
#   6) 문제 있으면: docker compose down 후, 백업해둔 설정으로 기존 방식 원복
#
# 현재 상태(2026-07-19): 위 host->bridge 전환은 완료됐고, 그 위에 non-root/
# read-only 전환(아래 build 블록 주석 참고)까지 적용 완료. production 반영은
# .github/workflows/build-test.yml의 bgateway-cutover job(workflow_dispatch,
# 백업+빌드+재기동+라우트 검증+실패시 자동 롤백까지 자동화)으로 실행함 -
# 더 이상 사람이 SSH로 직접 명령을 치지 않는다.
services:
  b-gateway:
    # 2026-07-19, non-root 전환 - 격리 환경에서 실제 기동/resolver/temp 경로
    # 생성 전부 검증 완료(harbor VM, 라이브 b-gateway는 안 건드리고 별도
    # 컨테이너+네트워크로 테스트) 후 적용. openresty 공식 이미지를 그대로
    # 못 쓰고 커스텀 Dockerfile이 필요한 이유, uid 101 선택 근거 등은
    # Dockerfile 자체 주석 참고. nginx.conf를 이제 빌드 시점에 이미지에
    # 굽기 때문에(Dockerfile의 COPY), 기존 :ro 볼륨 마운트는 제거 -
    # 마운트를 남겨두면 이미지가 실제로 뭘 담고 있는지와 런타임에 뭐가
    # 서빙되는지가 어긋날 수 있어서(볼륨이 이미지 내용을 덮어씀), backend/
    # frontend Dockerfile들과 같은 방식(설정을 이미지에 굽기)으로 통일한다.
    build:
      context: .
      dockerfile: Dockerfile
    container_name: b-gateway
    restart: unless-stopped
    user: "101:101"
    # 2026-07-24, 런타임 하드닝 패리티. 백엔드 9개 서비스는 전부
    # cap_drop/no-new-privileges/pids_limit을 갖고 있는데, 정작 인터넷과 맞닿는
    # 유일한 컴포넌트인 이 게이트웨이만 빠져 있었다(user/read_only만 적용된
    # 상태). 노출 표면이 가장 큰 컴포넌트가 가장 약한 설정이던 셈.
    #
    # cap_add가 필요 없는 이유: backend/compose.production.example.yaml의 옛
    # b-gateway 정의는 openresty 공식 이미지를 root로 띄우느라 엔트리포인트가
    # 시작 시 chown/setuid를 해야 했고 그래서 CHOWN/SETUID/SETGID를 되돌려
    # 줬다. 지금 이 스택은 Dockerfile에서 USER 101로 이미 non-root로 뜨고
    # nginx.conf도 이미지에 구워져 있어(pid/temp 경로를 /tmp로 재지정) 런타임에
    # 권한 조작을 하지 않는다. 8080은 비특권 포트라 NET_BIND_SERVICE도 불필요.
    #
    # 격리 검증(2026-07-24, harbor VM에서 라이브 게이트웨이 안 건드리고 별도
    # 컨테이너로 실행): 이 세 항목을 전부 건 상태에서 컨테이너 정상 기동,
    # uid 101로 master+worker 프로세스 확인, nginx가 요청을 실제로 접수해
    # 액세스 로그에 기록되는 것까지 확인함(업스트림 미존재로 인한 resolver
    # 오류만 발생 - 격리 환경의 예상 동작).
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    pids_limit: 50
    read_only: true
    tmpfs:
      - /tmp
    ports:
      - "8080:8080"
    networks:
      - backend_default
      - dangdang-edge
    healthcheck:
      test: ["CMD", "wget", "-q", "--spider", "http://127.0.0.1:8080/b/search?page=1"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
    mem_limit: 256m
    cpus: 0.5
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

networks:
  backend_default:
    external: true
  dangdang-edge:
    external: true
    name: dangdang-edge
