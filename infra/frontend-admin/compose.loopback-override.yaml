# Admin Frontend의 외부 노출 정책 파일(2026-07-24 지훈 결정, 같은 날 loopback ->
# 전체 공개로 재결정 - 관리자가 사무실 밖에서도 관리해야 해서 SSH 터널 전제가
# 안 맞음을 확인). 이전엔 127.0.0.1로 묶어 SSH 터널로만 접근하게 했었는데
# (git 이력 참고), 지금은 cloudflared가 실제 게이트 역할을 한다:
#   - admin-signup은 secret key 없인 계정 자체를 못 만든다(로그인 실패해도
#     계정이 새로 생기는 구멍은 없음).
#   - cloudflared 연결을 끊으면 그 즉시 admin 접속 경로 자체가 사라진다 -
#     즉 네트워크 레벨 kill-switch를 "포트 차단"이 아니라 "터널 차단"으로
#     옮긴 것. 포트 자체를 열어도 이 kill-switch가 여전히 유효하다.
# 호스트 포트를 0.0.0.0으로 여는 이유는 cloudflared가 붙는 방식과 무관하게,
# 로컬(LAN)에서도 터널 없이 바로 확인 가능하게 하기 위함.
services:
  frontend-admin:
    ports:
      - "3002:3000"
