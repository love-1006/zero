name: Build & Test

on:
  push:
  pull_request:
    branches: [main]

# 같은 브랜치에서 연달아 push되면 deploy job이 harbor VM에 동시에 두 번 돌 수 있어서
# (docker compose up이 겹치는 배포 사고로 이어질 수 있음), 순차 실행을 강제한다.
# 진행 중인 배포를 취소하면 오히려 중간 상태로 남을 수 있어 cancel-in-progress는 false로 둔다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: harbor.hizero.local/dangdang/ci-sandbox

jobs:
  # backend/ 디렉터리 존재 여부를 먼저 체크아웃해서 확인한다. job 레벨 if:는 체크아웃 전
  # (파일시스템에 아직 접근 못 하는 시점)에 평가되기 때문에 hashFiles()를 job 레벨 if:에서
  # 바로 쓸 수 없다(실제로 시도했다가 "Unrecognized function: hashFiles" 에러로 확인함) -
  # 그래서 이렇게 별도 job에서 먼저 체크아웃 후 확인해 output으로 넘기는 방식이 필요하다.
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
    steps:
      - uses: actions/checkout@v4
      - id: check
        run: |
          if [ -d backend ] && [ -n "$(find backend -type f | head -1)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi

  # 내부망 접근이 필요 없는 단계 - GitHub 클라우드 러너에서 실행
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ci_sandbox/requirements.txt
      - name: Run tests
        run: pytest ci_sandbox/tests

  # backend/*-service는 아직 자체 테스트가 없어서(재헌님 인계 메모 확인, 2026-07-16 기준)
  # pytest를 강제하지 않는다 - 지금 강제하면 테스트 부재로 전부 빨간불이 되어 정작 봐야 할
  # 진짜 실패 신호가 묻힌다. 대신 의존성 설치 + import 스모크 체크로 "최소한 뜨는 코드인가"만
  # 지금 단계에서 검증하고, 테스트가 생기면 이 스텝에 pytest를 추가하면 된다.
  backend-build-test:
    # main엔 아직 backend/ 디렉터리가 없다(PR #19 미병합) - 디렉터리 자체가 없는 브랜치에서
    # 매트릭스를 그대로 돌리면 전부 "파일 없음"으로 실패하니, detect-backend의 결과가
    # true일 때만 실행되게 가드를 건다. PR #19가 병합되면 자동으로 정상 실행된다.
    needs: detect-backend
    if: needs.detect-backend.outputs.exists == 'true'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-service
          - community-service
          - diet-service
          - ingredients-service
          - login-service
          - main-service
          - product-service
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r backend/${{ matrix.service }}/requirements.txt
      - name: Import smoke check
        working-directory: backend/${{ matrix.service }}
        run: python -c "import app.main"

  # 아래부터는 내부 SonarQube/Harbor에 접근해야 하므로 self-hosted(harbor VM) 러너에서 실행
  code-scanning:
    needs: build-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  image-scanning:
    needs: code-scanning
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build --pull -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  # backend/*-service 이미지 빌드+취약점 스캔만 수행한다. Harbor push/배포는 아직 대상이
  # 아니다 - 서비스별 Harbor 프로젝트/배포 대상(VM)이 팀 논의로 정해지지 않은 상태에서
  # 임의로 만들면 되돌리기 번거로운 인프라 결정을 CI 파이프라인이 먼저 확정해버리는 셈이라,
  # 지금은 "병합 전에 취약점만 걸러낸다"까지만 하고 push/deploy는 별도 작업으로 남긴다.
  backend-image-scanning:
    needs: [detect-backend, build-test]
    if: needs.detect-backend.outputs.exists == 'true'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service:
          - admin-service
          - community-service
          - diet-service
          - ingredients-service
          - login-service
          - main-service
          - product-service
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: >-
          docker build --pull
          -t backend-${{ matrix.service }}:${{ github.sha }}
          backend/${{ matrix.service }}
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: backend-${{ matrix.service }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  image-push:
    needs: image-scanning
    runs-on: self-hosted
    steps:
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Push image
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # PR을 여는 것만으로 실제 서버에 배포되면 안 되므로, main에 push(=병합)된 경우에만 배포한다.
  # github.event (객체)가 아니라 github.event_name (문자열)으로 비교해야 한다 - 공식 문서/이슈에서
  # 확인된 흔한 실수 포인트(actions/runner#950).
  deploy:
    needs: image-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Pull image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Record previously deployed tag
        run: |
          mkdir -p ~/ci-sandbox-state
          PREV_TAG=$(cat ~/ci-sandbox-state/last-good-tag 2>/dev/null || true)
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
          echo "Previous good tag: ${PREV_TAG:-<none>}"
      - name: Deploy via Docker Compose
        working-directory: infra/ci-sandbox
        run: IMAGE_TAG=${{ github.sha }} docker compose up -d
      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fs http://localhost:8080/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after retries"
          exit 1
      - name: Rollback on failed health check
        if: failure()
        working-directory: infra/ci-sandbox
        run: |
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous good tag: $PREV_TAG"
            IMAGE_TAG=$PREV_TAG docker compose up -d
          else
            echo "No previous good tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-good
        if: success()
        run: echo "${{ github.sha }}" > ~/ci-sandbox-state/last-good-tag

  notify-on-failure:
    needs:
      - build-test
      - backend-build-test
      - code-scanning
      - image-scanning
      - backend-image-scanning
      - image-push
      - deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          BACKEND_TEST_RESULT: ${{ needs.backend-build-test.result }}
          CODE_SCANNING_RESULT: ${{ needs.code-scanning.result }}
          IMAGE_SCANNING_RESULT: ${{ needs.image-scanning.result }}
          BACKEND_SCAN_RESULT: ${{ needs.backend-image-scanning.result }}
          IMAGE_PUSH_RESULT: ${{ needs.image-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="$REPO_URL/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          FAILED_JOBS=""
          add_failed() {
            if [ -z "$FAILED_JOBS" ]; then
              FAILED_JOBS="$1"
            else
              FAILED_JOBS="$FAILED_JOBS, $1"
            fi
          }
          [ "$BUILD_TEST_RESULT" = "failure" ] && add_failed "build-test"
          if [ "$BACKEND_TEST_RESULT" = "failure" ]; then
            add_failed "backend-build-test"
          fi
          [ "$CODE_SCANNING_RESULT" = "failure" ] && add_failed "code-scanning"
          if [ "$IMAGE_SCANNING_RESULT" = "failure" ]; then
            add_failed "image-scanning"
          fi
          if [ "$BACKEND_SCAN_RESULT" = "failure" ]; then
            add_failed "backend-image-scanning"
          fi
          [ "$IMAGE_PUSH_RESULT" = "failure" ] && add_failed "image-push"
          [ "$DEPLOY_RESULT" = "failure" ] && add_failed "deploy"
          TEXT=":x: *${FAILED_JOBS^}* failed on \`$BRANCH\` ($SHA)"
          TEXT="$TEXT\n<$RUN_URL|결과 보기>"
          curl -sf -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"$TEXT\"}" \
            "$SLACK_WEBHOOK_URL"
