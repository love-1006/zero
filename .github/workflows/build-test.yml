name: Build & Test

on:
  push:
  pull_request:
    branches: [main]

env:
  IMAGE_NAME: harbor.hizero.local/dangdang/ci-sandbox

jobs:
  # 내부망 접근이 필요 없는 단계 - GitHub 클라우드 러너에서 실행
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ci_sandbox/requirements.txt
      - name: Run tests
        run: pytest ci_sandbox/tests

  # 아래부터는 내부 SonarQube/Harbor에 접근해야 하므로 self-hosted(harbor VM) 러너에서 실행
  code-scanning:
    needs: build-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v4
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  image-scanning:
    needs: code-scanning
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@0.28.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  image-push:
    needs: image-scanning
    runs-on: self-hosted
    steps:
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Push image
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  notify-on-failure:
    needs: [build-test, code-scanning, image-scanning, image-push]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify dev (Slack integration pending)
        run: echo 'TODO - send Slack notification about pipeline failure'
