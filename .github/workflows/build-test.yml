name: Build & Test

on:
  push:
  pull_request:
    branches: [main]
  # production VM(재헌님이 이미 구축, 10.10.10.30)에 올리는 실제 배포는 main push 시
  # 자동 실행된다(2026-07-18, 지훈 지시 - "그 대신 CI를 신중하게"로 맞바꿈. 상세 근거는
  # backend-deploy-production job 주석 참고). workflow_dispatch는 이전 태그로 수동
  # 재배포/롤백용으로 남겨둔 것 - tag 입력이 없으면 production의 기본 태그(latest)를 쓴다.
  workflow_dispatch:
    inputs:
      backend_tag:
        description: '백엔드 배포 태그 (비우면 latest)'
        required: false
        default: 'latest'
      frontend_tag:
        # frontend compose는 불변 태그를 요구해서(immutable tag) latest를 기본으로
        # 안 두고, 비우면 이번 워크플로 실행의 커밋 sha를 쓴다(job 내부에서 처리).
        description: '프론트 배포 태그 (비우면 현재 커밋 sha)'
        required: false
        default: ''
      deploy_target:
        # 2026-07-19, backend_tag만 넣고 백엔드만 수동 재배포하려 했는데
        # frontend-deploy-production까지 무조건 같이 돌아서, frontend/가 아직
        # main에 병합 안 된 상태에서 scp가 "파일 없음"으로 실패하는 걸 실측으로
        # 확인(실서비스 영향은 없었지만 불필요한 실패/알람). 수동 트리거 시
        # 어느 쪽을 배포할지 명시하게 해서 관련 없는 쪽까지 끌려나가는 걸 막는다.
        # none은 bgateway-cutover처럼 backend/frontend 배포 없이 workflow_dispatch
        # 자체만 필요한 일회성 job을 돌릴 때 씀(2026-07-19 추가).
        description: '수동 배포 대상'
        required: false
        default: 'both'
        type: choice
        options:
          - both
          - backend
          - frontend
          - none
      run_bgateway_cutover:
        # 2026-07-19, b-gateway non-root/read-only 전환 검증차 처음 추가했으나
        # prod-env-fix류 일회성 job과 달리, b-gateway는 이 job 전엔 자동화된
        # production 배포 경로가 아예 없었다(수동 SSH뿐). backend/frontend-
        # deploy-production과 같은 급의 상시 배포 수단으로 남긴다 - 검증 후
        # 삭제하지 않음. push 자동 배포로 안 바꾼 이유: b-gateway는 nginx.conf
        # 라우팅 로직이 변경 빈도가 낮고 변경 시 파급력이 커서(전체 트래픽의
        # 유일한 진입점), backend/frontend처럼 매 push 자동 배포보다 명시적
        # workflow_dispatch 승인을 유지하는 게 안전하다고 판단.
        description: 'b-gateway 배포 (백업+빌드+재기동+라우트 검증, 실패시 롤백)'
        required: false
        default: false
        type: boolean
      fix_harbor_dns:
        # 2026-07-18 frontend-deploy-production 실패 원인: production
        # VM(10.10.10.30)에서 "lookup harbor.hizero.local ... server
        # misbehaving" - production VM의 DNS 리졸버가 harbor.hizero.local을
        # 못 찾는다(backend는 이미 pull된 이미지가 로컬에 있어서 이 문제를 안
        # 겪었을 뿐, 근본 원인은 동일하게 잠재해 있었을 가능성). 2026-07-19,
        # 지훈 지시로 정식 DNS 대신 harbor VM의 내부 IP를 production VM의
        # /etc/hosts에 고정 등록해 우회 - 서비스가 뜨는 게 우선이라는 판단
        # (정식 DNS 인프라는 팀 도메인 확정 이후 별도로 정리).
        description: 'production VM에 harbor.hizero.local -> 내부IP /etc/hosts 등록'
        required: false
        default: false
        type: boolean
      check_db_vm_harbor_trust:
        # 2026-07-19, DB VM(윤경 담당, 이 repo에 코드 없음 - 아직 yoonK/database
        # 브랜치 자체가 없음)도 production과 같은 harbor DNS/CA 신뢰 문제를
        # 겪을지 진단하고, production에 했던 것과 동일하게 /etc/hosts +
        # /etc/docker/certs.d/ 를 미리 맞춰둔다(지훈 지시, 2026-07-19 - 문제
        # 터지고 나서 고치지 말고 미리 선제 조치). DB VM은 원래 담당 범위
        # 밖(harbor+monitoring VM만)이라 계정/비밀번호가 불확실해서 bruce/zero
        # 계정과 팀 비밀번호 규칙 두 개(zeropass#/Zeropass#2026) 조합을 다
        # 시도해 실제로 되는 걸 찾는다.
        description: 'DB VM도 harbor DNS/CA 신뢰 미리 맞춤 + 진단'
        required: false
        default: false
        type: boolean

# 같은 브랜치에 연달아 push되면 deploy job이 harbor VM에 동시에 두 번 돌 수 있어서
# (docker compose up이 겹치는 배포 사고로 이어질 수 있음), main push에서는 순차 실행을
# 강제하고 진행 중인 배포를 취소하지 않는다(cancel-in-progress: false).
# 반면 PR에 커밋을 연달아 push하는 경우는 배포가 아니라서 취소해도 안전한데, 기존엔
# false를 전체에 고정해둬서 옛 커밋의 실행이 self-hosted 러너 1대를 계속 붙잡고 있었다
# (공식 문서: cancel-in-progress는 github.ref/event_name 기준 조건식으로 다르게 줄 수 있음 -
# yamllint disable-line rule:line-length
# https://docs.github.com/actions/using-workflows/control-the-concurrency-of-workflows-and-jobs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# GITHUB_TOKEN 기본 권한을 워크플로 파일에 명시적으로 최소화한다. 저장소 설정(현재 read)에만
# 의존하면, 나중에 누군가 저장소 기본값을 write로 바꿀 때 이 워크플로도 같이 영향을 받는다 -
# 공식 하드닝 가이드 권고. pull-requests: read는 dorny/paths-filter가 PR의 변경 파일
# 목록을 GitHub API로 조회할 때 필요(처음엔 안 넣었다가 "Resource not accessible by
# integration" 에러로 실제 PR 실행에서 확인 후 추가함):
# yamllint disable-line rule:line-length
# https://docs.github.com/actions/security-guides/security-hardening-for-github-actions
permissions:
  contents: read
  pull-requests: read

jobs:
  # backend/ 디렉터리 존재 여부를 먼저 체크아웃해서 확인한다. job 레벨 if:는 체크아웃 전
  # (파일시스템에 아직 접근 못 하는 시점)에 평가되기 때문에 hashFiles()를 job 레벨 if:에서
  # 바로 쓸 수 없다(실제로 시도했다가 "Unrecognized function: hashFiles" 에러로 확인함) -
  # 그래서 이렇게 별도 job에서 먼저 체크아웃 후 확인해 output으로 넘기는 방식이 필요하다.
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      # workflow_dispatch에는 event.before(직전 커밋)가 없어서 paths-filter가
      # 비교 기준을 못 잡고 8개 서비스 전부를 "바뀜"으로 취급한다(dorny/paths-filter
      # 로그의 "before field is missing" 경고로 확인) - 2026-07-19, workflow_dispatch
      # 트리거마다 불필요하게 8개 전체 재빌드+Trivy 스캔이 돌아 10~15분씩 낭비되는
      # 걸 실측으로 확인. workflow_dispatch는 애초에 "이미 빌드된 태그로 수동
      # 재배포/롤백"용이라 재빌드가 필요 없으므로, 이 이벤트에서는 매트릭스를
      # 빈 배열로 강제해 backend-image-scanning을 통째로 스킵시킨다.
      services: >-
        ${{ github.event_name == 'workflow_dispatch' && '[]' ||
        steps.filter.outputs.changes }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - id: check
        run: |
          if [ -d backend ] && [ -n "$(find backend -type f | head -1)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      # 8개 서비스 중 이번 커밋에서 실제로 파일이 바뀐 서비스만 골라 backend-build-test/
      # backend-image-scanning 매트릭스에 넘긴다. 예전엔 커밋 하나에서 서비스 1개만 고쳐도
      # 8개 전부 다시 빌드+Trivy 스캔을 돌려서, self-hosted 러너 1대에 큐가 쌓여 실제로
      # 51분까지 걸린 적이 있었음(2026-07-16 직접 확인) - dorny/paths-filter(변경 경로 기반
      # 매트릭스 생성의 공식 예시 패턴)로 필요한 것만 돌리게 줄인다.
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter
        if: steps.check.outputs.exists == 'true'
        with:
          filters: |
            admin-service: 'backend/admin-service/**'
            community-service: 'backend/community-service/**'
            diet-service: 'backend/diet-service/**'
            ingredients-service: 'backend/ingredients-service/**'
            login-service: 'backend/login-service/**'
            main-service: 'backend/main-service/**'
            product-service: 'backend/product-service/**'
            recipe-service: 'backend/recipe-service/**'

  # detect-backend와 같은 이유로 별도 job - frontend/ 존재 여부와 변경 여부를 체크아웃 후
  # 확인해서 넘긴다(2026-07-17 성애님 frontend/ 브랜치 인수 - sungA/front/main).
  detect-frontend:
    runs-on: ubuntu-latest
    outputs:
      # detect-backend와 같은 이유(workflow_dispatch엔 diff 기준이 없음) - 수동
      # 트리거에서는 프론트도 재빌드 대상에서 뺀다.
      changed: >-
        ${{ github.event_name == 'workflow_dispatch' && 'false' ||
        steps.filter.outputs.frontend }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter
        with:
          filters: |
            frontend: 'frontend/**'

  # Node.js 22.15.0/npm 10.9.2 고정(프론트 인수 조건 명시값). tsc --noEmit 기반 typecheck를
  # lint로도 겸용한다(frontend/package.json 기준, 별도 ESLint 아직 미도입).
  frontend-build-test:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Node.js
        # v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.15.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

  # backend/*-service는 아직 자체 테스트가 없어서(재헌님 인계 메모 확인, 2026-07-16 기준)
  # pytest를 강제하지 않는다 - 지금 강제하면 테스트 부재로 전부 빨간불이 되어 정작 봐야 할
  # 진짜 실패 신호가 묻힌다. 대신 의존성 설치 + import 스모크 체크로 "최소한 뜨는 코드인가"만
  # 지금 단계에서 검증하고, 테스트가 생기면 이 스텝에 pytest를 추가하면 된다.
  backend-build-test:
    # backend/ 디렉터리가 없거나(main엔 있음), 이번 커밋에서 바뀐 백엔드 서비스가 하나도
    # 없으면(예: docs만 수정) 건너뛴다. services가 빈 배열이면 매트릭스에 항목이 없어
    # 그냥 아무 것도 안 도는데, 그래도 if 조건으로 한 번 더 명시해서 의도를 분명히 한다.
    needs: detect-backend
    if: >-
      needs.detect-backend.outputs.exists == 'true' &&
      needs.detect-backend.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-backend.outputs.services) }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        # v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/${{ matrix.service }}/requirements.txt
      - name: Import smoke check
        working-directory: backend/${{ matrix.service }}
        run: python -c "import app.main"

  # 아래부터는 내부 SonarQube/Harbor에 접근해야 하므로 self-hosted(harbor VM) 러너에서 실행
  code-scanning:
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # frontend/backend 존재 여부에 따라 sonar.sources를 동적으로 구성한다 -
      # sonar-project.properties에 고정값을 두면, 아직 해당 디렉터리가 없는 브랜치(main에
      # sungA/front/main이 병합되기 전 등)에서 sonar-scanner가 "폴더가 없다"며 바로
      # 실패한다(실제로 확인함).
      #
      # projectKey도 여기서 브랜치별로 분리한다 - SonarQube Community Edition은 유료
      # 브랜치 분석 기능이 없어서, sonar.branch.name을 줘도 무시되고 모든 브랜치가
      # 같은 zerocheck 프로젝트/같은 "new code" 타임라인에 섞여 들어간다. 2026-07-19,
      # 재헌님 브랜치 동기화 직후 push/PR 두 분석이 2초 간격으로 같은 프로젝트에
      # 동시에 쓰다가 Quality Gate 결과가 서로 다르게 나오는 걸 실측으로 확인
      # (Sonar API로 project_analyses 조회, 13:57:40/13:57:42 두 건 확인). main은
      # 기존 zerocheck 프로젝트(히스토리 보존)를 그대로 쓰고, 다른 브랜치는
      # zerocheck-branch-<브랜치명>으로 완전히 분리한다 - 새로 생기는 프로젝트가
      # 전부 ZeroCheck Launch Gate(기본 게이트로 지정 완료)를 물려받는다.
      - name: Determine sonar sources and project key
        id: sonar-sources
        run: |
          SOURCES=""
          if [ -d frontend ]; then SOURCES="frontend"; fi
          if [ -d backend ]; then
            if [ -n "$SOURCES" ]; then
              SOURCES="$SOURCES,backend"
            else
              SOURCES="backend"
            fi
          fi
          echo "sources=$SOURCES" >> "$GITHUB_OUTPUT"

          BRANCH="${{ github.head_ref || github.ref_name }}"
          if [ "$BRANCH" = "main" ]; then
            PROJECT_KEY="zerocheck"
          else
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr -cd 'a-zA-Z0-9._-')
            PROJECT_KEY="zerocheck-branch-$SAFE_BRANCH"
          fi
          echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"
      - name: SonarQube scan
        # v6
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # yamllint disable-line rule:line-length
        with:
          args: >-
            -Dsonar.sources=${{ steps.sonar-sources.outputs.sources }}
            -Dsonar.projectKey=${{ steps.sonar-sources.outputs.project_key }}
            -Dsonar.projectName=${{ steps.sonar-sources.outputs.project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      # 배포 승인 절차(workflow_dispatch)를 없애고 push 시 자동 배포로 바꾸면서
      # (2026-07-18, 지훈 지시 - "그 대신 CI를 신중하게"), 지금까지는 스캔만 하고
      # 결과를 강제하지 않던 SonarQube를 실제 게이트로 승격한다. 이 스텝 전까지는
      # Quality Gate가 실패해도 code-scanning job 자체는 초록불이었다.
      - name: SonarQube Quality Gate check
        # v1.2.0
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  # yamllint disable-line rule:line-length
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # backend/*-service 이미지를 빌드+스캔하고, 통과한 것만 Harbor에 push한다. 태그는
  # 두 개: :<sha>(추적/롤백용, 불변)와 :latest(배포용, 이동 태그 - 재헌님 production
  # compose의 기본 태그 컨벤션과 맞춤). 커밋마다 바뀐 서비스만 다시 빌드되므로
  # (paths-filter 매트릭스), 안 바뀐 서비스의 :latest는 이전 그대로 유지되고 바뀐
  # 서비스만 :latest가 갱신되는 방식으로 8개 서비스의 "부분 배포"를 자연스럽게 처리한다.
  backend-image-scanning:
    needs: detect-backend
    if: >-
      needs.detect-backend.outputs.exists == 'true' &&
      needs.detect-backend.outputs.services != '[]'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-backend.outputs.services) }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
      - name: Build image
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: backend/${{ matrix.service }}
          pull: true
          tags: backend-${{ matrix.service }}:${{ github.sha }}
          load: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      # setup-trivy 기본 설치 경로가 $HOME/.local/bin/trivy-bin로 고정돼 있어
      # harbor-runner/harbor-runner-2가 동시에 스캔을 돌리면 "Text file busy"로
      # 충돌한다(실제로 재현함). 러너별 경로에 직접 설치하고 trivy-action의 재설치는
      # 건너뛴다.
      - name: Install Trivy (per-runner path)
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: backend-${{ matrix.service }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      # 재헌님이 이미 만들어 운영 중인 production VM(10.10.10.30)의
      # ~/backend/docker-compose.yaml이 기대하는 이미지 경로/태그 컨벤션을 그대로
      # 따른다(harbor VM 자체 대상으로 별도 경로/포트를 새로 만들었다가, 이미 잘
      # 돌아가는 실제 배포와 안 맞는 병렬 파이프라인이 되는 걸 확인하고 되돌림 -
      # 2026-07-18). :latest는 그 compose 파일의 기본값과 맞추기 위함이고, :sha는
      # 추적/롤백용으로 같이 남긴다.
      - name: Tag and push (sha + latest)
        run: |
          IMAGE="harbor.hizero.local/dangdang-backend/${{ matrix.service }}"
          SHA="${{ github.sha }}"
          LOCAL="backend-${{ matrix.service }}:$SHA"
          docker tag "$LOCAL" "$IMAGE:$SHA"
          docker tag "$LOCAL" "$IMAGE:latest"
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"

  # production VM(10.10.10.30, 재헌님이 이미 구축)에 실제로 배포한다. 이 job은
  # self-hosted 러너(harbor VM)에서 실행되지만 harbor VM 자신의 Docker가 아니라
  # SSH로 production VM에 접속해 그쪽의 기존 docker-compose.yaml을 그대로 pull/up
  # 한다 - 이미지/네트워크/헬스체크 스크립트를 이 저장소에 새로 만들지 않고 이미
  # 검증된 재헌님의 구성을 그대로 재사용한다.
  #
  # main push 시 자동 배포(2026-07-18, 지훈 지시 - "그 대신 CI를 신중하게"로
  # 맞바꿈). 원래는 workflow_dispatch(수동 실행=승인)로만 배포했었는데, 그 승인
  # 게이트를 없애는 대신 code-scanning(SonarQube Quality Gate 하드게이트 포함)까지
  # needs에 넣어 정적분석이 실패하면 배포 자체가 안 되게 했다. workflow_dispatch는
  # 이전 태그로 수동 재배포/롤백용으로 계속 남겨둔다.
  backend-deploy-production:
    needs: [backend-image-scanning, code-scanning]
    # always()가 없으면 needs 잡이 skip될 때(예: 이번 커밋에 backend 변경 없음) 이
    # job도 평가 없이 그냥 skip돼서, workflow_dispatch로 수동 롤백하려고 해도
    # 안 돌게 된다. always()로 강제 평가한 뒤, push는 두 잡이 실제로 success일
    # 때만, workflow_dispatch는 deploy_target이 backend/both일 때만 허용한다
    # (2026-07-19, frontend/가 main에 없는 상태에서 backend만 수동 재배포하려다
    # frontend-deploy-production까지 같이 돌아 scp 실패하는 걸 실측 - 대상 분리).
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'backend' ||
            inputs.deploy_target == 'both')) ||
        (
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          needs.backend-image-scanning.result == 'success' &&
          needs.code-scanning.result == 'success'
        )
      )
    runs-on: self-hosted
    env:
      SERVICES: >-
        admin-service community-service diet-service ingredients-service
        login-service main-service product-service recipe-service
      # 2026-07-19 아침, 구 LAN IP(192.168.0.13)가 인프라 공지("당분간 병행
      # 유지")보다 먼저 죽은 걸 실측(ping "Destination Host Unreachable",
      # SSH "No route to host")으로 확인 - harbor/monitoring/DB VM은 구/신
      # IP 둘 다 살아있는데 production VM만 먼저 끊김. 새 App 계층
      # IP(10.10.10.30)로 전환.
      PROD_HOST: bruce@10.10.10.30
      BACKEND_TAG: ${{ inputs.backend_tag }}
    steps:
      # 2026-07-19, well-architected 체크리스트의 "latest 배포 금지" 항목 재점검
      # 중 발견 - push 이벤트에선 inputs.backend_tag가 존재하지 않아 TAG가
      # 빈 문자열이 되고, 그 상태로 docker compose를 돌리면 production VM의
      # compose 파일이 기본값(:latest)으로 떨어졌을 것으로 보임(frontend는
      # 이미 이 fallback을 github.sha로 처리하고 있었는데 backend만 빠져있었다
      # - 두 job이 같은 패턴이어야 하는데 여기만 어긋나 있었음). workflow_dispatch
      # 수동 배포는 여전히 backend_tag 기본값 'latest'를 그대로 쓸 수 있게 유지
      # (수동 롤백/재배포 편의) - 자동배포 경로만 불변 태그로 강제한다.
      - name: Determine tag
        run: |
          TAG="$BACKEND_TAG"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Record previous tag
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          PREV=$($SSH "cat ~/backend/.last-deployed-tag 2>/dev/null" || true)
          echo "PREV_TAG=$PREV" >> "$GITHUB_ENV"
          echo "Previous deployed tag: ${PREV:-<none>}"
      - name: Deploy via Docker Compose (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          CMD="cd ~/backend"
          CMD="$CMD && TAG=$TAG docker compose -f docker-compose.yaml pull"
          CMD="$CMD && TAG=$TAG docker compose -f docker-compose.yaml up -d"
          $SSH "$CMD"
      - name: Health check
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          declare -A PORTS=(
            [admin-service]=8008 [community-service]=8012 [diet-service]=8020
            [ingredients-service]=8018 [login-service]=8000 [main-service]=8010
            [product-service]=8016 [recipe-service]=8014
          )
          for s in $SERVICES; do
            PORT="${PORTS[$s]}"
            OK=""
            for i in $(seq 1 10); do
              CHECK="curl -fs http://localhost:$PORT/health"
              if $SSH "$CHECK" >/dev/null 2>&1; then
                OK=1
                break
              fi
              sleep 3
            done
            if [ -z "$OK" ]; then
              echo "Health check failed for $s (port $PORT)"
              exit 1
            fi
          done
          echo "All backend services healthy"
      - name: Rollback on failed health check
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous tag: $PREV_TAG"
            CMD="cd ~/backend && TAG=$PREV_TAG"
            CMD="$CMD docker compose -f docker-compose.yaml up -d"
            $SSH "$CMD"
          else
            echo "No previous tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-deployed
        if: success()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "echo $TAG > ~/backend/.last-deployed-tag"

  # 2026-07-19, 일회성 진단+수정 job(fix_harbor_dns 입력으로만 실행). 검증 끝나면
  # 이 job과 위 fix_harbor_dns 입력은 삭제한다(prod-env-fix와 동일 패턴) -
  # /etc/hosts 등록은 한 번만 하면 재부팅 전까지 유지되는 영구 조치라 매번 돌 필요
  # 없음. harbor VM 내부 IP(192.168.0.53, LAN) 또는 Tailscale IP(100.96.79.73)
  # 중 production VM(10.10.10.30, 새 App 계층)에서 실제로 닿는 쪽을 찾아
  # /etc/hosts에 고정한다 - 정식 DNS 대신 쓰는 임시 우회.
  fix-harbor-dns:
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.fix_harbor_dns
    runs-on: self-hosted
    env:
      PROD_HOST: bruce@10.10.10.30
    steps:
      - name: Control test - inline -p vs --password-stdin, side by side
        run: |
          echo "--- style A: -p '<token>' inline (matches earlier success) ---"
          docker login harbor.hizero.local \
            -u '${{ secrets.HARBOR_ROBOT_USER }}' \
            -p '${{ secrets.HARBOR_ROBOT_TOKEN }}' 2>&1 || true
          docker logout harbor.hizero.local 2>&1 || true
          echo "--- style B: echo | --password-stdin (used in every fix"
          echo "    since, all failed) ---"
          echo '${{ secrets.HARBOR_ROBOT_TOKEN }}' | docker login \
            harbor.hizero.local -u '${{ secrets.HARBOR_ROBOT_USER }}' \
            --password-stdin 2>&1 || true
          docker logout harbor.hizero.local 2>&1 || true
          echo "--- style C: printf (no newline) | --password-stdin ---"
          printf '%s' '${{ secrets.HARBOR_ROBOT_TOKEN }}' | docker login \
            harbor.hizero.local -u '${{ secrets.HARBOR_ROBOT_USER }}' \
            --password-stdin 2>&1 || true
          docker logout harbor.hizero.local 2>&1 || true
      - name: Investigate DB VM 'unauthorized' - firewall on harbor VM
        run: |
          echo "--- host firewall (ufw/iptables) on harbor VM ---"
          sudo -n ufw status verbose 2>&1 || echo "(needs sudo, skipped)"
          sudo -n iptables -L -n 2>&1 || echo "(needs sudo, skipped)"
          echo "--- harbor VM's own /etc/hosts (self-referencing entry?) ---"
          grep harbor /etc/hosts || echo "(no harbor entry in own hosts)"
          echo "--- nginx allow/deny or client-cert directives under /data ---"
          find /data -iname "*.conf" -o -iname "*.yml" 2>/dev/null | \
            xargs grep -l "allow \|deny \|ssl_client\|X-Real-IP" \
            2>/dev/null || echo "(none found)"
          echo "--- exact WWW-Authenticate challenge (capture real params) ---"
          CHALLENGE=$(curl -sk -i https://harbor.hizero.local/v2/ \
            | grep -i "www-authenticate")
          echo "$CHALLENGE"
          # 2026-07-19: 여기 있던 수동 curl -u 토큰 요청 재현 테스트는 제거함.
          # harbor-core debug 로그로 확인한 결과, 이 curl 재현이 실패하면서
          # robot 계정을 잠갔고(Harbor 실패 로그인 잠금 정책), 같은 job의
          # 뒤쪽 "Verify Harbor login now works" 스텝(진짜 production
          # docker login)이 자격증명과 무관하게 이미 잠긴 계정이라 매번
          # 실패했던 것 - 하루 종일 재현됐던 "Invalid credentials"의
          # 실제 원인이었음. 이 curl 재현은 애초에 실제 docker login과
          # 다른 방식(수동 조립)이라 신뢰도도 낮았으므로 완전히 제거.
      - name: Check for zero-user migration side effects
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          echo "--- does zero user exist, is it in docker group? ---"
          $SSH "id zero 2>&1 || echo '(no zero user)'"
          echo "--- zero's own docker config, if any ---"
          $SSH "sudo -n ls -la /home/zero/.docker/ 2>&1 || \
            echo '(cannot check - needs sudo or missing)'"
          echo "--- /etc/hosts still has our harbor entry? ---"
          $SSH "grep harbor /etc/hosts || echo '(ENTRY GONE - wiped)'"
          echo "--- docker daemon: who owns running containers? ---"
          $SSH "ps aux | grep -i dockerd | grep -v grep"
          echo "--- ansible run history (any recent host-level changes?) ---"
          $SSH "ls -la /home/zero/.ansible/ 2>&1 || true"
      - name: Check Harbor CA trust and existing pull capability
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          echo "--- /etc/docker/certs.d/harbor.hizero.local/ contents ---"
          CERT_DIR="/etc/docker/certs.d/harbor.hizero.local/"
          $SSH "ls -la $CERT_DIR 2>&1 || echo '(directory missing)'"
          echo "--- ca.crt content check (subject/issuer if present) ---"
          CERT_PATH="/etc/docker/certs.d/harbor.hizero.local/ca.crt"
          $SSH "test -f $CERT_PATH && openssl x509 -in $CERT_PATH -noout \
            -subject -issuer || echo '(ca.crt missing or unreadable)'"
          echo "--- can production already pull a known backend image? ---"
          IMG="harbor.hizero.local/dangdang-backend/login-service:latest"
          $SSH "docker pull $IMG 2>&1 | tail -5"
          echo "--- system CA trust store check ---"
          HOST="harbor.hizero.local"
          OPENSSL="openssl s_client -connect $HOST:443 -servername $HOST"
          $SSH "$OPENSSL </dev/null 2>&1 | grep -E 'verify|issuer|subject'"
      # 원인 확인(SESSION_HANDOFF_harbor_push.md, ZeroCheck_인수인계 문서): Harbor
      # 인증서는 자체 CA("HiZero Root CA")로 서명됐고, harbor VM(이 self-hosted
      # 러너가 도는 바로 그 VM)에는 처음부터 이미 CA 신뢰가 설정돼 있어서
      # (/etc/docker/certs.d/harbor.hizero.local/ca.crt) image-scanning의
      # push가 지금까지 문제없이 됐던 것. production VM은 완전히 다른 머신이라
      # 이 CA 신뢰가 한 번도 설정된 적이 없었다 - 지금까지 backend가 되던 건
      # 이미 캐시된 이미지라 새로 pull이 필요 없었을 뿐, 잠재적으로 같은
      # 문제를 안고 있었다. harbor VM 로컬 CA 인증서를 production 홈 디렉터리로
      # 옮기는 것까지는 자동화하고, 마지막 /etc/docker/certs.d/ 배치만
      # sudo가 필요해 사람이 해야 한다.
      - name: Copy Harbor CA cert to production home dir
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          CA_LOCAL="/etc/docker/certs.d/harbor.hizero.local/ca.crt"
          if [ ! -f "$CA_LOCAL" ]; then
            echo "harbor VM 로컬에 $CA_LOCAL 이 없음 - 경로 재확인 필요"
            exit 1
          fi
          $SCP "$CA_LOCAL" "$PROD_HOST":/home/bruce/harbor-ca.crt
          echo "harbor VM의 CA 인증서를 production /home/bruce/harbor-ca.crt 로 복사 완료"
      - name: Check for any existing NOPASSWD sudo rule
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          echo "--- sudo -n -l (no prompt; empty/denied = no NOPASSWD rule) ---"
          $SSH "sudo -n -l" || true
          echo "--- /etc/hosts current permissions ---"
          $SSH "ls -la /etc/hosts"
          echo "--- groups for current user ---"
          $SSH "id"
      - name: Diagnose reachable Harbor IP
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          echo "--- current /etc/hosts ---"
          $SSH "cat /etc/hosts"
          echo "--- connectivity checks ---"
          for IP in 192.168.0.53 100.96.79.73; do
            CHK="curl -sk -m 3 -o /dev/null -w '%{http_code}' https://$IP/v2/"
            if $SSH "$CHK" | grep -qE '^[234]'; then
              echo "$IP -> reachable (Harbor API responded)"
              WORKING_IP="$IP"
              break
            else
              echo "$IP -> unreachable"
            fi
          done
          if [ -z "$WORKING_IP" ]; then
            echo "No candidate IP reached Harbor API - check manually"
            exit 1
          fi
          echo "WORKING_IP=$WORKING_IP" >> "$GITHUB_ENV"
      # sudo에 비밀번호를 파이프하는 방식은 안 쓴다(passwordless sudo가 아니면
      # 이 스텝은 권한 오류로 실패한다 - 그럴 경우 지훈이 직접 콘솔에서
      # 한 줄만 추가하면 됨: echo "<IP> harbor.hizero.local" | sudo tee -a
      # /etc/hosts). bruce 계정에 NOPASSWD sudo가 이미 설정돼 있다는 전제.
      - name: Patch /etc/hosts (requires passwordless sudo)
        id: patch-hosts
        continue-on-error: true
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          CMD="sudo -n sed -i '/harbor\.hizero\.local/d' /etc/hosts"
          CMD="$CMD && echo '$WORKING_IP harbor.hizero.local' | sudo -n tee -a"
          CMD="$CMD /etc/hosts"
          $SSH "$CMD"
      - name: Patch CA trust (requires passwordless sudo)
        id: patch-ca
        continue-on-error: true
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          CMD="sudo -n mkdir -p /etc/docker/certs.d/harbor.hizero.local"
          CMD="$CMD && sudo -n cp /home/bruce/harbor-ca.crt"
          CMD="$CMD /etc/docker/certs.d/harbor.hizero.local/ca.crt"
          $SSH "$CMD"
      - name: Manual fallback if passwordless sudo unavailable
        if: |
          steps.patch-hosts.outcome == 'failure' ||
          steps.patch-ca.outcome == 'failure'
        run: |
          echo "sudo -n failed (no NOPASSWD rule for this account)."
          echo "production VM(10.10.10.30)에 bruce 또는 zero 계정으로 직접"
          echo "접속해서 아래 두 줄을 실행해줘 (필요없는 건 이미 반영돼있으면"
          echo "그냥 통과함 - idempotent):"
          echo "  echo '$WORKING_IP harbor.hizero.local' \\"
          echo "    | sudo tee -a /etc/hosts"
          echo "  sudo mkdir -p /etc/docker/certs.d/harbor.hizero.local \\"
          echo "    && sudo cp /home/bruce/harbor-ca.crt \\"
          echo "    /etc/docker/certs.d/harbor.hizero.local/ca.crt"
      - name: Verify Harbor login now works
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "getent hosts harbor.hizero.local"
          # 2026-07-19: GH 시크릿 표현식을 바깥쪽 큰따옴표 문자열 안에 직접
          # 인라인하면, 그 안의 작은따옴표는 bash 문법상 아무 의미가 없어서
          # (이미 큰따옴표 안이라 quoting 역할을 못 함) robot 계정명의 '$'가
          # 로컬 bash에 의해 변수로 오해석/삭제됨. 반드시 별도 작은따옴표
          # 대입으로 먼저 변수에 담은 뒤 그 변수를 참조해야 안전함.
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login \
            harbor.hizero.local -u '$USR' \
            --password-stdin"
      - name: Diagnose /b/search gateway routing failure
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          echo "--- dangdang-frontend networks ---"
          $SSH "docker inspect dangdang-frontend \
            --format '{{json .NetworkSettings.Networks}}'" | tr ',' '\n'
          echo "--- b-gateway container present + networks? ---"
          $SSH "docker inspect b-gateway \
            --format '{{json .NetworkSettings.Networks}}' 2>&1" | tr ',' '\n'
          echo "--- dangdang-frontend BACKEND_GATEWAY_URL env ---"
          $SSH "docker inspect dangdang-frontend \
            --format '{{json .Config.Env}}'" | tr ',' '\n' | grep -i gateway
          echo "--- can frontend resolve/reach b-gateway by name? ---"
          URL="http://b-gateway:8080/b/search?page=1"
          $SSH "docker exec dangdang-frontend sh -c \
            'wget -qO- $URL 2>&1 | head -c 300 || echo WGET_FAILED'"

  # 2026-07-19, DB VM 선제 조치 일회성 job. DB VM은 harbor+monitoring VM과
  # 별개 머신이라 production과 똑같이 harbor CA를 신뢰하도록 설정된 적이
  # 없었다(진단으로 확인) - 윤경이 아직 하버에 push를 시도한 적이 없어서
  # 지금까지 안 드러났을 뿐. production에서 겪은 것과 같은 문제를 미리
  # 막기 위해 fix-harbor-dns와 동일한 두 가지(hosts, CA cert)를 여기도
  # 적용한다. 결과 확인 후 이 job과 위 check_db_vm_harbor_trust 입력,
  # DB_VM_SSH_PASSWORD(_ALT) 시크릿은 삭제한다.
  check-db-vm-harbor-trust:
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.check_db_vm_harbor_trust
    runs-on: self-hosted
    steps:
      - name: Find working account/password combo
        env:
          PW1: ${{ secrets.DB_VM_SSH_PASSWORD }}
          PW2: ${{ secrets.DB_VM_SSH_PASSWORD_ALT }}
        run: |
          FOUND=""
          for USER in bruce zero; do
            for PW in "$PW1" "$PW2"; do
              export SSHPASS="$PW"
              SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new"
              SSH="$SSH -o ConnectTimeout=5 $USER@10.10.20.10"
              if $SSH "echo ok" 2>/dev/null | grep -q ok; then
                echo "Working combo: $USER @ 10.10.20.10"
                FOUND="1"
                echo "DB_USER=$USER" >> "$GITHUB_ENV"
                if [ "$PW" = "$PW1" ]; then
                  echo "DB_PW_SECRET=DB_VM_SSH_PASSWORD" >> "$GITHUB_ENV"
                else
                  echo "DB_PW_SECRET=DB_VM_SSH_PASSWORD_ALT" >> "$GITHUB_ENV"
                fi
                break 2
              fi
            done
          done
          if [ -z "$FOUND" ]; then
            echo "No account/password combo worked against 10.10.20.10"
            exit 1
          fi
      - name: Diagnose DNS + CA trust state on DB VM
        env:
          PW1: ${{ secrets.DB_VM_SSH_PASSWORD }}
          PW2: ${{ secrets.DB_VM_SSH_PASSWORD_ALT }}
        run: |
          if [ "$DB_PW_SECRET" = "DB_VM_SSH_PASSWORD" ]; then
            export SSHPASS="$PW1"
          else
            export SSHPASS="$PW2"
          fi
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new"
          SSH="$SSH $DB_USER@10.10.20.10"
          echo "--- /etc/hosts (harbor entry?) ---"
          $SSH "grep harbor /etc/hosts || echo '(no harbor entry)'"
          echo "--- /etc/docker/certs.d/ ---"
          $SSH "ls -la /etc/docker/certs.d/ 2>&1 || echo '(directory missing)'"
          echo "--- docker installed? ---"
          $SSH "docker --version 2>&1 || echo '(docker not found)'"
          echo "--- clock skew check (JWT auth fails if clocks disagree) ---"
          echo "runner (harbor VM) time: $(date -u)"
          echo "DB VM time: $($SSH 'date -u')"
          echo "--- attempt Harbor login (expected to fail if unconfigured) ---"
          # 2026-07-19: 큰따옴표 대입("...") 이었을 때 robot 계정 이름의 '$'가
          # bash 변수 참조로 오해석되어 문자열이 깨졌음(예: robot$ci-xxx ->
          # robot-xxx). 작은따옴표로 바꿔 GH 시크릿 치환 결과를 그대로 보존.
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login harbor.hizero.local -u '$USR' \
            --password-stdin 2>&1" || true
          # 2026-07-19: 여기 있던 curl -u 토큰 요청 재현은 제거함 - 실패 시
          # robot 계정을 잠가서 이후 "Verify Harbor login now works on DB
          # VM" 스텝을 자격증명과 무관하게 매번 실패시켰음(harbor-core
          # debug 로그로 확인, production job과 동일한 원인).
      - name: Copy Harbor CA cert to DB VM home dir
        env:
          PW1: ${{ secrets.DB_VM_SSH_PASSWORD }}
          PW2: ${{ secrets.DB_VM_SSH_PASSWORD_ALT }}
        run: |
          if [ "$DB_PW_SECRET" = "DB_VM_SSH_PASSWORD" ]; then
            export SSHPASS="$PW1"
          else
            export SSHPASS="$PW2"
          fi
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          CA_LOCAL="/etc/docker/certs.d/harbor.hizero.local/ca.crt"
          $SCP "$CA_LOCAL" "$DB_USER@10.10.20.10":~/harbor-ca.crt
          echo "harbor VM의 CA 인증서를 DB VM ~/harbor-ca.crt 로 복사 완료"
      - name: Patch DB VM hosts + CA trust (requires passwordless sudo)
        id: patch-db
        continue-on-error: true
        env:
          PW1: ${{ secrets.DB_VM_SSH_PASSWORD }}
          PW2: ${{ secrets.DB_VM_SSH_PASSWORD_ALT }}
        run: |
          if [ "$DB_PW_SECRET" = "DB_VM_SSH_PASSWORD" ]; then
            export SSHPASS="$PW1"
          else
            export SSHPASS="$PW2"
          fi
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new"
          SSH="$SSH $DB_USER@10.10.20.10"
          CMD="sudo -n sed -i '/harbor\.hizero\.local/d' /etc/hosts"
          CMD="$CMD && echo '192.168.0.53 harbor.hizero.local'"
          CMD="$CMD | sudo -n tee -a /etc/hosts"
          CMD="$CMD && sudo -n mkdir -p /etc/docker/certs.d/harbor.hizero.local"
          CMD="$CMD && sudo -n cp ~/harbor-ca.crt"
          CMD="$CMD /etc/docker/certs.d/harbor.hizero.local/ca.crt"
          $SSH "$CMD"
      - name: Manual fallback for DB VM if passwordless sudo unavailable
        if: steps.patch-db.outcome == 'failure'
        run: |
          echo "sudo -n failed on DB VM (no NOPASSWD rule for $DB_USER)."
          echo "DB VM(10.10.20.10)에 $DB_USER 계정으로 직접 접속해서"
          echo "아래 두 줄을 실행해줘 (idempotent):"
          echo "  echo '192.168.0.53 harbor.hizero.local' \\"
          echo "    | sudo tee -a /etc/hosts"
          echo "  sudo mkdir -p /etc/docker/certs.d/harbor.hizero.local \\"
          echo "    && sudo cp ~/harbor-ca.crt \\"
          echo "    /etc/docker/certs.d/harbor.hizero.local/ca.crt"
      - name: Verify Harbor login now works on DB VM
        env:
          PW1: ${{ secrets.DB_VM_SSH_PASSWORD }}
          PW2: ${{ secrets.DB_VM_SSH_PASSWORD_ALT }}
        run: |
          if [ "$DB_PW_SECRET" = "DB_VM_SSH_PASSWORD" ]; then
            export SSHPASS="$PW1"
          else
            export SSHPASS="$PW2"
          fi
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new"
          SSH="$SSH $DB_USER@10.10.20.10"
          $SSH "getent hosts harbor.hizero.local"
          # 작은따옴표 대입 - '$' 포함된 robot 계정명이 bash 변수 참조로
          # 오해석되지 않도록 함(production job과 동일 버그).
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login harbor.hizero.local -u '$USR' \
            --password-stdin"

  # 2026-07-19, b-gateway production 배포 job. non-root/read-only 전환 검증차
  # 처음 추가했지만(격리 환경에서 기동/resolver/temp 경로 생성 전부 검증 완료 후
  # 실제 적용 - run 29675315141에서 라우트 전체 200, /b/admin Lua 분기까지
  # 정상 확인), 이후 b-gateway를 재배포할 유일한 경로라 상시 job으로 유지한다
  # (위 run_bgateway_cutover 입력 주석 참고). workflow_dispatch로 명시적으로
  # 켜야만 실행되고, 나머지 이벤트(push, PR)에서는 절대 안 돈다 - production
  # 유일한 진입점을 건드리는 job이라 자동 트리거는 사고 위험이 크다.
  bgateway-cutover:
    # 첫 실행(run 29675180327)에서 run_bgateway_cutover=true로 dispatch했는데도
    # skipped됨 - backend-deploy-production 주석의 "always() 없으면 커스텀
    # if:에 암묵적 success()가 붙는다"는 문제와 동일할 가능성이 높아 이
    # job도 always()를 명시한다. needs: [backend-checks]도 이 job과
    # 무관한 의존성이라 제거(불필요하게 skip 조건을 늘릴 수 있음).
    if: |
      always() &&
      github.event_name == 'workflow_dispatch' &&
      inputs.run_bgateway_cutover
    runs-on: self-hosted
    env:
      PROD_HOST: bruce@10.10.10.30
    steps:
      - uses: actions/checkout@v4
      - name: Backup current b-gateway state
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          TS=$(date +%Y%m%d-%H%M%S)
          echo "BACKUP_TS=$TS" >> "$GITHUB_ENV"
          CMD="mkdir -p ~/b-gateway-backup-$TS"
          CMD="$CMD && cp -r ~/b-gateway/* ~/b-gateway-backup-$TS/"
          CMD="$CMD && docker inspect b-gateway"
          CMD="$CMD > ~/b-gateway-backup-$TS/docker-inspect.json 2>&1 || true"
          $SSH "$CMD"
          echo "Backed up to ~/b-gateway-backup-$TS on production VM"
      - name: Deploy new files (SCP)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          $SCP infra/b-gateway/docker-compose.yml \
            "$PROD_HOST":~/b-gateway/docker-compose.yml
          $SCP infra/b-gateway/Dockerfile "$PROD_HOST":~/b-gateway/Dockerfile
          $SCP infra/b-gateway/nginx.conf "$PROD_HOST":~/b-gateway/nginx.conf
      - name: Build and recreate (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          CMD="cd ~/b-gateway"
          CMD="$CMD && docker compose build"
          CMD="$CMD && docker compose up -d"
          $SSH "$CMD"
      - name: Route verification
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          sleep 5
          FAIL=""
          check() {
            CHK="curl -s -o /dev/null -w '%{http_code}' $1"
            CODE=$($SSH "$CHK" || echo "000")
            echo "$1 -> $CODE"
            case "$CODE" in
              2*|3*) : ;;
              *) FAIL="1" ;;
            esac
          }
          check "http://localhost:8080/b/search?page=1"
          check "http://localhost:8080/b/recipes"
          check "http://localhost:8080/b/tags/category"
          check "http://localhost:8080/b/home/rank/item"
          $SSH "curl -s -X POST -H 'Content-Type: application/json' \
            -d '{\"menu\":\"product\"}' \
            -o /dev/null -w '/b/admin (product) -> %{http_code}\n' \
            http://localhost:8080/b/admin"
          $SSH "curl -s -X POST -H 'Content-Type: application/json' \
            -d '{\"menu\":\"create-tag\"}' \
            -o /dev/null -w '/b/admin (create-tag) -> %{http_code}\n' \
            http://localhost:8080/b/admin"
          $SSH "docker ps --filter name=b-gateway --format '{{.Status}}'"
          if [ -n "$FAIL" ]; then
            echo "One or more core routes failed"
            exit 1
          fi
      - name: Rollback on failure
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          CMD="cd ~/b-gateway && docker compose down"
          CMD="$CMD && cp ~/b-gateway-backup-$BACKUP_TS/* ~/b-gateway/"
          CMD="$CMD && docker compose up -d"
          $SSH "$CMD"
          echo "Rolled back to pre-cutover state (backup: $BACKUP_TS)"

  # backend-build-test/backend-image-scanning은 서비스별 매트릭스라 체크 이름이
  # "backend-build-test (admin-service)"처럼 매번 달라져서, 브랜치 보호 규칙의
  # 필수 상태 체크에 고정 이름으로 등록할 수가 없다(2026-07-19, 성애님이 PR #47
  # 병합이 막혀있다고 알려줘서 발견 - 브랜치 보호가 요구하던 build-test/
  # image-scanning은 어제 ci_sandbox 정리하면서 삭제한 옛 job 이름이라 영원히
  # 안 생김). 이 job이 매트릭스 결과를 모아 항상 같은 이름으로 보고해서, 이걸
  # 필수 체크로 등록하면 된다 - always()라 매트릭스가 통째로 스킵돼도(백엔드
  # 변경 없는 PR) 정상 통과, 하나라도 failure/cancelled면 실패한다.
  backend-checks:
    needs: [backend-build-test, backend-image-scanning]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate backend matrix results
        run: |
          BT="${{ needs.backend-build-test.result }}"
          IS="${{ needs.backend-image-scanning.result }}"
          echo "backend-build-test=$BT backend-image-scanning=$IS"
          if [ "$BT" = "failure" ] || [ "$BT" = "cancelled" ] || \
             [ "$IS" = "failure" ] || [ "$IS" = "cancelled" ]; then
            echo "backend matrix has a failure/cancellation"
            exit 1
          fi

  # frontend/ 이미지 빌드+스캔+push. 백엔드와 동일한 :sha/:latest 이중 태그 전략을 쓴다.
  # 배포는 아래 frontend-deploy-production job 참고.
  frontend-image-scanning:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.changed == 'true'
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
      - name: Build image
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: frontend
          file: frontend/Dockerfile
          pull: true
          tags: frontend:${{ github.sha }}
          load: true
          cache-from: type=gha,scope=frontend
          cache-to: type=gha,mode=max,scope=frontend
      # backend-image-scanning과 같은 이유(setup-trivy 기본 설치 경로가
      # $HOME/.local/bin/trivy-bin 고정이라 harbor-runner/harbor-runner-2가 동시에
      # 돌면 "Text file busy"로 충돌 - 실제로 2번 재현/확인함) - 러너별 경로에 직접 설치.
      - name: Install Trivy (per-runner path)
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: frontend:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      # frontend/compose.production.example.yaml(성애님 작성)는 FRONTEND_IMAGE에
      # 기본값을 안 두고 명시적인 불변 태그를 요구한다("Set FRONTEND_IMAGE to the
      # Harbor image and immutable tag") - 그래서 :latest를 기본 배포 태그로 쓰지
      # 않고 :sha를 기본으로 쓴다. :latest는 수동 확인/편의용으로만 같이 남긴다.
      - name: Tag and push (sha + latest)
        run: |
          IMAGE="harbor.hizero.local/dangdang/frontend"
          SHA="${{ github.sha }}"
          docker tag "frontend:$SHA" "$IMAGE:$SHA"
          docker tag "frontend:$SHA" "$IMAGE:latest"
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"

  # frontend도 backend-deploy-production과 같은 이유로 production VM(10.10.10.30)에
  # SSH로 배포한다 - frontend가 dangdang-edge에서 b-gateway:8080에 닿으려면 같은
  # Docker 호스트/네트워크에 있어야 하는데, harbor VM은 그 네트워크가 아니다.
  # 트리거/always() 필요성은 backend-deploy-production과 동일(위 주석 참고).
  frontend-deploy-production:
    needs: [frontend-image-scanning, code-scanning]
    # workflow_dispatch는 deploy_target이 frontend/both일 때만 허용(backend-
    # deploy-production 주석의 2026-07-19 근거 참고 - 대상 분리로 불필요한
    # scp 실패/알람 방지).
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'frontend' ||
            inputs.deploy_target == 'both')) ||
        (
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          needs.frontend-image-scanning.result == 'success' &&
          needs.code-scanning.result == 'success'
        )
      )
    runs-on: self-hosted
    env:
      # 2026-07-19 아침, 구 LAN IP(192.168.0.13)가 인프라 공지("당분간 병행
      # 유지")보다 먼저 죽은 걸 실측(ping "Destination Host Unreachable",
      # SSH "No route to host")으로 확인 - harbor/monitoring/DB VM은 구/신
      # IP 둘 다 살아있는데 production VM만 먼저 끊김. 새 App 계층
      # IP(10.10.10.30)로 전환.
      PROD_HOST: bruce@10.10.10.30
      FRONTEND_TAG: ${{ inputs.frontend_tag }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Determine tag
        run: |
          TAG="$FRONTEND_TAG"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Copy compose file to production VM
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          $SSH "mkdir -p ~/frontend"
          $SCP frontend/compose.production.example.yaml \
            "$PROD_HOST":~/frontend/docker-compose.yaml
          # TEMPORARY (infra/frontend/compose.lan-test-override.yaml 헤더 참고) -
          # 실제 도메인/edge proxy 생기면 이 스텝과 override 파일을 삭제할 것.
          $SCP infra/frontend/compose.lan-test-override.yaml \
            "$PROD_HOST":~/frontend/compose.lan-test-override.yaml
      - name: Ensure dangdang-edge network exists
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "docker network inspect dangdang-edge >/dev/null 2>&1 \
            || docker network create dangdang-edge"
      - name: Record previous tag
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          PREV=$($SSH "cat ~/frontend/.last-deployed-tag 2>/dev/null" || true)
          echo "PREV_TAG=$PREV" >> "$GITHUB_ENV"
          echo "Previous deployed tag: ${PREV:-<none>}"
      - name: Log in to Harbor (production VM)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 작은따옴표 대입 - robot 계정명의 '$'가 bash 변수 참조로
          # 오해석되어 문자열이 깨지는 걸 방지(하루 종일 재현됐던
          # "Invalid credentials"의 실제 원인 - 네트워크/CA 문제 아님).
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login harbor.hizero.local -u '$USR' \
            --password-stdin"
      - name: Deploy via Docker Compose (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          IMAGE="harbor.hizero.local/dangdang/frontend:$TAG"
          PUB="${{ secrets.PUBLIC_APP_URL }}"
          GW="${{ secrets.BACKEND_GATEWAY_URL }}"
          FILES="-f docker-compose.yaml -f compose.lan-test-override.yaml"
          CMD="cd ~/frontend && FRONTEND_IMAGE=$IMAGE"
          CMD="$CMD PUBLIC_APP_URL='$PUB' BACKEND_GATEWAY_URL='$GW'"
          CMD="$CMD docker compose $FILES pull"
          CMD="$CMD && FRONTEND_IMAGE=$IMAGE PUBLIC_APP_URL='$PUB'"
          CMD="$CMD BACKEND_GATEWAY_URL='$GW'"
          CMD="$CMD docker compose $FILES up -d"
          $SSH "$CMD"
      - name: Health check (container status + /b/search via gateway)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          FMT='{{.State.Health.Status}}'
          OK=""
          for i in $(seq 1 10); do
            STATUS=$($SSH "docker inspect --format '$FMT' dangdang-frontend" \
              2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              OK=1
              break
            fi
            sleep 3
          done
          if [ -z "$OK" ]; then
            echo "Container health check failed"
            exit 1
          fi
          echo "Container healthy, checking /b/search?page=1 via gateway..."
          CHECK="node -e \"fetch('http://127.0.0.1:3000/b/search?page=1')"
          CHECK="$CHECK .then(r=>{if(!r.ok)process.exit(1)})"
          CHECK="$CHECK .catch(()=>process.exit(1))\""
          if ! $SSH "docker exec dangdang-frontend $CHECK"; then
            echo "/b/search?page=1 check failed (gateway/backend routing)"
            exit 1
          fi
          echo "All checks passed"
      - name: Rollback on failed health check
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous tag: $PREV_TAG"
            IMAGE="harbor.hizero.local/dangdang/frontend:$PREV_TAG"
            PUB="${{ secrets.PUBLIC_APP_URL }}"
            GW="${{ secrets.BACKEND_GATEWAY_URL }}"
            FILES="-f docker-compose.yaml -f compose.lan-test-override.yaml"
            CMD="cd ~/frontend && FRONTEND_IMAGE=$IMAGE"
            CMD="$CMD PUBLIC_APP_URL='$PUB' BACKEND_GATEWAY_URL='$GW'"
            CMD="$CMD docker compose $FILES up -d"
            $SSH "$CMD"
          else
            echo "No previous tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-deployed
        if: success()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "echo $TAG > ~/frontend/.last-deployed-tag"

  # needs에 없는 job이 실패하면 GitHub 기본 동작상 그 job에 의존하는 하위 job들은
  # "실패"가 아니라 "스킵"으로 처리된다 - 그러면 이 job의 needs 안에 실제 실패가
  # 하나도 안 잡혀서 failure()가 false가 되고, notify-on-failure 자체가 조용히
  # 스킵돼 Slack 알람이 아예 안 울린다(2026-07-19, 전체 job 그래프 재점검 중 발견 -
  # detect-backend/detect-frontend가 여기 없었다). 둘 다 추가해서 이 사각지대를 없앤다.
  notify-on-failure:
    needs:
      - detect-backend
      - detect-frontend
      - backend-build-test
      - frontend-build-test
      - code-scanning
      - backend-image-scanning
      - backend-checks
      - frontend-image-scanning
      - backend-deploy-production
      - frontend-deploy-production
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DETECT_BACKEND_RESULT: ${{ needs.detect-backend.result }}
          DETECT_FRONTEND_RESULT: ${{ needs.detect-frontend.result }}
          BACKEND_TEST_RESULT: ${{ needs.backend-build-test.result }}
          FRONTEND_TEST_RESULT: ${{ needs.frontend-build-test.result }}
          CODE_SCANNING_RESULT: ${{ needs.code-scanning.result }}
          BACKEND_SCAN_RESULT: ${{ needs.backend-image-scanning.result }}
          BACKEND_CHECKS_RESULT: ${{ needs.backend-checks.result }}
          FRONTEND_SCAN_RESULT: ${{ needs.frontend-image-scanning.result }}
          BACKEND_DEPLOY_RESULT: ${{ needs.backend-deploy-production.result }}
          FRONTEND_DEPLOY_RESULT: ${{ needs.frontend-deploy-production.result }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="$REPO_URL/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          FAILED_JOBS=""
          add_failed() {
            if [ -z "$FAILED_JOBS" ]; then
              FAILED_JOBS="$1"
            else
              FAILED_JOBS="$FAILED_JOBS, $1"
            fi
          }
          if [ "$DETECT_BACKEND_RESULT" = "failure" ]; then
            add_failed "detect-backend"
          fi
          if [ "$DETECT_FRONTEND_RESULT" = "failure" ]; then
            add_failed "detect-frontend"
          fi
          if [ "$BACKEND_TEST_RESULT" = "failure" ]; then
            add_failed "backend-build-test"
          fi
          if [ "$FRONTEND_TEST_RESULT" = "failure" ]; then
            add_failed "frontend-build-test"
          fi
          [ "$CODE_SCANNING_RESULT" = "failure" ] && add_failed "code-scanning"
          if [ "$BACKEND_SCAN_RESULT" = "failure" ]; then
            add_failed "backend-image-scanning"
          fi
          if [ "$BACKEND_CHECKS_RESULT" = "failure" ]; then
            add_failed "backend-checks"
          fi
          if [ "$FRONTEND_SCAN_RESULT" = "failure" ]; then
            add_failed "frontend-image-scanning"
          fi
          if [ "$BACKEND_DEPLOY_RESULT" = "failure" ]; then
            add_failed "backend-deploy-production"
          fi
          if [ "$FRONTEND_DEPLOY_RESULT" = "failure" ]; then
            add_failed "frontend-deploy-production"
          fi
          TEXT=":x: *${FAILED_JOBS^}* failed on \`$BRANCH\` ($SHA)"
          TEXT="$TEXT\n<$RUN_URL|결과 보기>"
          curl -sf -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"$TEXT\"}" \
            "$SLACK_WEBHOOK_URL"
