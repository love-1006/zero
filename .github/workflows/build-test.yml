name: Build & Test

on:
  # 2026-07-20, push 트리거를 main으로 한정. 그 전엔 전 브랜치 push라서 PR이
  # 열린 브랜치는 같은 코드가 push+pull_request로 "이중 실행"됐다 - (1) 실패
  # 알람이 항상 2배로 오고, (2) 같은 Sonar 프로젝트 키(브랜치명 기반)에 거의
  # 동시에 분석 2건이 들어가 Quality Gate 체크가 CE 태스크 조회 404로 죽는
  # 레이스가 하루 5회 재현됐다(전부 PR 열린 브랜치에서만 발생 - 실측). 배포는
  # 어차피 main push 빌드 이미지만 쓰므로(브랜치 빌드 산출물은 배포 경로에
  # 안 쓰임) 브랜치 검증은 pull_request 실행이 전담해도 손실이 없다. PR 없는
  # 브랜치 push엔 CI가 안 도는 게 유일한 트레이드오프 - PR을 여는 게 팀 표준
  # 플로우이므로 수용(윤경님 사례처럼 "push=배포" 오해도 함께 줄어듦).
  push:
    branches: [main]
  pull_request:
    branches: [main]
  # production VM(재헌님이 이미 구축, 10.10.10.30)에 올리는 실제 배포는 main push 시
  # 자동 실행된다(2026-07-18, 지훈 지시 - "그 대신 CI를 신중하게"로 맞바꿈. 상세 근거는
  # backend-deploy-production job 주석 참고). workflow_dispatch는 이전 태그로 수동
  # 재배포/롤백용으로 남겨둔 것 - tag 입력이 없으면 production의 기본 태그(latest)를 쓴다.
  workflow_dispatch:
    inputs:
      backend_tag:
        # 2026-07-19, well-architected 체크리스트 "latest 배포 금지" 준수 -
        # frontend_tag와 동일하게 기본값을 latest가 아니라 빈 값으로 두고,
        # 비우면 job 내부에서 현재 커밋 sha로 폴백한다(불변 태그 강제).
        # 수동 롤백/특정 버전 재배포는 명시적으로 태그를 넣어서 한다.
        description: '백엔드 배포 태그 (비우면 현재 커밋 sha)'
        required: false
        default: ''
      frontend_tag:
        # frontend compose는 불변 태그를 요구해서(immutable tag) latest를 기본으로
        # 안 두고, 비우면 이번 워크플로 실행의 커밋 sha를 쓴다(job 내부에서 처리).
        description: '프론트 배포 태그 (비우면 현재 커밋 sha)'
        required: false
        default: ''
      frontend_admin_tag:
        # 2026-07-24, Admin Frontend(frontend-admin/) 추가. frontend_tag와 완전히
        # 같은 규칙 - admin compose도 불변 태그를 요구하므로 기본값을 latest로
        # 두지 않고, 비우면 이번 실행의 커밋 sha로 폴백한다(job 내부에서 처리).
        # 별도 입력을 둔 이유: frontend_tag를 공유하면 쇼핑몰 프론트를 특정
        # 태그로 롤백할 때 admin도 그 태그로 강제 배포되는데, 두 앱은 서로
        # 독립적으로 빌드되므로(각자 paths-filter) 그 sha의 admin 이미지가
        # 레지스트리에 없어 pull 실패 → 배포 실패 + 오탐 알람이 난다.
        # 2026-07-19에 backend_tag만 넣었다가 frontend까지 딸려 돌아 실측된
        # 사고와 동일한 패턴이라, 처음부터 태그도 대상도 분리한다.
        description: 'Admin 프론트 배포 태그 (비우면 현재 커밋 sha)'
        required: false
        default: ''
      deploy_target:
        # 2026-07-19, backend_tag만 넣고 백엔드만 수동 재배포하려 했는데
        # frontend-deploy-production까지 무조건 같이 돌아서, frontend/가 아직
        # main에 병합 안 된 상태에서 scp가 "파일 없음"으로 실패하는 걸 실측으로
        # 확인(실서비스 영향은 없었지만 불필요한 실패/알람). 수동 트리거 시
        # 어느 쪽을 배포할지 명시하게 해서 관련 없는 쪽까지 끌려나가는 걸 막는다.
        # none은 bgateway-cutover처럼 backend/frontend 배포 없이 workflow_dispatch
        # 자체만 필요한 일회성 job을 돌릴 때 씀(2026-07-19 추가).
        # 2026-07-20, 기본값을 both -> none으로 변경. loki 청소용으로
        # fix_harbor_dns=true만 주고 workflow_dispatch를 돌렸다가, deploy_target이
        # 기본값 both로 남아 frontend-deploy-production까지 딸려 돌면서 그 커밋
        # SHA로 빌드된 적 없는 frontend 이미지를 pull하려다 "not found"로 실패,
        # 불필요한 Slack 오탐 알람이 떴다(production 영향은 없었음 - pull 단계에서만
        # 실패). 일회성 job(fix_harbor_dns 등)이 목적일 때 매번 deploy_target=none을
        # 기억해서 넘기는 것보다, 기본을 "아무것도 배포 안 함"으로 두고 배포할 때만
        # 명시적으로 선택하게 하는 게 안전하다(자동 push 배포 경로는 이 입력을
        # 참조하지 않는 별도 조건이라 영향 없음). 하루 종일 적용해온 "production을
        # 건드리는 건 명시적 opt-in" 원칙과도 일관됨.
        # 2026-07-24, frontend-admin 추가. frontend에 묶지 않고 별도 옵션으로
        # 둔 이유는 frontend_admin_tag 주석 참고(대상 분리가 이 입력의 존재
        # 이유 그 자체). both의 의미는 기존 그대로 backend + frontend(쇼핑몰)로
        # 유지한다 - 이미 문서화되어 쓰이고 있는 옵션의 폭발 반경을 조용히
        # 넓히는 건, 07-20에 기본값을 both -> none으로 바꾼 "production을
        # 건드리는 건 명시적 opt-in" 원칙과 어긋난다. 3개를 한 번에 배포할
        # 일이 생기면 dispatch를 두 번 돌린다.
        description: >-
          수동 배포 대상 (기본 none - 배포하려면 명시적으로 선택.
          both = backend + frontend(쇼핑몰), admin은 별도 선택)
        required: false
        default: 'none'
        type: choice
        options:
          - none
          - both
          - backend
          - frontend
          - frontend-admin
      run_bgateway_cutover:
        # 2026-07-19, b-gateway non-root/read-only 전환 검증차 처음 추가했으나
        # prod-env-fix류 일회성 job과 달리, b-gateway는 이 job 전엔 자동화된
        # production 배포 경로가 아예 없었다(수동 SSH뿐). backend/frontend-
        # deploy-production과 같은 급의 상시 배포 수단으로 남긴다 - 검증 후
        # 삭제하지 않음. push 자동 배포로 안 바꾼 이유: b-gateway는 nginx.conf
        # 라우팅 로직이 변경 빈도가 낮고 변경 시 파급력이 커서(전체 트래픽의
        # 유일한 진입점), backend/frontend처럼 매 push 자동 배포보다 명시적
        # workflow_dispatch 승인을 유지하는 게 안전하다고 판단.
        description: 'b-gateway 배포 (백업+빌드+재기동+라우트 검증, 실패시 롤백)'
        required: false
        default: false
        type: boolean

# 같은 브랜치에 연달아 push되면 deploy job이 harbor VM에 동시에 두 번 돌 수 있어서
# (docker compose up이 겹치는 배포 사고로 이어질 수 있음), main push에서는 순차 실행을
# 강제하고 진행 중인 배포를 취소하지 않는다(cancel-in-progress: false).
# 반면 PR에 커밋을 연달아 push하는 경우는 배포가 아니라서 취소해도 안전한데, 기존엔
# false를 전체에 고정해둬서 옛 커밋의 실행이 self-hosted 러너 1대를 계속 붙잡고 있었다
# (공식 문서: cancel-in-progress는 github.ref/event_name 기준 조건식으로 다르게 줄 수 있음 -
# yamllint disable-line rule:line-length
# https://docs.github.com/actions/using-workflows/control-the-concurrency-of-workflows-and-jobs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

# GITHUB_TOKEN 기본 권한을 워크플로 파일에 명시적으로 최소화한다. 저장소 설정(현재 read)에만
# 의존하면, 나중에 누군가 저장소 기본값을 write로 바꿀 때 이 워크플로도 같이 영향을 받는다 -
# 공식 하드닝 가이드 권고. pull-requests: read는 dorny/paths-filter가 PR의 변경 파일
# 목록을 GitHub API로 조회할 때 필요(처음엔 안 넣었다가 "Resource not accessible by
# integration" 에러로 실제 PR 실행에서 확인 후 추가함):
# yamllint disable-line rule:line-length
# https://docs.github.com/actions/security-guides/security-hardening-for-github-actions
permissions:
  contents: read
  pull-requests: read

jobs:
  # backend/ 디렉터리 존재 여부를 먼저 체크아웃해서 확인한다. job 레벨 if:는 체크아웃 전
  # (파일시스템에 아직 접근 못 하는 시점)에 평가되기 때문에 hashFiles()를 job 레벨 if:에서
  # 바로 쓸 수 없다(실제로 시도했다가 "Unrecognized function: hashFiles" 에러로 확인함) -
  # 그래서 이렇게 별도 job에서 먼저 체크아웃 후 확인해 output으로 넘기는 방식이 필요하다.
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      # workflow_dispatch에는 event.before(직전 커밋)가 없어서 paths-filter가
      # 비교 기준을 못 잡고 8개 서비스 전부를 "바뀜"으로 취급한다(dorny/paths-filter
      # 로그의 "before field is missing" 경고로 확인) - 2026-07-19, workflow_dispatch
      # 트리거마다 불필요하게 8개 전체 재빌드+Trivy 스캔이 돌아 10~15분씩 낭비되는
      # 걸 실측으로 확인. workflow_dispatch는 애초에 "이미 빌드된 태그로 수동
      # 재배포/롤백"용이라 재빌드가 필요 없으므로, 이 이벤트에서는 매트릭스를
      # 빈 배열로 강제해 backend-image-scanning을 통째로 스킵시킨다.
      services: >-
        ${{ github.event_name == 'workflow_dispatch' && '[]' ||
        steps.filter.outputs.changes }}
      # 2026-07-20, b-gateway(nginx 라우팅) 자동배포용 - main push에서
      # infra/b-gateway/** 가 바뀌었는지. workflow_dispatch에선 before가 없어
      # 신뢰 불가하지만, cutover의 수동 경로는 inputs.run_bgateway_cutover를
      # 쓰고 이 출력은 push 경로에서만 참조하므로 무방하다.
      # PR #61에서 실측한 버그의 교훈으로 별도 스텝(filter-bgateway)으로 분리 -
      # 처음에 위 filter 스텝에 같이 넣었더니, 그 스텝의 changes 출력(=서비스
      # 매트릭스)에 "bgateway"가 섞여서 backend-build-test가 존재하지 않는
      # backend/bgateway/ 디렉터리를 빌드하려다 실패했다. paths-filter의
      # changes는 "매칭된 모든 필터 이름"이라 서비스 아닌 필터를 같은 스텝에
      # 두면 안 된다.
      bgateway: ${{ steps.filter-bgateway.outputs.bgateway }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - id: check
        run: |
          if [ -d backend ] && [ -n "$(find backend -type f | head -1)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      # 8개 서비스 중 이번 커밋에서 실제로 파일이 바뀐 서비스만 골라 backend-build-test/
      # backend-image-scanning 매트릭스에 넘긴다. 예전엔 커밋 하나에서 서비스 1개만 고쳐도
      # 8개 전부 다시 빌드+Trivy 스캔을 돌려서, self-hosted 러너 1대에 큐가 쌓여 실제로
      # 51분까지 걸린 적이 있었음(2026-07-16 직접 확인) - dorny/paths-filter(변경 경로 기반
      # 매트릭스 생성의 공식 예시 패턴)로 필요한 것만 돌리게 줄인다.
      # 2026-07-20, PR #52(backend/ai 신규 서비스 추가)에서 backend-build-test/
      # backend-image-scanning이 전부 skip되는 걸 실측 확인 - 이 필터 목록이
      # 서비스별로 하드코딩돼 있어서, 새 서비스 디렉터리를 추가해도 여기 안
      # 넣으면 dorny/paths-filter의 changes 출력에 아예 안 잡히고(빈 배열),
      # 매트릭스가 통째로 비어 skip된다. 새 backend/<service> 디렉터리를
      # 추가할 때마다 이 목록에도 반드시 같이 추가해야 한다 - 자동 탐지가
      # 아니라 수동 allowlist라는 게 이 워크플로우의 구조적 한계.
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter
        if: steps.check.outputs.exists == 'true'
        with:
          filters: |
            admin-service: 'backend/admin-service/**'
            ai: 'backend/ai/**'
            community-service: 'backend/community-service/**'
            diet-service: 'backend/diet-service/**'
            ingredients-service: 'backend/ingredients-service/**'
            login-service: 'backend/login-service/**'
            main-service: 'backend/main-service/**'
            product-service: 'backend/product-service/**'
            recipe-service: 'backend/recipe-service/**'
      # b-gateway 변경 감지는 반드시 위 서비스 필터와 분리된 스텝이어야 한다
      # (outputs.bgateway 주석 참고 - 같은 스텝에 넣으면 changes 매트릭스 오염).
      # backend/ 디렉터리 존재 여부와 무관하게 항상 평가한다(if 없음).
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter-bgateway
        with:
          filters: |
            bgateway: 'infra/b-gateway/**'
      # 2026-07-20, 위 allowlist의 구조적 한계(새 서비스 추가 시 안 고치면 조용히
      # skip) 자체를 없애지는 못하지만(dorny/paths-filter는 디렉터리 자동탐지를
      # 지원 안 함 - 공식 문서 확인), 최소한 "조용한 스킵"을 "시끄러운 실패"로
      # 바꾼다. backend/services는 실제 서비스가 아니라 문서(.md) 폴더라 예외.
      # 새 backend/<name> 디렉터리가 생기면 이 job이 즉시 실패하면서 어디를
      # 고쳐야 하는지 알려준다 - PR #52처럼 아무도 못 알아채고 넘어가는 걸 방지.
      # 2026-07-24, 이 가드가 실제로는 자기 주장을 검증하지 않고 있었다.
      # 에러 메시지는 "paths-filter / SERVICES / PORTS 세 곳에 다 넣어라"라고
      # 하는데, 검사 대상은 그 셋이 아니라 이 스텝 안의 KNOWN 목록 하나뿐이었다.
      # 즉 새 서비스를 KNOWN에만 넣고 SERVICES나 PORTS를 빠뜨리면 가드는
      # 통과하고, 그 서비스는 빌드/스캔은 되는데 배포에서 조용히 빠진다 -
      # PR #52에서 겪은 "조용한 스킵"이 가드를 켜둔 채로도 그대로 재현되는
      # 상태였다. KNOWN이라는 네 번째 하드코딩 목록 자체가 위험 요소이기도 했다.
      #
      # 이제 KNOWN을 없애고 워크플로우 파일 자신을 읽어 실제 세 목록을 직접
      # 대조한다. 목록을 하나 줄이면서(4개 -> 3개), 가드가 말하는 내용과
      # 검사하는 내용을 일치시킨다.
      - name: Fail loudly if a backend/ dir isn't wired into all three lists
        if: steps.check.outputs.exists == 'true'
        run: |
          WF=.github/workflows/build-test.yml
          # SERVICES는 여러 줄 folded 스칼라라 블록만 잘라내서 대조한다.
          # 종료 조건은 "다음 키"가 아니라 "스칼라 본문 들여쓰기(8칸)를 벗어남"
          # 이어야 한다 - 다음 키 기준으로 자르면 사이에 낀 주석까지 블록에
          # 딸려 들어와, 주석에서만 언급된 서비스명이 배선된 것처럼 통과한다
          # (2026-07-24 이 가드를 실제로 돌려보다 발견).
          SERVICES_BLOCK=$(awk '
            /^      SERVICES: >-/ {f=1; next}
            f && !/^        [a-z]/ {f=0}
            f {print}
          ' "$WF")
          RC=0
          for dir in backend/*/; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            [ "$name" = "services" ] && continue
            missing=""
            grep -q "^            $name: 'backend/$name/\*\*'$" "$WF" \
              || missing="$missing detect-backend의-paths-filter"
            printf '%s' "$SERVICES_BLOCK" \
              | grep -qE "(^|[[:space:]])$name([[:space:]]|$)" \
              || missing="$missing backend-deploy-production의-SERVICES"
            grep -q "\[$name\]=" "$WF" \
              || missing="$missing backend-deploy-production의-PORTS"
            if [ -n "$missing" ]; then
              echo "::error::backend/$name 이(가) 다음에 빠져 있습니다:" \
                "$missing. 세 곳 모두에 추가해야 build/scan/deploy가" \
                "정상 동작합니다(하나라도 빠지면 조용히 스킵됩니다)."
              RC=1
            fi
          done
          exit $RC

  # detect-backend와 같은 이유로 별도 job - frontend/ 존재 여부와 변경 여부를 체크아웃 후
  # 확인해서 넘긴다(2026-07-17 성애님 frontend/ 브랜치 인수 - sungA/front/main).
  detect-frontend:
    runs-on: ubuntu-latest
    outputs:
      # detect-backend와 같은 이유(workflow_dispatch엔 diff 기준이 없음) - 수동
      # 트리거에서는 프론트도 재빌드 대상에서 뺀다.
      changed: >-
        ${{ github.event_name == 'workflow_dispatch' && 'false' ||
        steps.filter.outputs.frontend }}
      # 2026-07-24, Admin Frontend(frontend-admin/) 추가. 별도 detect job을
      # 새로 만들지 않고 이 job에 얹은 이유는 detect-backend가 이미 같은
      # 구조이기 때문(서비스 필터 + 별도 filter-bgateway 스텝).
      # 두 앱이 서로를 끌고 돌지 않는 근거: dorny/paths-filter의 글롭은 경로
      # 구분자를 문자 그대로 매칭하므로 'frontend/**'는 'frontend-admin/...'을
      # 잡지 않는다(그 반대도 마찬가지). 즉 쇼핑몰 프론트만 고친 커밋에서
      # admin 파이프라인이 도는 일은 없다.
      admin_changed: >-
        ${{ github.event_name == 'workflow_dispatch' && 'false' ||
        steps.filter-admin.outputs.admin }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter
        with:
          # 2026-07-24, infra/frontend/** 를 감시 대상에 추가한다.
          # 배포 job이 앱 이미지 말고도 infra/frontend/compose.lan-test-override
          # .yaml 을 매 배포마다 scp해서 -f로 겹쳐 올리는데, 그 파일이 감시 밖에
          # 있어서 그것만 바뀐 커밋은 "프론트 변경 없음"으로 잡혔다. 그러면
          # image-scanning이 skip되고, 배포 job 조건이
          # `image-scanning.result == 'success'` 이므로 배포까지 통째로 skip된다.
          # 즉 머지는 됐는데 프로덕션엔 아무것도 반영되지 않는다(실측: PR #160).
          # 감지 대상은 "배포 입력이 되는 모든 파일"이어야 한다.
          filters: |
            frontend:
              - 'frontend/**'
              - 'infra/frontend/**'
      # detect-backend의 filter-bgateway와 같은 이유로 반드시 별도 스텝이다.
      # 지금은 이 job이 changes가 아니라 이름 있는 출력만 읽어서 한 스텝에
      # 합쳐도 동작하지만, PR #61에서 필터를 한 스텝에 섞었다가 changes 출력이
      # 오염돼 매트릭스가 깨진 전례가 있어 구조를 통일해 둔다.
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter-admin
        with:
          # 위 frontend 필터와 같은 이유로 infra/frontend-admin/** 포함
          # (loopback override 파일이 여기 있고 배포마다 scp된다).
          filters: |
            admin:
              - 'frontend-admin/**'
              - 'infra/frontend-admin/**'
      # 2026-07-24, detect-backend의 "Fail loudly" 가드를 프론트에도 복제한다.
      # 그동안 프론트는 앱이 하나뿐이라 안 만들었지만, frontend-admin이 생기며
      # 백엔드와 똑같은 구조적 한계(수동 allowlist)를 갖게 됐다. PR #52에서
      # backend/ai가 파이프라인 어디에도 안 걸려 조용히 skip된 사고와 같은
      # 일이, 앞으로 frontend-<앱>이 추가될 때 그대로 재현될 수 있다.
      # 새 프론트 앱 디렉터리가 생기면 이 job이 즉시 실패하면서 어디를
      # 고쳐야 하는지 알려준다.
      # detect-backend의 가드와 같은 방식으로, KNOWN 목록 대신 워크플로우 파일
      # 자신을 읽어 실제 배선을 대조한다(그쪽 주석의 2026-07-24 근거 참고 -
      # 처음엔 여기도 KNOWN 목록으로 만들었다가 같은 결함이라 함께 고쳤다).
      # 프론트 앱은 paths-filter / build-test / image-scanning / sonar sources
      # 네 곳에 배선돼야 하고, 하나라도 빠지면 그 앱은 조용히 스킵되거나
      # (더 나쁘게는) 정적분석 없이 배포된다.
      - name: Fail loudly if a frontend app dir isn't fully wired
        run: |
          WF=.github/workflows/build-test.yml
          RC=0
          for dir in frontend*/; do
            [ -d "$dir" ] || continue
            name="$(basename "$dir")"
            missing=""
            # 2026-07-24, 필터가 한 줄 형식에서 다중 패턴 리스트 형식으로
            # 바뀌면서 이 grep도 같이 바꾼다. 안 바꾸면 배선이 멀쩡한데도
            # 가드가 "paths-filter 누락"으로 판정해 detect-frontend가 통째로
            # 실패한다(필터 수정 중 실제로 걸린 회귀).
            #   before: "            admin: 'frontend-admin/**'"
            #   after : "              - 'frontend-admin/**'"
            grep -qE "^ +- '$name/\*\*'\$" "$WF" \
              || missing="$missing detect-frontend의-paths-filter"
            grep -q "^        working-directory: $name$" "$WF" \
              || missing="$missing build-test-job"
            grep -q "^          context: $name$" "$WF" \
              || missing="$missing image-scanning-job"
            grep -q "^          add_source $name$" "$WF" \
              || missing="$missing code-scanning의-sonar-sources"
            if [ -n "$missing" ]; then
              echo "::error::$name/ 이(가) 다음에 빠져 있습니다: $missing." \
                "네 곳 모두에 배선해야 합니다 - 특히 sonar sources가 빠지면" \
                "정적분석을 한 번도 안 거친 코드가 배포됩니다."
              RC=1
            fi
          done
          exit $RC

  # Node.js 22.15.0/npm 10.9.2 고정(프론트 인수 조건 명시값). tsc --noEmit 기반 typecheck를
  # lint로도 겸용한다(frontend/package.json 기준, 별도 ESLint 아직 미도입).
  frontend-build-test:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.changed == 'true'
    runs-on: ubuntu-latest
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Node.js
        # v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.15.0'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json
      - name: Install dependencies
        working-directory: frontend
        run: npm ci
      - name: Typecheck
        working-directory: frontend
        run: npm run typecheck
      - name: Build
        working-directory: frontend
        run: npm run build

  # 2026-07-24, Admin Frontend. frontend-build-test와 동일한 구성이며
  # (Node 22.15.0/npm 10.9.2 고정, tsc --noEmit 겸용 typecheck), 다른 점은
  # 작업 디렉터리와 캐시 키(frontend-admin/package-lock.json)뿐이다.
  # 별도 job으로 둔 이유: 두 앱은 각자의 paths-filter로 독립 실행돼야 하고
  # (한쪽만 고친 커밋에서 다른 쪽까지 빌드하면 러너 낭비), 브랜치 보호의
  # 필수 체크에도 각각 고정된 이름으로 등록할 수 있어야 한다.
  frontend-admin-build-test:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.admin_changed == 'true'
    runs-on: ubuntu-latest
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Node.js
        # v4
        uses: actions/setup-node@49933ea5288caeca8642d1e84afbd3f7d6820020
        with:
          node-version: '22.15.0'
          cache: 'npm'
          cache-dependency-path: frontend-admin/package-lock.json
      - name: Install dependencies
        working-directory: frontend-admin
        run: npm ci
      - name: Typecheck
        working-directory: frontend-admin
        run: npm run typecheck
      - name: Build
        working-directory: frontend-admin
        run: npm run build

  # backend/*-service는 아직 자체 테스트가 없어서(재헌님 인계 메모 확인, 2026-07-16 기준)
  # pytest를 강제하지 않는다 - 지금 강제하면 테스트 부재로 전부 빨간불이 되어 정작 봐야 할
  # 진짜 실패 신호가 묻힌다. 대신 의존성 설치 + import 스모크 체크로 "최소한 뜨는 코드인가"만
  # 지금 단계에서 검증하고, 테스트가 생기면 이 스텝에 pytest를 추가하면 된다.
  backend-build-test:
    # backend/ 디렉터리가 없거나(main엔 있음), 이번 커밋에서 바뀐 백엔드 서비스가 하나도
    # 없으면(예: docs만 수정) 건너뛴다. services가 빈 배열이면 매트릭스에 항목이 없어
    # 그냥 아무 것도 안 도는데, 그래도 if 조건으로 한 번 더 명시해서 의도를 분명히 한다.
    needs: detect-backend
    if: >-
      needs.detect-backend.outputs.exists == 'true' &&
      needs.detect-backend.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-backend.outputs.services) }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        # v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/${{ matrix.service }}/requirements.txt
      - name: Import smoke check
        working-directory: backend/${{ matrix.service }}
        run: python -c "import app.main"
      # 2026-07-21, pytest opt-in 게이트: tests/test_smoke.py가 있는 서비스만
      # 그 파일을 실행(전체 스위트 강제 아님 - 외부의존 테스트가 많은 서비스가
      # CI에서 막히는 것 방지). 소유자가 test_smoke.py를 추가하면 자동 활성.
      - name: Pytest smoke (opt-in)
        working-directory: backend/${{ matrix.service }}
        run: |
          if [ -f tests/test_smoke.py ]; then
            pip install -q pytest httpx
            python -m pytest tests/test_smoke.py -q
          else
            echo "tests/test_smoke.py 없음 - 건너뜀 (opt-in)"
          fi

  # 아래부터는 내부 SonarQube/Harbor에 접근해야 하므로 self-hosted(harbor VM) 러너에서 실행
  code-scanning:
    runs-on: self-hosted
    # 2026-07-19, job 88199171036 실패로 실측: main 대상 PR이 열려있는 브랜치에 push하면
    # push 이벤트와 pull_request 이벤트가 같은 커밋을 각각 트리거한다. 워크플로 상단의
    # concurrency(github.ref 기준)는 이 둘을 안 묶는다 - push는 refs/heads/<branch>,
    # pull_request는 refs/pull/<n>/merge라 ref 자체가 다르기 때문. 그 결과 같은 커밋이
    # 같은 SonarQube projectKey로 동시에 두 번 제출돼 Compute Engine에서 충돌, "Error 500
    # on /api/ce/submit"으로 실패했다. sha 기준으로 이 잡만 별도 그룹을 줘서 push/pull_request
    # 어느 쪽이든 같은 커밋이면 하나만 SonarQube에 제출되게 한다. (배포 잡들의 ref 기준
    # concurrency는 그대로 둔다 - sha 기준으로 바꾸면 서로 다른 커밋의 연속 배포를 더 이상
    # 순차 실행시키지 못해 원래 막으려던 배포 겹침 문제가 재발한다.)
    concurrency:
      group: sonar-${{ github.sha }}
      cancel-in-progress: true
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # frontend/backend 존재 여부에 따라 sonar.sources를 동적으로 구성한다 -
      # sonar-project.properties에 고정값을 두면, 아직 해당 디렉터리가 없는 브랜치(main에
      # sungA/front/main이 병합되기 전 등)에서 sonar-scanner가 "폴더가 없다"며 바로
      # 실패한다(실제로 확인함).
      #
      # projectKey도 여기서 브랜치별로 분리한다 - SonarQube Community Edition은 유료
      # 브랜치 분석 기능이 없어서, sonar.branch.name을 줘도 무시되고 모든 브랜치가
      # 같은 zerocheck 프로젝트/같은 "new code" 타임라인에 섞여 들어간다. 2026-07-19,
      # 재헌님 브랜치 동기화 직후 push/PR 두 분석이 2초 간격으로 같은 프로젝트에
      # 동시에 쓰다가 Quality Gate 결과가 서로 다르게 나오는 걸 실측으로 확인
      # (Sonar API로 project_analyses 조회, 13:57:40/13:57:42 두 건 확인). main은
      # 기존 zerocheck 프로젝트(히스토리 보존)를 그대로 쓰고, 다른 브랜치는
      # zerocheck-branch-<브랜치명>으로 완전히 분리한다 - 새로 생기는 프로젝트가
      # 전부 ZeroCheck Launch Gate(기본 게이트로 지정 완료)를 물려받는다.
      - name: Determine sonar sources and project key
        id: sonar-sources
        # 2026-07-24, 브랜치명을 run 스크립트 안에 직접 보간하던 것을 env로 옮긴다.
        # `BRANCH="${{ github.head_ref }}"` 형태는 컨텍스트 값이 쉘 스크립트에
        # 그대로 치환된 뒤 실행되는 구조라, 값에 따옴표나 명령치환이 들어가면
        # 러너에서 임의 명령이 실행된다(브랜치 이름에는 큰따옴표가 들어갈 수 있다).
        # 공식 하드닝 가이드가 지목하는 script injection 패턴이고, 권고 완화책이
        # 정확히 "중간 환경변수를 거쳐라"이다:
        # yamllint disable-line rule:line-length
        # https://docs.github.com/en/actions/security-for-github-actions/security-guides/security-hardening-for-github-actions#understanding-the-risk-of-script-injections
        env:
          BRANCH_RAW: ${{ github.head_ref || github.ref_name }}
        #
        # 2026-07-24, frontend-admin 추가. 이 목록이 하드코딩이라, 새 앱을 여기
        # 안 넣으면 그 앱은 SonarQube 분석 대상에서 통째로 빠진다. 그런데
        # <앱>-deploy-production은 needs에 code-scanning을 넣으므로, 결과적으로
        # "그 앱 코드를 한 줄도 안 본 Quality Gate"가 초록불로 배포를 승인하게
        # 된다 - 관리자 권한을 다루는 앱에서는 특히 위험한 사각지대라 파이프라인
        # 복제와 같은 PR에서 반드시 함께 넣어야 한다(detect-frontend의 Fail
        # loudly 가드가 이걸 잊었을 때 잡아준다).
        run: |
          SOURCES=""
          add_source() {
            [ -d "$1" ] || return 0
            if [ -n "$SOURCES" ]; then
              SOURCES="$SOURCES,$1"
            else
              SOURCES="$1"
            fi
          }
          add_source frontend
          add_source frontend-admin
          add_source backend
          echo "sources=$SOURCES" >> "$GITHUB_OUTPUT"

          BRANCH="$BRANCH_RAW"
          if [ "$BRANCH" = "main" ]; then
            PROJECT_KEY="zerocheck"
          else
            SAFE_BRANCH=$(echo "$BRANCH" | tr '/' '-' | tr -cd 'a-zA-Z0-9._-')
            PROJECT_KEY="zerocheck-branch-$SAFE_BRANCH"
          fi
          echo "project_key=$PROJECT_KEY" >> "$GITHUB_OUTPUT"
      # 2026-07-24, 브랜치용 임시 프로젝트를 분석 전에 초기화한다.
      #
      # 문제: Community Edition에 브랜치 분석이 없어서 브랜치마다 별도 프로젝트
      # (zerocheck-branch-<브랜치명>)를 쓰는데, 이 프로젝트에 분석이 2회 이상
      # 쌓이면 "신규 코드"의 분모가 직전 분석 이후 변경분으로 확 줄어든다.
      # 그러면 코드가 전혀 안 바뀌었는데도 비율 기반 조건이 터진다.
      # 2026-07-24 PR #152 실측: 1차 분석은 통과했는데, 커밋을 하나 더 올린 뒤
      # 2차 분석에서 new_lines=69 / new_duplicated_lines=15 ->
      # new_duplicated_lines_density 21.7% > 3%로 Quality Gate 실패.
      # 중복 자체는 frontend-admin/app/b/[...path]/route.ts(프론트 앱 두 개가
      # 각자 갖는 프록시 라우트 보일러플레이트)로 main의 zerocheck 프로젝트에서는
      # 같은 코드가 정상 통과한다 - 즉 코드 결함이 아니라 우회책의 부작용이다.
      # 결과적으로 "PR에 커밋을 두 번 이상 올리면 게이트가 터진다"는, 재현되지만
      # 아무도 원인을 모르는 실패가 만들어진다.
      #
      # 조치: 브랜치 프로젝트는 애초에 일회용이므로 분석 전에 지운다. 그러면 매
      # 실행이 항상 "첫 분석"이 되어 브랜치의 전체 코드가 동일한 기준으로 평가된다
      # (main의 zerocheck는 히스토리를 보존해야 하므로 건드리지 않는다).
      # 덤으로 SonarQube에 죽은 브랜치 프로젝트가 무한히 쌓이는 것도 막는다.
      # 게이트를 느슨하게 만드는 게 아니다 - 평가 대상이 "직전 push 이후 몇 줄"에서
      # "이 브랜치 코드 전체"로 넓어지므로 오히려 더 엄격하다.
      # 삭제 권한이 없거나 실패해도 분석 자체는 진행한다(경고만).
      - name: Reset ephemeral branch project (non-main only)
        if: steps.sonar-sources.outputs.project_key != 'zerocheck'
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
          PROJECT_KEY: ${{ steps.sonar-sources.outputs.project_key }}
        run: |
          CODE=$(curl -s -o /dev/null -w '%{http_code}' -u "$SONAR_TOKEN:" \
            -X POST "$SONAR_HOST_URL/api/projects/delete?project=$PROJECT_KEY" \
            || echo "000")
          case "$CODE" in
            204) echo "브랜치 프로젝트 초기화 완료: $PROJECT_KEY" ;;
            404) echo "브랜치 프로젝트 없음(첫 분석): $PROJECT_KEY" ;;
            *)
              echo "::warning::브랜치 프로젝트 초기화 실패(HTTP $CODE)." \
                "분석은 계속하지만, 2회차 이상 분석이면 신규코드 분모 축소로" \
                "Quality Gate가 오탐할 수 있음."
              ;;
          esac
      - name: SonarQube scan
        # v6
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # yamllint disable-line rule:line-length
        with:
          args: >-
            -Dsonar.sources=${{ steps.sonar-sources.outputs.sources }}
            -Dsonar.projectKey=${{ steps.sonar-sources.outputs.project_key }}
            -Dsonar.projectName=${{ steps.sonar-sources.outputs.project_key }}
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}
      # 배포 승인 절차(workflow_dispatch)를 없애고 push 시 자동 배포로 바꾸면서
      # (2026-07-18, 지훈 지시 - "그 대신 CI를 신중하게"), 지금까지는 스캔만 하고
      # 결과를 강제하지 않던 SonarQube를 실제 게이트로 승격한다. 이 스텝 전까지는
      # Quality Gate가 실패해도 code-scanning job 자체는 초록불이었다.
      - name: SonarQube Quality Gate check
        # v1.2.0
        uses: SonarSource/sonarqube-quality-gate-action@cf038b0e0cdecfa9e56c198bbb7d21d751d62c3b  # yamllint disable-line rule:line-length
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}

  # backend/*-service 이미지를 빌드+스캔하고, 통과한 것만 Harbor에 push한다. 태그는
  # 두 개: :<sha>(추적/롤백용, 불변)와 :latest(배포용, 이동 태그 - 재헌님 production
  # compose의 기본 태그 컨벤션과 맞춤). 커밋마다 바뀐 서비스만 다시 빌드되므로
  # (paths-filter 매트릭스), 안 바뀐 서비스의 :latest는 이전 그대로 유지되고 바뀐
  # 서비스만 :latest가 갱신되는 방식으로 8개 서비스의 "부분 배포"를 자연스럽게 처리한다.
  backend-image-scanning:
    needs: detect-backend
    if: >-
      needs.detect-backend.outputs.exists == 'true' &&
      needs.detect-backend.outputs.services != '[]'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-backend.outputs.services) }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      # 2026-07-21, frontend와 동일한 registry 캐시 구성(PR#101에서 검증,
      # 첫 main 가동 실측 130초→12초): per-job 빌더에 host 네트워크(DNS)
      # + Harbor CA 구운 buildkit 이미지(TLS) 지정.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
        with:
          driver-opts: |
            network=host
            image=harbor.hizero.local/dangdang/buildkit-harbor:v1
      # registry 캐시 push(cache-to)에 빌드 시점 인증 필요 - 로그인을 빌드
      # 앞으로 이동. PR 실행에서도 로그인하지만 이미지 push는 여전히 아래
      # main 가드 스텝에서만 한다(캐시 blob만 push됨).
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
          logout: false
      # ---- build-once (2026-07-23): frontend와 동일 패턴을 매트릭스에 적용 ----
      # PR run: 서비스별 build+scan 후 staging repo push. main run: 재빌드 없이
      # PR 때 스캔된 이미지를 production repo로 digest 승격(+무결성 검증). 소스
      # 부재 시 fallback 빌드(아래 스텝 if 참고). PR head sha는 공식
      # actions/github-script + commit->PR API로 조회(러너 gh 의존 없음).
      - name: Resolve PR head sha (main only)
        id: prhead
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # v7
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          result-encoding: string
          script: |
            const { data: prs } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
            return prs.length ? prs[0].head.sha : '';
      - name: Check staging source (main only)
        id: src
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          SVC="${{ matrix.service }}"
          STAGING="harbor.hizero.local/dangdang-backend/$SVC-staging"
          HEAD_SHA="${{ steps.prhead.outputs.result }}"
          FOUND="false"
          if [ -n "$HEAD_SHA" ] && \
             docker buildx imagetools inspect \
               "$STAGING:$HEAD_SHA" >/dev/null 2>&1; then
            FOUND="true"
          fi
          {
            echo "head_sha=$HEAD_SHA"
            echo "found=$FOUND"
            echo "staging=$STAGING"
          } >> "$GITHUB_OUTPUT"
          echo "[$SVC] promote src: head=$HEAD_SHA found=$FOUND"
      - name: Promote staging image (digest copy)
        if: steps.src.outputs.found == 'true'
        run: |
          SVC="${{ matrix.service }}"
          STAGING="${{ steps.src.outputs.staging }}"
          HEAD_SHA="${{ steps.src.outputs.head_sha }}"
          IMAGE="harbor.hizero.local/dangdang-backend/$SVC"
          SHA="${{ github.sha }}"
          SRC="sha256:$(docker buildx imagetools inspect --raw \
            "$STAGING:$HEAD_SHA" | sha256sum | cut -d' ' -f1)"
          docker buildx imagetools create \
            -t "$IMAGE:$SHA" -t "$IMAGE:latest" "$STAGING:$HEAD_SHA"
          DST_RAW="$(docker buildx imagetools inspect --raw "$IMAGE:$SHA")"
          DST="sha256:$(printf '%s' "$DST_RAW" | sha256sum | cut -d' ' -f1)"
          MATCH=false
          if [ "$DST" = "$SRC" ]; then MATCH=true; fi
          if printf '%s' "$DST_RAW" | grep -q "$SRC"; then MATCH=true; fi
          if [ "$MATCH" = true ]; then
            echo "[$SVC] integrity OK: $DST refs/eq $SRC"
          else
            echo "::error::[$SVC] promoted != scanned $SRC"
            exit 1
          fi
      - name: Build image
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: backend/${{ matrix.service }}
          pull: true
          tags: backend-${{ matrix.service }}:${{ github.sha }}
          load: true
          cache-from: type=registry,ref=harbor.hizero.local/dangdang-backend/buildcache-${{ matrix.service }}:cache  # yamllint disable-line rule:line-length
          cache-to: type=registry,ref=harbor.hizero.local/dangdang-backend/buildcache-${{ matrix.service }}:cache,mode=max,image-manifest=true,oci-mediatypes=true  # yamllint disable-line rule:line-length
      # setup-trivy 기본 설치 경로가 $HOME/.local/bin/trivy-bin로 고정돼 있어
      # harbor-runner/harbor-runner-2가 동시에 스캔을 돌리면 "Text file busy"로
      # 충돌한다(실제로 재현함). 러너별 경로에 직접 설치하고 trivy-action의 재설치는
      # 건너뛴다.
      - name: Install Trivy (per-runner path)
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: backend-${{ matrix.service }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      # (2026-07-21) Harbor 로그인은 registry 캐시 때문에 Build image 앞으로
      # 이동됨. logout:false 유지 이유(2026-07-19, PR#49 실측): 매트릭스 병렬
      # job들이 같은 $HOME/.docker/config.json을 공유해, 먼저 끝난 job의 자동
      # logout이 다른 job의 push를 "no basic auth credentials"로 깨뜨렸음.
      # 재헌님이 이미 만들어 운영 중인 production VM(10.10.10.30)의
      # ~/backend/docker-compose.yaml이 기대하는 이미지 경로/태그 컨벤션을 그대로
      # 따른다(harbor VM 자체 대상으로 별도 경로/포트를 새로 만들었다가, 이미 잘
      # 돌아가는 실제 배포와 안 맞는 병렬 파이프라인이 되는 걸 확인하고 되돌림 -
      # 2026-07-18). :latest는 그 compose 파일의 기본값과 맞추기 위함이고, :sha는
      # 추적/롤백용으로 같이 남긴다.
      #
      # 2026-07-20, push를 main push 실행으로 한정. 그 전엔 pull_request
      # 실행에서도 이 스텝이 돌아서, 미병합 PR 커밋이 같은 job의 Trivy만
      # 통과하면(병렬인 build-test/code-scanning 결과와 무관하게) :sha+:latest가
      # Harbor로 push됐다 - 특히 :latest가 PR 커밋으로 이동해, production에서
      # 수동 compose pull(:latest 기본) 시 미병합 이미지를 집을 수 있는 경로가
      # 있었다(자동배포는 needs+main 한정이라 영향 없음 - 실측 확인). PR은
      # 빌드+스캔 검증만 하고 push는 생략한다 - main에 도달한 코드는 브랜치
      # 보호(required checks + strict + enforce_admins)가 build/Sonar/Trivy
      # 통과를 이미 보장하므로, "전 게이트 통과 이미지만 push"가 병렬성 손실
      # 없이 달성된다. workflow_dispatch도 push 안 함(수동 재배포는 기존 태그
      # 재사용이라 새 push 불요). Docker 공식 CI 문서의 조건부 push
      # (push: github.event_name != 'pull_request') 표준 패턴과 동일 취지.
      # ---- PR run: staging repo push(승격 소스). 미병합 이미지는 staging에만. ----
      - name: Push to staging (build-once source)
        if: github.event_name == 'pull_request'
        run: |
          SVC="${{ matrix.service }}"
          STAGING="harbor.hizero.local/dangdang-backend/$SVC-staging"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SHA="${{ github.sha }}"
          docker tag "backend-$SVC:$SHA" "$STAGING:$HEAD_SHA"
          docker push "$STAGING:$HEAD_SHA"
      # ---- main fallback: 스캔한 이미지를 production repo로 push(구 동작) ----
      - name: Tag and push (main fallback, sha + latest)
        if: steps.src.outputs.found == 'false'
        run: |
          SVC="${{ matrix.service }}"
          IMAGE="harbor.hizero.local/dangdang-backend/$SVC"
          SHA="${{ github.sha }}"
          LOCAL="backend-$SVC:$SHA"
          echo "::warning::[$SVC] build-once source missing - fallback"
          docker tag "$LOCAL" "$IMAGE:$SHA"
          docker tag "$LOCAL" "$IMAGE:latest"
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"

  # production VM(10.10.10.30, 재헌님이 이미 구축)에 실제로 배포한다. 이 job은
  # self-hosted 러너(harbor VM)에서 실행되지만 harbor VM 자신의 Docker가 아니라
  # SSH로 production VM에 접속해 그쪽의 기존 docker-compose.yaml을 그대로 pull/up
  # 한다 - 이미지/네트워크/헬스체크 스크립트를 이 저장소에 새로 만들지 않고 이미
  # 검증된 재헌님의 구성을 그대로 재사용한다.
  #
  # main push 시 자동 배포(2026-07-18, 지훈 지시 - "그 대신 CI를 신중하게"로
  # 맞바꿈). 원래는 workflow_dispatch(수동 실행=승인)로만 배포했었는데, 그 승인
  # 게이트를 없애는 대신 code-scanning(SonarQube Quality Gate 하드게이트 포함)까지
  # needs에 넣어 정적분석이 실패하면 배포 자체가 안 되게 했다. workflow_dispatch는
  # 이전 태그로 수동 재배포/롤백용으로 계속 남겨둔다.
  backend-deploy-production:
    needs: [backend-image-scanning, code-scanning]
    # always()가 없으면 needs 잡이 skip될 때(예: 이번 커밋에 backend 변경 없음) 이
    # job도 평가 없이 그냥 skip돼서, workflow_dispatch로 수동 롤백하려고 해도
    # 안 돌게 된다. always()로 강제 평가한 뒤, push는 두 잡이 실제로 success일
    # 때만, workflow_dispatch는 deploy_target이 backend/both일 때만 허용한다
    # (2026-07-19, frontend/가 main에 없는 상태에서 backend만 수동 재배포하려다
    # frontend-deploy-production까지 같이 돌아 scp 실패하는 걸 실측 - 대상 분리).
    # 2026-07-20, compose.production.example.yaml만 바뀐 push(예: 볼륨/포트
    # 등 서비스 코드 변경 없는 인프라 설정 수정)에서 이 job 전체가 스킵되는
    # 걸 실측(backend-image-scanning이 매트릭스 없이 "skipped"로 나와
    # 'success' 조건을 못 만족). 'skipped'도 허용해서 compose 파일만 바뀐
    # 경우도 (파일 동기화만이라도) 자동으로 돌게 한다 - 실제 이미지
    # 재배포는 그 아래 per-service pull 성공 여부로 여전히 걸러지므로
    # (해당 태그로 새로 빌드된 서비스만 up -d), 이 조건 완화가 스캔 안 된
    # 이미지를 배포하게 만들지는 않는다. 다만 이건 required_pull_request_
    # reviews + enforce_admins를 먼저 켠 뒤에만 안전(2026-07-20 리스크
    # 평가 - compose 파일 자체의 보안 설정은 Trivy가 스캔 못 하는
    # 사각지대라, PR 리뷰가 유일한 실질적 게이트).
    # 'failure'/'cancelled'는 여전히 막는다 - 명시적으로 뭔가 실패한
    # 경우까지 배포를 진행하면 안 되므로.
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'backend' ||
            inputs.deploy_target == 'both')) ||
        (
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          (needs.backend-image-scanning.result == 'success' ||
            needs.backend-image-scanning.result == 'skipped') &&
          needs.code-scanning.result == 'success'
        )
      )
    runs-on: self-hosted
    env:
      # 2026-07-20, detect-backend의 paths-filter와 동일한 이유로 ai 추가 -
      # 이 목록도 하드코딩이라 별도로 안 넣으면 build/scan은 통과해도 배포
      # 대상에서 빠진다.
      SERVICES: >-
        admin-service ai community-service diet-service ingredients-service
        login-service main-service product-service recipe-service
      # 2026-07-19 아침, 구 LAN IP(192.168.0.13)가 인프라 공지("당분간 병행
      # 유지")보다 먼저 죽은 걸 실측(ping "Destination Host Unreachable",
      # SSH "No route to host")으로 확인 - harbor/monitoring/DB VM은 구/신
      # IP 둘 다 살아있는데 production VM만 먼저 끊김. 새 App 계층
      # IP(10.10.10.30)로 전환.
      PROD_HOST: bruce@10.10.10.30
      BACKEND_TAG: ${{ inputs.backend_tag }}
    steps:
      # 2026-07-20, ~/backend/docker-compose.yaml이 production VM에만
      # 존재하는 수동관리 파일이라 PR #52(ai 서비스 추가)의 배포가
      # "no such service: ai"로 실패했다. frontend-deploy-production과
      # 같은 패턴으로 checkout + scp를 추가해 git 추적본을 매 배포마다
      # 동기화한다 - 새 서비스가 계속 추가될 예정이라, 이제부터는 compose
      # 파일 변경이 코드리뷰에 드러나고 자동으로 반영된다. self-hosted
      # 러너의 이전 워크스페이스가 우연히 남아있을 수 있어(신뢰 불가,
      # fix-harbor-dns에서 실측된 패턴과 동일 이유) checkout을 명시한다.
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # 2026-07-19, well-architected 체크리스트의 "latest 배포 금지" 항목 재점검
      # 중 발견 - push 이벤트에선 inputs.backend_tag가 존재하지 않아 TAG가
      # 빈 문자열이 되고, 그 상태로 docker compose를 돌리면 production VM의
      # compose 파일이 기본값(:latest)으로 떨어졌을 것으로 보임(frontend는
      # 이미 이 fallback을 github.sha로 처리하고 있었는데 backend만 빠져있었다
      # - 두 job이 같은 패턴이어야 하는데 여기만 어긋나 있었음). workflow_dispatch
      # 수동 배포는 여전히 backend_tag 기본값 'latest'를 그대로 쓸 수 있게 유지
      # (수동 롤백/재배포 편의) - 자동배포 경로만 불변 태그로 강제한다.
      - name: Determine tag
        run: |
          TAG="$BACKEND_TAG"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Copy compose file to production VM
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          $SSH "mkdir -p ~/backend"
          $SCP backend/compose.production.example.yaml \
            "$PROD_HOST":~/backend/docker-compose.yaml
      - name: Log in to Harbor (production VM)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # frontend-deploy-production과 동일한 이유로 작은따옴표 대입 사용 -
          # robot 계정명의 '$'가 bash에 의해 지워지지 않게 함.
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login harbor.hizero.local \
            -u '$USR' --password-stdin"
      - name: Record current per-service image tags (for rollback)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 서비스마다 서로 다른 태그로 떠 있을 수 있으므로(부분 배포),
          # 단일 .last-deployed-tag 대신 컨테이너별 현재 이미지 태그를
          # 개별 기록해 둔다. 롤백 시 이번에 바꾼 서비스만 각자의 이전
          # 태그로 되돌리기 위함.
          for s in $SERVICES; do
            CUR=$($SSH "docker inspect --format '{{.Config.Image}}' \
              $s 2>/dev/null" || true)
            echo "PREV_IMG_$s=$CUR" >> "$GITHUB_ENV"
          done
      - name: Deploy via Docker Compose (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 2026-07-19, well-architected 체크리스트 "latest 배포 금지" 재점검
          # 중 PR #48 머지 push에서 실측 - backend는 8개 서비스 monorepo
          # 매트릭스 빌드라, 한 커밋에서 일부 서비스만 재빌드되는 게 정상이다.
          # compose 파일(재헌님 소유, ~/backend/docker-compose.yaml)의 공유
          # TAG 변수로 8개를 한 번에 pull하면, 이번 커밋에 안 바뀐 서비스는
          # 그 TAG의 이미지가 아예 없어서 매번 배포 전체가 깨졌다. Docker
          # Registry HTTP API V2 공식 문서(존재하는 매니페스트는 pull 성공
          # 여부로 확인 가능) 기준으로, 서비스마다 이번 TAG의 이미지가
          # 실제로 존재하는지 먼저 pull로 확인하고, 존재하는 서비스만
          # 그 태그로 개별 재배포한다 - 존재하지 않는(=이번에 재빌드
          # 안 된) 서비스는 건드리지 않고 현재 배포 상태를 그대로 둔다.
          # 2026-07-20, PR #58 배포 실측 - diet-service처럼 depends_on
          # (product-service)이 있는 서비스를 up하면 compose가 의존 서비스
          # 이미지도 같은 TAG로 해석하는데, 의존 쪽이 이번 커밋에서 재빌드
          # 안 됐으면 그 태그가 레지스트리에 없어 resolve 실패로 배포 전체가
          # 죽었다(product-service:5311c6b not found). --no-deps(공식: "Don't
          # start linked services")로 대상 서비스만 재생성한다 - 의존 서비스는
          # 이미 떠서 돌고 있으므로 건드릴 이유가 없다.
          # 2026-07-24, 두 가지 결함을 함께 고친다.
          #
          # (1) pull 실패를 전부 "이번 커밋에 안 바뀐 서비스"로 취급하고 있었다.
          #     원래 코드는 `docker pull ... >/dev/null 2>&1` 의 성공 여부만 봐서,
          #     "그 태그가 없음"과 "인증 실패/네트워크 오류/레지스트리 다운"을
          #     구분하지 못했다. Harbor의 dangdang-backend 프로젝트는 비공개이고
          #     (public=false, 2026-07-24 확인), 이 job은 harbor.hizero.local로
          #     로그인하는데 pull은 192.168.0.53으로 한다 - Docker는 자격증명을
          #     레지스트리 호스트명 단위로 저장하므로(공식 문서: docker login이
          #     "registry"별로 config.json에 기록), 두 이름이 갈린 지금 구성은
          #     production VM에 남아있는 별도 로그인에 의존한다. 그게 만료되면
          #     9개 서비스가 전부 "not rebuilt this commit"으로 조용히 스킵되고,
          #     job은 초록불로 끝나며 notify-on-deploy는 "배포 완료"를 보낸다.
          #     이제 pull 출력을 보고 "태그 없음"일 때만 스킵하고, 그 외 실패는
          #     즉시 job을 실패시킨다.
          #     (레지스트리 호스트명 통일은 compose의 image 참조까지 함께 바꿔야
          #      해서 production 영향이 있음 - 별도 승인 항목으로 분리.)
          #
          # (2) 롤백 대상 목록이 루프가 끝난 뒤에야 기록됐다. 루프 도중 compose up이
          #     실패하면(bash -e로 스텝이 즉시 종료) UPDATED_SERVICES가 아예 안
          #     남아, 그 시점까지 이미 새 이미지로 교체된 서비스들이 롤백되지
          #     않고 그대로 남았다. 매 서비스마다 파일에 append 해서, 스텝이
          #     어디서 죽든 그때까지 배포된 목록이 보존되게 한다(GITHUB_ENV 대신
          #     워크스페이스 파일 - 스텝 실패 시 환경파일 처리 시점에 의존하지
          #     않기 위함).
          UPDATED_FILE="$GITHUB_WORKSPACE/.updated-services"
          : > "$UPDATED_FILE"
          for s in $SERVICES; do
            IMG="192.168.0.53/dangdang-backend/$s:$TAG"
            set +e
            PULL_OUT=$($SSH "docker pull $IMG" 2>&1)
            PULL_RC=$?
            set -e
            if [ "$PULL_RC" = "0" ]; then
              echo "$s: $TAG found in registry, deploying"
              $SSH "cd ~/backend && TAG=$TAG \
                docker compose -f docker-compose.yaml up -d --no-deps $s"
              echo "$s" >> "$UPDATED_FILE"
            elif printf '%s' "$PULL_OUT" \
                | grep -qiE 'manifest unknown|not found'; then
              echo "$s: $TAG not in registry (not rebuilt this commit)" \
                "- leaving current deployment untouched"
            else
              echo "::error::$s: docker pull이 '태그 없음'이 아닌 이유로" \
                "실패했습니다(인증/네트워크/레지스트리 장애 가능성)." \
                "이 경우를 스킵으로 처리하면 아무것도 배포되지 않은 채" \
                "배포 성공으로 보고됩니다. 원본 출력:"
              printf '%s\n' "$PULL_OUT"
              exit 1
            fi
          done
          UPDATED=$(tr '\n' ' ' < "$UPDATED_FILE")
          echo "UPDATED_SERVICES=$UPDATED" >> "$GITHUB_ENV"
          if [ -z "$UPDATED" ]; then
            echo "No service had a new image for this commit; nothing to do"
          fi
      - name: Health check
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          declare -A PORTS=(
            [admin-service]=8008 [ai]=8022 [community-service]=8012
            [diet-service]=8020 [ingredients-service]=8018 [login-service]=8000
            [main-service]=8010 [product-service]=8016 [recipe-service]=8014
          )
          # 이번에 실제 배포한 서비스만 검사한다 - 안 바꾼 서비스까지 여기서
          # 실패 처리하면, 이 배포와 무관한 기존 이슈로 멀쩡한 배포가
          # 롤백되는 오탐이 생긴다.
          if [ -z "$UPDATED_SERVICES" ]; then
            echo "No services updated this run - skipping health check"
            exit 0
          fi
          for s in $UPDATED_SERVICES; do
            PORT="${PORTS[$s]}"
            OK=""
            for i in $(seq 1 10); do
              CHECK="curl -fs http://localhost:$PORT/health"
              if $SSH "$CHECK" >/dev/null 2>&1; then
                OK=1
                break
              fi
              sleep 3
            done
            if [ -z "$OK" ]; then
              echo "Health check failed for $s (port $PORT)"
              exit 1
            fi
          done
          echo "All updated backend services healthy: $UPDATED_SERVICES"
      - name: Rollback on failed health check
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 이번에 배포한 서비스만, 각자의 이전 태그로 개별 롤백한다.
          # 기록해둔 이전 이미지(레지스트리/경로/태그 전체)에서 태그만
          # 떼어내 compose의 서비스 단위 up으로 되돌린다 - compose가 해당
          # 서비스에만 그 TAG를 적용하므로 다른 서비스는 영향받지 않는다.
          #
          # 2026-07-24, $UPDATED_SERVICES(환경변수) 대신 배포 스텝이 매 서비스마다
          # append한 파일을 읽는다. 배포 스텝이 루프 중간에 죽은 경우 환경변수는
          # 비어 있지만 그때까지 교체된 서비스는 실제로 존재하므로, 환경변수만
          # 보면 그 서비스들이 롤백되지 않고 남는다(배포 스텝 주석 (2) 참고).
          UPDATED_FILE="$GITHUB_WORKSPACE/.updated-services"
          if [ -s "$UPDATED_FILE" ]; then
            ROLLBACK_LIST=$(tr '\n' ' ' < "$UPDATED_FILE")
          else
            ROLLBACK_LIST="$UPDATED_SERVICES"
          fi
          if [ -z "$ROLLBACK_LIST" ]; then
            echo "이번 실행에서 교체된 서비스가 없음 - 롤백할 대상 없음"
          fi
          for s in $ROLLBACK_LIST; do
            VAR="PREV_IMG_$s"
            PREV="${!VAR}"
            if [ -n "$PREV" ]; then
              PREV_TAG="${PREV##*:}"
              echo "Rolling back $s to tag $PREV_TAG"
              $SSH "cd ~/backend && TAG=$PREV_TAG \
                docker compose -f docker-compose.yaml up -d --no-deps $s"
            else
              echo "$s: no previous image recorded - cannot roll back"
            fi
          done


  # 2026-07-19, b-gateway production 배포 job. non-root/read-only 전환 검증차
  # 처음 추가했지만(격리 환경에서 기동/resolver/temp 경로 생성 전부 검증 완료 후
  # 실제 적용 - run 29675315141에서 라우트 전체 200, /b/admin Lua 분기까지
  # 정상 확인), 이후 b-gateway를 재배포할 유일한 경로라 상시 job으로 유지한다.
  # (2026-07-20 갱신: PR #60부터 main push에서 infra/b-gateway/** 변경 시
  # 자동 실행으로 전환 - 아래 job 주석 참고. workflow_dispatch 경로는 수동
  # 재배포/롤백용으로 병존.)
  bgateway-cutover:
    # 첫 실행(run 29675180327)에서 run_bgateway_cutover=true로 dispatch했는데도
    # skipped됨 - backend-deploy-production 주석의 "always() 없으면 커스텀
    # if:에 암묵적 success()가 붙는다"는 문제와 동일할 가능성이 높아 이
    # job도 always()를 명시한다.
    #
    # 2026-07-20, backend/frontend처럼 자동배포로 전환. 그동안 b-gateway만
    # 수동(workflow_dispatch)이라, 윤경님이 /b/ai 라우팅을 push해도 "빌드는
    # 되는데 프로덕션 반영이 안 되는" 혼란이 반복됐다(실측: /b/ai가 프로덕션
    # 404). 이 job은 이미 백업→배포→핵심 라우트 검증→실패시 자동 롤백을
    # 갖추고 있어(아래 스텝) 자동배포로 돌려도 나쁜 nginx 설정은 스스로
    # 롤백된다. detect-backend가 infra/b-gateway/** 변경을 감지(needs 추가),
    # main push에서 변경 시에만 자동 cutover. 수동 workflow_dispatch 경로는
    # 온디맨드 재배포/롤백용으로 그대로 유지.
    needs: [detect-backend]
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' &&
          inputs.run_bgateway_cutover) ||
        (
          github.event_name == 'push' &&
          github.ref == 'refs/heads/main' &&
          needs.detect-backend.outputs.bgateway == 'true'
        )
      )
    runs-on: self-hosted
    env:
      PROD_HOST: bruce@10.10.10.30
    steps:
      # 2026-07-24, 이 파일에서 유일하게 남아있던 태그 핀을 SHA 핀으로 통일
      # (나머지 스텝은 전부 SHA 핀이었는데 이 job만 어긋나 있었다).
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Backup current b-gateway state
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          TS=$(date +%Y%m%d-%H%M%S)
          echo "BACKUP_TS=$TS" >> "$GITHUB_ENV"
          CMD="mkdir -p ~/b-gateway-backup-$TS"
          CMD="$CMD && cp -r ~/b-gateway/* ~/b-gateway-backup-$TS/"
          CMD="$CMD && docker inspect b-gateway"
          CMD="$CMD > ~/b-gateway-backup-$TS/docker-inspect.json 2>&1 || true"
          $SSH "$CMD"
          echo "Backed up to ~/b-gateway-backup-$TS on production VM"
      - name: Deploy new files (SCP)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          $SCP infra/b-gateway/docker-compose.yml \
            "$PROD_HOST":~/b-gateway/docker-compose.yml
          $SCP infra/b-gateway/Dockerfile "$PROD_HOST":~/b-gateway/Dockerfile
          $SCP infra/b-gateway/nginx.conf "$PROD_HOST":~/b-gateway/nginx.conf
      - name: Build and recreate (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 2026-07-19: docker-compose.yml이 있는 디렉터리명(b-gateway)이
          # 기본 project 이름으로 쓰이는데, 지금 떠 있는 컨테이너는
          # project=backend 라벨을 갖고 있음(원래 backend 스택 일부로 처음
          # 배포됐던 흔적 - 재헌님 확인). project 이름이 안 맞으면 compose가
          # 기존 컨테이너를 자기 관리 대상으로 인식 못 해서 이름 충돌 남
          # (공식 문서: project 이름으로 리소스를 격리/추적). -p로 기존과
          # 동일한 project 이름을 명시해서 정상적으로 recreate되게 함.
          CMD="cd ~/b-gateway"
          CMD="$CMD && docker compose -p backend build"
          CMD="$CMD && docker compose -p backend up -d"
          $SSH "$CMD"
      - name: Route verification
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          sleep 5
          FAIL=""
          check() {
            CHK="curl -s -o /dev/null -w '%{http_code}' $1"
            CODE=$($SSH "$CHK" || echo "000")
            echo "$1 -> $CODE"
            case "$CODE" in
              2*|3*) : ;;
              *) FAIL="1" ;;
            esac
          }
          # 2026-07-24, 아래 두 POST 검증이 상태코드를 출력만 하고 FAIL 판정에
          # 전혀 반영하지 않고 있었다. /b/admin은 이 게이트웨이에서 유일하게
          # Lua 분기(menu 값에 따라 product-service / ingredients-service)를
          # 타는 경로라 가장 깨지기 쉬운데, 정작 그 경로가 500이 나도 라우트
          # 검증은 통과하고 자동 롤백도 안 걸렸다. 판정에 반영한다.
          #
          # 다만 판정 기준은 GET들과 달라야 한다. /b/admin은 인증이 필요한
          # 관리자 API라 토큰 없이 호출하면 401이 정상이다(2026-07-24 프로덕션
          # 실측: product/create-tag 두 분기 모두 401). 401은 "요청이 Lua 분기를
          # 타고 백엔드까지 도달했고 앱이 인증 없음을 이유로 거부했다"는 뜻이라
          # 라우팅이 정상이라는 증거다. 이걸 2xx/3xx 기준으로 판정하면 정상
          # 상태에서 cutover가 실패하고 자동 롤백이 돌아, 게이트웨이만 두 번
          # 재기동되고 배포는 영원히 성공하지 못한다(처음 이 검증을 강화할 때
          # 이 점을 놓쳐서, 실제로 머지 전 사전점검에서 발견해 바로잡음).
          #
          # 따라서 라우팅 성공을 뜻하는 코드(2xx/3xx/401/403)는 통과시키고,
          # 게이트웨이·업스트림 장애를 뜻하는 코드만 실패로 본다:
          #   5xx  = 업스트림 오류 / Lua 분기 실패
          #   000  = 연결 자체 실패(게이트웨이 다운)
          #   404  = 라우트가 백엔드의 /admin에 안 붙음(설정 오류)
          check_post() {
            label="$1"; menu="$2"
            CMD="curl -s -X POST -H 'Content-Type: application/json'"
            CMD="$CMD -d '{\"menu\":\"$menu\"}'"
            CMD="$CMD -o /dev/null -w '%{http_code}'"
            CMD="$CMD http://localhost:8080/b/admin"
            CODE=$($SSH "$CMD" || echo "000")
            echo "$label -> $CODE"
            case "$CODE" in
              2*|3*|401|403) : ;;
              *) FAIL="1" ;;
            esac
          }
          check "http://localhost:8080/b/search?page=1"
          check "http://localhost:8080/b/recipes"
          check "http://localhost:8080/b/tags/category"
          check "http://localhost:8080/b/home/rank/item"
          check_post "/b/admin (product)" "product"
          check_post "/b/admin (create-tag)" "create-tag"
          $SSH "docker ps --filter name=b-gateway --format '{{.Status}}'"
          if [ -n "$FAIL" ]; then
            echo "One or more core routes failed"
            exit 1
          fi
      - name: Rollback on failure
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 2026-07-24, BACKUP_TS가 비어 있는 경우를 막는다. 백업 스텝이
          # 실패하면 이 변수가 없는 채로 롤백이 돌아 `cp ~/b-gateway-backup-/*`
          # 라는 엉뚱한 경로를 복사하려 했다 - 실패는 하지만, 그때 이미
          # `compose down`으로 게이트웨이를 내린 뒤라 전체 API가 죽은 상태로
          # 남는다(b-gateway는 모든 /b/* 트래픽의 유일한 진입점).
          # 백업이 없으면 내리지 말고 즉시 사람을 부른다.
          if [ -z "$BACKUP_TS" ]; then
            echo "::error::백업 타임스탬프가 없습니다(백업 스텝 실패 추정)." \
              "복구할 원본이 없으므로 b-gateway를 내리지 않고 중단합니다." \
              "production VM에서 수동 확인이 필요합니다."
            exit 1
          fi
          CMD="cd ~/b-gateway && docker compose -p backend down"
          CMD="$CMD && cp ~/b-gateway-backup-$BACKUP_TS/* ~/b-gateway/"
          CMD="$CMD && docker compose -p backend up -d"
          $SSH "$CMD"
          echo "Rolled back to pre-cutover state (backup: $BACKUP_TS)"

  # backend-build-test/backend-image-scanning은 서비스별 매트릭스라 체크 이름이
  # "backend-build-test (admin-service)"처럼 매번 달라져서, 브랜치 보호 규칙의
  # 필수 상태 체크에 고정 이름으로 등록할 수가 없다(2026-07-19, 성애님이 PR #47
  # 병합이 막혀있다고 알려줘서 발견 - 브랜치 보호가 요구하던 build-test/
  # image-scanning은 어제 ci_sandbox 정리하면서 삭제한 옛 job 이름이라 영원히
  # 안 생김). 이 job이 매트릭스 결과를 모아 항상 같은 이름으로 보고해서, 이걸
  # 필수 체크로 등록하면 된다 - always()라 매트릭스가 통째로 스킵돼도(백엔드
  # 변경 없는 PR) 정상 통과, 하나라도 failure/cancelled면 실패한다.
  backend-checks:
    needs: [backend-build-test, backend-image-scanning]
    if: always()
    runs-on: ubuntu-latest
    steps:
      - name: Aggregate backend matrix results
        run: |
          BT="${{ needs.backend-build-test.result }}"
          IS="${{ needs.backend-image-scanning.result }}"
          echo "backend-build-test=$BT backend-image-scanning=$IS"
          if [ "$BT" = "failure" ] || [ "$BT" = "cancelled" ] || \
             [ "$IS" = "failure" ] || [ "$IS" = "cancelled" ]; then
            echo "backend matrix has a failure/cancellation"
            exit 1
          fi

  # frontend/ 이미지 - build-once 전략(2026-07-22 도입).
  #  - PR run: build+scan 후 dangdang/frontend-staging:<PR head sha>로 push.
  #  - main run: 재빌드/재스캔 없이, PR 때 스캔된 그 이미지를 production repo(dangdang/frontend)
  #    로 digest 승격(docker buildx imagetools create). "스캔된 바로 그 바이트"가 배포됨.
  #    PR head sha는 머지 방식(merge/squash/rebase) 무관하게 GitHub "commit->PR" API로
  #    조회한다(HEAD^2 부모 방식은 squash/rebase에서 깨짐). 승격 후 raw manifest 일치 검증.
  #  - fallback: 승격 소스를 못 찾으면(전환기 구워크플로 PR/직접 push/핫픽스/API·소스 부재)
  #    main에서 그 자리 빌드+스캔+push -> main이 배포 불가 상태로 남지 않음(graceful degrade).
  #  이 잡은 PR·main 양쪽에서 계속 돌고 성공을 리포트하므로 아래 frontend-deploy-production의
  #  needs/result 조건은 그대로 유효(잡 그래프 변경 없음). 배포는 그 job 참고.
  frontend-image-scanning:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.changed == 'true'
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4 - registry 캐시(Harbor) + imagetools 승격에 쓸 per-job 빌더.
      # network=host: 빌더가 host 이름해석으로 harbor.hizero.local 접근(bridge는 해석
      # 불가 - PR#98 실측). image=buildkit-harbor:v1: Harbor CA를 신뢰에 구운 buildkit.
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
        with:
          driver-opts: |
            network=host
            image=harbor.hizero.local/dangdang/buildkit-harbor:v1
      # 캐시 push·staging push·승격·inspect 모두 인증 필요 - 로그인을 먼저.
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
          logout: false
      # ---- main run: 승격 소스(PR head sha) 조회 ----
      # 공식 GitHub REST API(list PRs associated with a commit)로 병합된 PR의
      # head sha(=staging 태그)를 얻는다. merge/squash/rebase 모두 커버. 호출은
      # 공식 actions/github-script(액션 Node 런타임)로 해 러너의 gh/jq/curl 설치
      # 의존을 없앤다(1차 canary에서 gh 부재로 빈 값->fallback 실측 후 교체).
      # 소스 부재 시 found=false로 아래 fallback 빌드로 안전 degrade.
      - name: Resolve PR head sha (main only)
        id: prhead
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # v7
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          result-encoding: string
          script: |
            const { data: prs } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
            return prs.length ? prs[0].head.sha : '';
      - name: Check staging source (main only)
        id: src
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          STAGING="harbor.hizero.local/dangdang/frontend-staging"
          HEAD_SHA="${{ steps.prhead.outputs.result }}"
          FOUND="false"
          if [ -n "$HEAD_SHA" ] && \
             docker buildx imagetools inspect \
               "$STAGING:$HEAD_SHA" >/dev/null 2>&1; then
            FOUND="true"
          fi
          {
            echo "head_sha=$HEAD_SHA"
            echo "found=$FOUND"
            echo "staging=$STAGING"
          } >> "$GITHUB_OUTPUT"
          echo "promote source: head_sha=$HEAD_SHA found=$FOUND"
      # ---- main run + 소스 있음: digest 승격(재빌드 0) + 무결성 검증 ----
      - name: Promote staging image (digest copy)
        if: steps.src.outputs.found == 'true'
        run: |
          STAGING="${{ steps.src.outputs.staging }}"
          HEAD_SHA="${{ steps.src.outputs.head_sha }}"
          IMAGE="harbor.hizero.local/dangdang/frontend"
          SHA="${{ github.sha }}"
          # 소스(스캔된) 매니페스트 digest를 승격 전에 확보
          SRC="sha256:$(docker buildx imagetools inspect --raw \
            "$STAGING:$HEAD_SHA" | sha256sum | cut -d' ' -f1)"
          docker buildx imagetools create \
            -t "$IMAGE:$SHA" -t "$IMAGE:latest" "$STAGING:$HEAD_SHA"
          # 무결성: imagetools create는 단일 소스를 OCI index로 감싸 top-level
          # digest가 달라진다(1차 실측 2f13..->cc28..) -> raw 바이트 동등 비교는
          # 틀림. prod가 스캔된 소스 매니페스트를 "참조(index)" 또는 "동등(직접
          # 복사)"하는지로 검증한다.
          DST_RAW="$(docker buildx imagetools inspect --raw "$IMAGE:$SHA")"
          DST="sha256:$(printf '%s' "$DST_RAW" | sha256sum | cut -d' ' -f1)"
          MATCH=false
          if [ "$DST" = "$SRC" ]; then MATCH=true; fi
          if printf '%s' "$DST_RAW" | grep -q "$SRC"; then MATCH=true; fi
          if [ "$MATCH" = true ]; then
            echo "integrity OK: prod=$DST references/equals scanned $SRC"
          else
            echo "::error::promoted image does not match scanned $SRC"
            exit 1
          fi
      # ---- PR run, 또는 main fallback(소스 없음): 빌드 ----
      - name: Build image
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: frontend
          file: frontend/Dockerfile
          pull: true
          tags: frontend:${{ github.sha }}
          load: true
          # 2026-07-21, gha(GitHub 왕복·10GB 한도) -> Harbor registry 캐시(LAN)
          cache-from: type=registry,ref=harbor.hizero.local/dangdang/buildcache-frontend:cache  # yamllint disable-line rule:line-length
          cache-to: type=registry,ref=harbor.hizero.local/dangdang/buildcache-frontend:cache,mode=max,image-manifest=true,oci-mediatypes=true  # yamllint disable-line rule:line-length
      # setup-trivy 기본 경로($HOME/.local/bin/trivy-bin)는 러너 2대 동시 실행 시
      # "Text file busy" 충돌(2회 재현) - 러너별 경로에 설치.
      - name: Install Trivy (per-runner path)
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: frontend:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      # ---- PR run: staging repo push(승격 소스) ----
      # 미병합 이미지는 staging repo에만 올라가고 production repo(dangdang/frontend)엔
      # 안 들어감("미병합 코드 격리" 원칙 유지). PR head sha로 태깅해 main run이 찾게 함.
      # frontend/compose는 불변 태그를 요구하므로 배포엔 :sha를 쓴다(:latest는 승격 시 편의용).
      - name: Push to staging (build-once source)
        if: github.event_name == 'pull_request'
        run: |
          STAGING="harbor.hizero.local/dangdang/frontend-staging"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SHA="${{ github.sha }}"
          docker tag "frontend:$SHA" "$STAGING:$HEAD_SHA"
          docker push "$STAGING:$HEAD_SHA"
      # ---- main fallback: 스캔한 이미지를 production repo로 push(구 동작 경로) ----
      - name: Tag and push (main fallback, sha + latest)
        if: steps.src.outputs.found == 'false'
        run: |
          IMAGE="harbor.hizero.local/dangdang/frontend"
          SHA="${{ github.sha }}"
          echo "::warning::build-once source missing - fallback build for $SHA"
          docker tag "frontend:$SHA" "$IMAGE:$SHA"
          docker tag "frontend:$SHA" "$IMAGE:latest"
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"

  # 2026-07-24, Admin Frontend 이미지 빌드+스캔+push. frontend-image-scanning과
  # 동일한 구성(빌더/캐시/Trivy/push 가드)이고 달라지는 건 컨텍스트 경로와
  # 이미지·캐시 repo 이름뿐이라, 각 스텝의 상세 근거는 위 job 주석을 참고할 것.
  #
  # Harbor는 같은 dangdang 프로젝트 안에 repo만 새로 만든다
  # (dangdang/frontend-admin, dangdang/buildcache-frontend-admin). robot 계정
  # 권한이 프로젝트 스코프라 별도 프로젝트로 빼면 자격증명을 새로 발급해야
  # 하는데, 같은 프로젝트면 기존 HARBOR_ROBOT_USER/TOKEN이 그대로 쓰인다.
  # 주의: 07-20에 넣은 쿼터/리텐션(태그 15개 유지)/주간 GC 규칙이 새 repo에도
  # 적용되는지 확인이 필요하다 - 리텐션 규칙이 repository 패턴으로 걸려 있으면
  # 신규 repo가 누락돼 무한 증식할 수 있고, mode=max 빌드 캐시는 GB 단위다.
  frontend-admin-image-scanning:
    needs: detect-frontend
    if: needs.detect-frontend.outputs.admin_changed == 'true'
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
        with:
          driver-opts: |
            network=host
            image=harbor.hizero.local/dangdang/buildkit-harbor:v1
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
          logout: false
      # ---- main run: 승격 소스(PR head sha) 조회 ----
      # frontend-image-scanning의 build-once 구조를 그대로 따른다(그쪽 주석에
      # 각 스텝의 근거가 있음). 처음엔 이 job을 build-once 도입 전의 frontend
      # 패턴(PR/main 양쪽 빌드 + main에서 push)으로 만들었는데, 그 사이 main에
      # build-once가 들어와 admin만 구 방식으로 남으면 (1) main에서 재빌드가
      # 다시 발생해 build-once의 이점을 잃고 (2) 두 프론트 앱의 파이프라인
      # 구조가 갈려 이후 유지보수에서 또 한쪽만 빠지는 사고가 난다.
      - name: Resolve PR head sha (main only)
        id: prhead
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        # v7
        uses: actions/github-script@f28e40c7f34bde8b3046d885e986cb6290c5673b
        with:
          result-encoding: string
          script: |
            const { data: prs } =
              await github.rest.repos.listPullRequestsAssociatedWithCommit({
                owner: context.repo.owner,
                repo: context.repo.repo,
                commit_sha: context.sha,
              });
            return prs.length ? prs[0].head.sha : '';
      - name: Check staging source (main only)
        id: src
        if: github.event_name == 'push' && github.ref == 'refs/heads/main'
        run: |
          STAGING="harbor.hizero.local/dangdang/frontend-admin-staging"
          HEAD_SHA="${{ steps.prhead.outputs.result }}"
          FOUND="false"
          if [ -n "$HEAD_SHA" ] && \
             docker buildx imagetools inspect \
               "$STAGING:$HEAD_SHA" >/dev/null 2>&1; then
            FOUND="true"
          fi
          {
            echo "head_sha=$HEAD_SHA"
            echo "found=$FOUND"
            echo "staging=$STAGING"
          } >> "$GITHUB_OUTPUT"
          echo "promote source: head_sha=$HEAD_SHA found=$FOUND"
      # ---- main run + 소스 있음: digest 승격(재빌드 0) + 무결성 검증 ----
      - name: Promote staging image (digest copy)
        if: steps.src.outputs.found == 'true'
        run: |
          STAGING="${{ steps.src.outputs.staging }}"
          HEAD_SHA="${{ steps.src.outputs.head_sha }}"
          IMAGE="harbor.hizero.local/dangdang/frontend-admin"
          SHA="${{ github.sha }}"
          SRC="sha256:$(docker buildx imagetools inspect --raw \
            "$STAGING:$HEAD_SHA" | sha256sum | cut -d' ' -f1)"
          docker buildx imagetools create \
            -t "$IMAGE:$SHA" -t "$IMAGE:latest" "$STAGING:$HEAD_SHA"
          DST_RAW="$(docker buildx imagetools inspect --raw "$IMAGE:$SHA")"
          DST="sha256:$(printf '%s' "$DST_RAW" | sha256sum | cut -d' ' -f1)"
          MATCH=false
          if [ "$DST" = "$SRC" ]; then MATCH=true; fi
          if printf '%s' "$DST_RAW" | grep -q "$SRC"; then MATCH=true; fi
          if [ "$MATCH" = true ]; then
            echo "integrity OK: prod=$DST references/equals scanned $SRC"
          else
            echo "::error::promoted image does not match scanned $SRC"
            exit 1
          fi
      # ---- PR run, 또는 main fallback(소스 없음): 빌드 ----
      - name: Build image
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: frontend-admin
          file: frontend-admin/Dockerfile
          pull: true
          tags: frontend-admin:${{ github.sha }}
          load: true
          cache-from: type=registry,ref=harbor.hizero.local/dangdang/buildcache-frontend-admin:cache  # yamllint disable-line rule:line-length
          cache-to: type=registry,ref=harbor.hizero.local/dangdang/buildcache-frontend-admin:cache,mode=max,image-manifest=true,oci-mediatypes=true  # yamllint disable-line rule:line-length
      - name: Install Trivy (per-runner path)
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        if: github.event_name == 'pull_request' || steps.src.outputs.found == 'false'  # yamllint disable-line rule:line-length
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: frontend-admin:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      # ---- PR run: staging repo push(승격 소스) ----
      - name: Push to staging (build-once source)
        if: github.event_name == 'pull_request'
        run: |
          STAGING="harbor.hizero.local/dangdang/frontend-admin-staging"
          HEAD_SHA="${{ github.event.pull_request.head.sha }}"
          SHA="${{ github.sha }}"
          docker tag "frontend-admin:$SHA" "$STAGING:$HEAD_SHA"
          docker push "$STAGING:$HEAD_SHA"
      # ---- main fallback: 스캔한 이미지를 production repo로 push ----
      - name: Tag and push (main fallback, sha + latest)
        if: steps.src.outputs.found == 'false'
        run: |
          IMAGE="harbor.hizero.local/dangdang/frontend-admin"
          SHA="${{ github.sha }}"
          echo "::warning::build-once source missing - fallback build for $SHA"
          docker tag "frontend-admin:$SHA" "$IMAGE:$SHA"
          docker tag "frontend-admin:$SHA" "$IMAGE:latest"
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:latest"

  # frontend도 backend-deploy-production과 같은 이유로 production VM(10.10.10.30)에
  # SSH로 배포한다 - frontend가 dangdang-edge에서 b-gateway:8080에 닿으려면 같은
  # Docker 호스트/네트워크에 있어야 하는데, harbor VM은 그 네트워크가 아니다.
  # 트리거/always() 필요성은 backend-deploy-production과 동일(위 주석 참고).
  frontend-deploy-production:
    needs: [frontend-image-scanning, code-scanning]
    # workflow_dispatch는 deploy_target이 frontend/both일 때만 허용(backend-
    # deploy-production 주석의 2026-07-19 근거 참고 - 대상 분리로 불필요한
    # scp 실패/알람 방지).
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' &&
          (inputs.deploy_target == 'frontend' ||
            inputs.deploy_target == 'both')) ||
        (
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          needs.frontend-image-scanning.result == 'success' &&
          needs.code-scanning.result == 'success'
        )
      )
    runs-on: self-hosted
    env:
      # 2026-07-19 아침, 구 LAN IP(192.168.0.13)가 인프라 공지("당분간 병행
      # 유지")보다 먼저 죽은 걸 실측(ping "Destination Host Unreachable",
      # SSH "No route to host")으로 확인 - harbor/monitoring/DB VM은 구/신
      # IP 둘 다 살아있는데 production VM만 먼저 끊김. 새 App 계층
      # IP(10.10.10.30)로 전환.
      PROD_HOST: bruce@10.10.10.30
      FRONTEND_TAG: ${{ inputs.frontend_tag }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Determine tag
        run: |
          TAG="$FRONTEND_TAG"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Copy compose file to production VM
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          $SSH "mkdir -p ~/frontend"
          $SCP frontend/compose.production.example.yaml \
            "$PROD_HOST":~/frontend/docker-compose.yaml
          # TEMPORARY (infra/frontend/compose.lan-test-override.yaml 헤더 참고) -
          # 실제 도메인/edge proxy 생기면 이 스텝과 override 파일을 삭제할 것.
          $SCP infra/frontend/compose.lan-test-override.yaml \
            "$PROD_HOST":~/frontend/compose.lan-test-override.yaml
      - name: Ensure dangdang-edge network exists
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "docker network inspect dangdang-edge >/dev/null 2>&1 \
            || docker network create dangdang-edge"
      - name: Record previous tag
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          PREV=$($SSH "cat ~/frontend/.last-deployed-tag 2>/dev/null" || true)
          echo "PREV_TAG=$PREV" >> "$GITHUB_ENV"
          echo "Previous deployed tag: ${PREV:-<none>}"
      - name: Log in to Harbor (production VM)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 작은따옴표 대입 - robot 계정명의 '$'가 bash 변수 참조로
          # 오해석되어 문자열이 깨지는 걸 방지(하루 종일 재현됐던
          # "Invalid credentials"의 실제 원인 - 네트워크/CA 문제 아님).
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login harbor.hizero.local -u '$USR' \
            --password-stdin"
      - name: Deploy via Docker Compose (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          IMAGE="harbor.hizero.local/dangdang/frontend:$TAG"
          PUB="${{ secrets.PUBLIC_APP_URL }}"
          GW="${{ secrets.BACKEND_GATEWAY_URL }}"
          FILES="-f docker-compose.yaml -f compose.lan-test-override.yaml"
          CMD="cd ~/frontend && FRONTEND_IMAGE=$IMAGE"
          CMD="$CMD PUBLIC_APP_URL='$PUB' BACKEND_GATEWAY_URL='$GW'"
          CMD="$CMD docker compose $FILES pull"
          CMD="$CMD && FRONTEND_IMAGE=$IMAGE PUBLIC_APP_URL='$PUB'"
          CMD="$CMD BACKEND_GATEWAY_URL='$GW'"
          CMD="$CMD docker compose $FILES up -d"
          $SSH "$CMD"
      - name: Health check (container status + /b/search via gateway)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          FMT='{{.State.Health.Status}}'
          OK=""
          for i in $(seq 1 10); do
            STATUS=$($SSH "docker inspect --format '$FMT' dangdang-frontend" \
              2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              OK=1
              break
            fi
            sleep 3
          done
          if [ -z "$OK" ]; then
            echo "Container health check failed"
            exit 1
          fi
          echo "Container healthy, checking /b/search?page=1 via gateway..."
          CHECK="node -e \"fetch('http://127.0.0.1:3000/b/search?page=1')"
          CHECK="$CHECK .then(r=>{if(!r.ok)process.exit(1)})"
          CHECK="$CHECK .catch(()=>process.exit(1))\""
          if ! $SSH "docker exec dangdang-frontend $CHECK"; then
            echo "/b/search?page=1 check failed (gateway/backend routing)"
            exit 1
          fi
          echo "All checks passed"
      - name: Rollback on failed health check
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous tag: $PREV_TAG"
            IMAGE="harbor.hizero.local/dangdang/frontend:$PREV_TAG"
            PUB="${{ secrets.PUBLIC_APP_URL }}"
            GW="${{ secrets.BACKEND_GATEWAY_URL }}"
            FILES="-f docker-compose.yaml -f compose.lan-test-override.yaml"
            CMD="cd ~/frontend && FRONTEND_IMAGE=$IMAGE"
            CMD="$CMD PUBLIC_APP_URL='$PUB' BACKEND_GATEWAY_URL='$GW'"
            CMD="$CMD docker compose $FILES up -d"
            $SSH "$CMD"
          else
            echo "No previous tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-deployed
        if: success()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "echo $TAG > ~/frontend/.last-deployed-tag"

  # 2026-07-24, Admin Frontend production 배포. frontend-deploy-production과
  # 같은 방식(self-hosted 러너에서 production VM으로 SSH → 그쪽 compose로
  # pull/up)이며 트리거/always() 필요성도 동일하므로 그 job 주석을 참고할 것.
  #
  # 쇼핑몰 프론트와 결정적으로 다른 점은 "외부 노출"이다(2026-07-24 지훈 결정).
  # 요청서에는 frontend가 "호스트 포트 없이 dangdang-edge로만 열려 있다"고
  # 되어 있었지만 실제 배포 상태는 다르다 - frontend/compose.production.
  # example.yaml 원본은 expose만 있는 게 맞으나, 배포 시 항상
  # infra/frontend/compose.lan-test-override.yaml을 -f로 겹쳐 올리고 그
  # override가 3001을 호스트에 publish한다(현재 사용자 접속 경로
  # 192.168.0.56:3001이 이것). 또 b-gateway의 nginx.conf에는 프론트로 가는
  # location이 하나도 없다 - /b/*를 백엔드로 보낼 뿐이고, 오히려 프론트가
  # b-gateway를 호출하는 방향이다. 즉 프론트 구성을 문자 그대로 복제하면
  # admin도 같은 NAT 경로로 인터넷에서 닿는다.
  # 그래서 admin은 loopback(127.0.0.1)에만 publish한다 - Docker의 publish는
  # iptables DOCKER 체인에 규칙을 직접 넣어 호스트 방화벽(ufw)을 우회하므로
  # 방화벽으로 막는 접근은 신뢰할 수 없고, 공식 문서가 권고하는 해법 자체가
  # 바인딩 주소를 특정하는 것이다:
  # yamllint disable-line rule:line-length
  # https://docs.docker.com/engine/network/packet-filtering-firewalls/
  # 관리자 접속은 SSH 터널로 한다(infra/frontend-admin/ 파일 헤더 참고).
  frontend-admin-deploy-production:
    needs: [frontend-admin-image-scanning, code-scanning]
    # 2026-07-24, 여기를 backend처럼 'skipped'도 허용하도록 고치고 싶어질 수
    # 있는데(실제로 그런 제안이 있었다), 프론트에서는 그러면 배포가 깨진다.
    # backend-deploy-production이 'skipped'를 허용할 수 있는 건 그 job이
    # 서비스마다 `docker pull`을 먼저 시도해 "이번 커밋으로 빌드된 이미지가
    # 있는지" 확인하고 없으면 건너뛰는 루프를 갖고 있기 때문이다.
    # 반면 이 job은 `docker compose pull`을 무조건 실행하므로, 이미지가 없는
    # 커밋(예: compose/override만 바뀐 커밋)에서는 pull 자체가 실패한다.
    # 그래서 조건을 푸는 대신 detect-frontend의 경로 필터에 infra/ 를 넣어
    # "배포 입력이 바뀌면 이미지도 함께 빌드되게" 하는 쪽으로 해결했다
    # (그 필터 주석 참고). 조건은 'success' 단독을 유지한다.
    if: |
      always() &&
      (
        (github.event_name == 'workflow_dispatch' &&
          inputs.deploy_target == 'frontend-admin') ||
        (
          github.event_name == 'push' && github.ref == 'refs/heads/main' &&
          needs.frontend-admin-image-scanning.result == 'success' &&
          needs.code-scanning.result == 'success'
        )
      )
    runs-on: self-hosted
    env:
      PROD_HOST: bruce@10.10.10.30
      FRONTEND_ADMIN_TAG: ${{ inputs.frontend_admin_tag }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Determine tag
        run: |
          TAG="$FRONTEND_ADMIN_TAG"
          if [ -z "$TAG" ]; then TAG="${{ github.sha }}"; fi
          echo "TAG=$TAG" >> "$GITHUB_ENV"
      - name: Copy compose files to production VM
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          SCP="sshpass -e scp -o StrictHostKeyChecking=accept-new"
          $SSH "mkdir -p ~/frontend-admin"
          $SCP frontend-admin/compose.production.example.yaml \
            "$PROD_HOST":~/frontend-admin/docker-compose.yaml
          # 이 override가 loopback 바인딩을 담당한다. 쇼핑몰 프론트의
          # lan-test-override와 달리 "도메인 생기면 삭제"할 임시 파일이
          # 아니라, admin의 노출 정책 그 자체라 상시 유지한다.
          $SCP infra/frontend-admin/compose.loopback-override.yaml \
            "$PROD_HOST":~/frontend-admin/compose.loopback-override.yaml
      - name: Ensure dangdang-edge network exists
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "docker network inspect dangdang-edge >/dev/null 2>&1 \
            || docker network create dangdang-edge"
      - name: Record previous tag
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          PREV=$($SSH "cat ~/frontend-admin/.last-deployed-tag 2>/dev/null" \
            || true)
          echo "PREV_TAG=$PREV" >> "$GITHUB_ENV"
          echo "Previous deployed tag: ${PREV:-<none>}"
      - name: Log in to Harbor (production VM)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          # 작은따옴표 대입 - robot 계정명의 '$'가 bash 변수 참조로
          # 오해석되는 것 방지(frontend-deploy-production 주석 참고).
          TOKEN='${{ secrets.HARBOR_ROBOT_TOKEN }}'
          USR='${{ secrets.HARBOR_ROBOT_USER }}'
          echo "$TOKEN" | $SSH "docker login harbor.hizero.local -u '$USR' \
            --password-stdin"
      - name: Deploy via Docker Compose (SSH)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          IMAGE="harbor.hizero.local/dangdang/frontend-admin:$TAG"
          # ADMIN_PUBLIC_APP_URL Secret은 아직 없어도 된다 - admin compose가
          # 이 값에 기본값(loopback)을 두기로 했으므로, 비어 있으면 compose의
          # :- 기본값이 적용된다. 실제 도메인/edge proxy가 생기면 그때
          # Secret을 추가하면 이 job은 수정 없이 그대로 동작한다.
          PUB="${{ secrets.ADMIN_PUBLIC_APP_URL }}"
          GW="${{ secrets.BACKEND_GATEWAY_URL }}"
          FILES="-f docker-compose.yaml -f compose.loopback-override.yaml"
          CMD="cd ~/frontend-admin && FRONTEND_ADMIN_IMAGE=$IMAGE"
          CMD="$CMD ADMIN_PUBLIC_APP_URL='$PUB' BACKEND_GATEWAY_URL='$GW'"
          CMD="$CMD docker compose $FILES pull"
          CMD="$CMD && FRONTEND_ADMIN_IMAGE=$IMAGE ADMIN_PUBLIC_APP_URL='$PUB'"
          CMD="$CMD BACKEND_GATEWAY_URL='$GW'"
          CMD="$CMD docker compose $FILES up -d"
          $SSH "$CMD"
      - name: Health check (container status + gateway reachability)
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          FMT='{{.State.Health.Status}}'
          OK=""
          for i in $(seq 1 10); do
            STATUS=$($SSH "docker inspect --format '$FMT' \
              dangdang-frontend-admin" 2>/dev/null || true)
            if [ "$STATUS" = "healthy" ]; then
              OK=1
              break
            fi
            sleep 3
          done
          if [ -z "$OK" ]; then
            echo "Container health check failed"
            exit 1
          fi
          echo "Container healthy, checking b-gateway reachability..."
          # frontend의 /b/search 체크를 그대로 복제하면 안 된다 - admin이
          # 쓰는 엔드포인트(/b/admin/me 등)는 로그인 없이는 401이라 r.ok가
          # false가 되고, 정상 배포가 실패로 판정돼 롤백된다. bgateway-cutover의
          # 라우트 검증에서 2xx가 확인된 무인증 GET으로, "edge 네트워크에
          # 붙었고 게이트웨이가 응답한다"만 확인한다.
          URL="http://b-gateway:8080/b/tags/category"
          CHECK="node -e \"fetch('$URL')"
          CHECK="$CHECK .then(r=>{if(!r.ok)process.exit(1)})"
          CHECK="$CHECK .catch(()=>process.exit(1))\""
          if ! $SSH "docker exec dangdang-frontend-admin $CHECK"; then
            echo "b-gateway not reachable from admin container"
            exit 1
          fi
          echo "All checks passed"
      - name: Rollback on failed health check
        if: failure()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous tag: $PREV_TAG"
            IMAGE="harbor.hizero.local/dangdang/frontend-admin:$PREV_TAG"
            PUB="${{ secrets.ADMIN_PUBLIC_APP_URL }}"
            GW="${{ secrets.BACKEND_GATEWAY_URL }}"
            FILES="-f docker-compose.yaml -f compose.loopback-override.yaml"
            CMD="cd ~/frontend-admin && FRONTEND_ADMIN_IMAGE=$IMAGE"
            CMD="$CMD ADMIN_PUBLIC_APP_URL='$PUB' BACKEND_GATEWAY_URL='$GW'"
            CMD="$CMD docker compose $FILES up -d"
            $SSH "$CMD"
          else
            echo "No previous tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-deployed
        if: success()
        env:
          SSHPASS: ${{ secrets.PROD_VM_SSH_PASSWORD }}
        run: |
          SSH="sshpass -e ssh -o StrictHostKeyChecking=accept-new $PROD_HOST"
          $SSH "echo $TAG > ~/frontend-admin/.last-deployed-tag"

  # 2026-07-24, self-hosted 러너의 로컬 이미지 정리. 이게 없어서 실제로 디스크가
  # 찼다 - 이날 harbor VM 루트 파티션이 82% -> 94%까지 올라 Grafana의
  # "High Disk Usage"(>85%)가 06:50 UTC에 발화했고, 남은 여유가 4.2GB였다.
  # 원인은 image-scanning job들이 매 실행마다 <이름>:<커밋SHA> 이미지를 러너에
  # 남기는데 아무도 지우지 않는 것이었다(실측: SHA 태그 이미지 392개, 로컬 이미지
  # 204개/24.9GB 중 15.2GB가 회수 가능). PR 하나당 약 280MB씩 영구 적재됐다.
  # 디스크가 차면 Harbor push가 실패해 파이프라인 전체가 멈춘다.
  #
  # 태그 목록을 하드코딩하지 않고 "이번 실행의 SHA가 붙은 로컬 태그"를 통째로
  # 지운다 - 이 저장소에서 반복된 실패 원인이 하드코딩 목록 누락이라, 새 이미지
  # 태그가 추가돼도 자동으로 커버되는 방식을 택했다.
  #
  # 별도 job인 이유(각 image job 안에 넣지 않은 이유): backend는 서비스별 매트릭스라
  # 9개가 같은 SHA로 병렬 실행된다. 각자 :<SHA> 패턴으로 지우면 먼저 끝난 job이
  # 아직 스캔 중인 다른 서비스의 이미지를 지워버린다. 모든 image job이 끝난 뒤
  # 한 번만 도는 게 안전하다.
  #
  # 두 번째 스텝은 안전망이다 - 취소/중단된 실행이 남긴 잔여물은 위 SHA 기준으로
  # 안 잡히므로, 48시간 지난 미사용 이미지를 함께 정리한다(48h면 진행 중인 어떤
  # 실행의 산출물도 대상이 아니다). 빌드 속도는 영향받지 않는다 - 캐시는 로컬
  # 이미지가 아니라 Harbor registry 캐시(cache-from=type=registry)를 쓰고,
  # 베이스 이미지도 build-push-action의 pull:true로 매번 새로 받는다.
  runner-cleanup:
    needs:
      - backend-image-scanning
      - frontend-image-scanning
      - frontend-admin-image-scanning
    if: always()
    runs-on: self-hosted
    steps:
      - name: Remove this run's local build artifacts
        env:
          RUN_SHA: ${{ github.sha }}
          PR_HEAD_SHA: ${{ github.event.pull_request.head.sha }}
        run: |
          SHAS="$RUN_SHA"
          if [ -n "$PR_HEAD_SHA" ] && [ "$PR_HEAD_SHA" != "$RUN_SHA" ]; then
            SHAS="$SHAS $PR_HEAD_SHA"
          fi
          for s in $SHAS; do
            docker images --format '{{.Repository}}:{{.Tag}}' \
              | grep -E ":${s}$" \
              | while read -r img; do
                  docker image rm "$img" >/dev/null 2>&1 || true
                done
          done
          echo "cleaned local tags for: $SHAS"
      - name: Safety net - prune unused images older than 48h
        run: |
          docker image prune -a --force --filter until=48h >/dev/null 2>&1 \
            || true
          echo "--- runner disk after cleanup ---"
          df -h / | tail -1

  # needs에 없는 job이 실패하면 GitHub 기본 동작상 그 job에 의존하는 하위 job들은
  # "실패"가 아니라 "스킵"으로 처리된다 - 그러면 이 job의 needs 안에 실제 실패가
  # 하나도 안 잡혀서 failure()가 false가 되고, notify-on-failure 자체가 조용히
  # 스킵돼 Slack 알람이 아예 안 울린다(2026-07-19, 전체 job 그래프 재점검 중 발견 -
  # detect-backend/detect-frontend가 여기 없었다). 둘 다 추가해서 이 사각지대를 없앤다.
  notify-on-failure:
    needs:
      - detect-backend
      - detect-frontend
      - backend-build-test
      - frontend-build-test
      - code-scanning
      - backend-image-scanning
      - backend-checks
      - frontend-image-scanning
      - backend-deploy-production
      - frontend-deploy-production
      # 2026-07-24, Admin Frontend job 3개. 위 2026-07-19 사각지대와 정확히
      # 같은 이유로 신규 job은 반드시 여기 같이 넣어야 한다 - 빠뜨리면 admin
      # 파이프라인이 실패해도 Slack이 조용하다. (detect-frontend는 이미 위에
      # 있고 admin 감지도 그 job이 겸하므로 추가 항목이 없다.)
      - frontend-admin-build-test
      - frontend-admin-image-scanning
      - frontend-admin-deploy-production
      # 2026-07-20, bgateway-cutover 자동배포 전환에 맞춰 추가 - 자동 cutover가
      # (롤백까지 실패하는 등으로) 죽었을 때도 Slack 알람이 울리게 한다.
      - bgateway-cutover
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          DETECT_BACKEND_RESULT: ${{ needs.detect-backend.result }}
          DETECT_FRONTEND_RESULT: ${{ needs.detect-frontend.result }}
          BACKEND_TEST_RESULT: ${{ needs.backend-build-test.result }}
          FRONTEND_TEST_RESULT: ${{ needs.frontend-build-test.result }}
          CODE_SCANNING_RESULT: ${{ needs.code-scanning.result }}
          BACKEND_SCAN_RESULT: ${{ needs.backend-image-scanning.result }}
          BACKEND_CHECKS_RESULT: ${{ needs.backend-checks.result }}
          FRONTEND_SCAN_RESULT: ${{ needs.frontend-image-scanning.result }}
          BACKEND_DEPLOY_RESULT: ${{ needs.backend-deploy-production.result }}
          FRONTEND_DEPLOY_RESULT: ${{ needs.frontend-deploy-production.result }}
          ADMIN_TEST_RESULT: ${{ needs.frontend-admin-build-test.result }}
          ADMIN_SCAN_RESULT: ${{ needs.frontend-admin-image-scanning.result }}
          ADMIN_DEPLOY_RESULT: >-
            ${{ needs.frontend-admin-deploy-production.result }}
          # 2026-07-24, 브랜치명 등 컨텍스트 값을 run 스크립트에 직접 보간하지 않고
          # env를 거친다(code-scanning의 sonar-sources 스텝 주석에 근거/링크).
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_RAW: ${{ github.ref_name }}
        run: |
          REPO_URL="$SERVER_URL/$REPOSITORY"
          RUN_URL="$REPO_URL/actions/runs/$RUN_ID"
          SHA="$COMMIT_SHA"
          BRANCH="$BRANCH_RAW"
          FAILED_JOBS=""
          add_failed() {
            if [ -z "$FAILED_JOBS" ]; then
              FAILED_JOBS="$1"
            else
              FAILED_JOBS="$FAILED_JOBS, $1"
            fi
          }
          if [ "$DETECT_BACKEND_RESULT" = "failure" ]; then
            add_failed "detect-backend"
          fi
          if [ "$DETECT_FRONTEND_RESULT" = "failure" ]; then
            add_failed "detect-frontend"
          fi
          if [ "$BACKEND_TEST_RESULT" = "failure" ]; then
            add_failed "backend-build-test"
          fi
          if [ "$FRONTEND_TEST_RESULT" = "failure" ]; then
            add_failed "frontend-build-test"
          fi
          [ "$CODE_SCANNING_RESULT" = "failure" ] && add_failed "code-scanning"
          if [ "$BACKEND_SCAN_RESULT" = "failure" ]; then
            add_failed "backend-image-scanning"
          fi
          if [ "$BACKEND_CHECKS_RESULT" = "failure" ]; then
            add_failed "backend-checks"
          fi
          if [ "$FRONTEND_SCAN_RESULT" = "failure" ]; then
            add_failed "frontend-image-scanning"
          fi
          if [ "$BACKEND_DEPLOY_RESULT" = "failure" ]; then
            add_failed "backend-deploy-production"
          fi
          if [ "$FRONTEND_DEPLOY_RESULT" = "failure" ]; then
            add_failed "frontend-deploy-production"
          fi
          if [ "$ADMIN_TEST_RESULT" = "failure" ]; then
            add_failed "frontend-admin-build-test"
          fi
          if [ "$ADMIN_SCAN_RESULT" = "failure" ]; then
            add_failed "frontend-admin-image-scanning"
          fi
          if [ "$ADMIN_DEPLOY_RESULT" = "failure" ]; then
            add_failed "frontend-admin-deploy-production"
          fi
          # 2026-07-24, JSON을 문자열 결합으로 만들던 것을 jq로 바꾼다. 기존
          # `--data "{\"text\": \"$TEXT\"}"` 는 $TEXT에 큰따옴표나 역슬래시가
          # 섞이면 JSON이 깨져 알람이 통째로 안 나간다 - 실패를 알리는 경로가
          # 실패 내용 때문에 죽는 구조였다. 브랜치명에는 큰따옴표가 들어갈 수
          # 있고(git이 ref에서 금지하는 문자에 " 는 없음), 이 알람은 하필
          # 브랜치명을 본문에 넣는다. jq가 이스케이프를 책임지게 한다.
          # (ubuntu-latest 러너에 jq 기본 포함 - 공식 러너 이미지 문서)
          TEXT=":x: *${FAILED_JOBS^}* failed on \`$BRANCH\` ($SHA)"
          TEXT="$TEXT"$'\n'"<$RUN_URL|결과 보기>"
          jq -nc --arg t "$TEXT" '{text: $t}' > slack-payload.json
          curl -sf -X POST \
            -H 'Content-type: application/json' \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL"

  # 2026-07-20, 배포 "성공" 알림. 그동안 실패만 Slack에 오고 성공 배포는
  # 무소식이라, 팀원이 배포 여부를 확인하려고 Actions를 뒤지다가 PR 검증
  # run의 deploy job이 "skipped"로 표시되는 걸 보고 "배포가 안 됐다"고
  # 오해하는 일이 같은 날 두 번 반복됨(윤경님, 실측). 프로덕션 배포 성공은
  # 노이즈가 아니라 팀 전체가 알아야 할 신호이므로, 성공 시에도 무엇이
  # 어떤 커밋으로 나갔는지 한 줄 통보해 Actions 화면을 볼 필요 자체를
  # 없앤다.
  #
  # 2026-07-24, frontend-admin-deploy-production 추가. 요청서에는
  # notify-on-failure만 언급됐지만 이쪽도 needs가 배포 job 목록으로 고정이라,
  # 안 넣으면 admin만 배포된 실행에서 성공 알림이 아예 안 온다. 그러면 위
  # 2026-07-20 사례("배포됐는지 확인하려고 Actions를 뒤지다 skipped를 보고
  # 배포 안 된 줄 안다")가 admin에서 그대로 재현되므로 실패 알람과 세트로
  # 같이 넣는다.
  notify-on-deploy:
    needs:
      - backend-deploy-production
      - frontend-deploy-production
      - frontend-admin-deploy-production
      - bgateway-cutover
    if: |
      always() &&
      (needs.backend-deploy-production.result == 'success' ||
        needs.frontend-deploy-production.result == 'success' ||
        needs.frontend-admin-deploy-production.result == 'success' ||
        needs.bgateway-cutover.result == 'success')
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack (deploy success)
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BACKEND_R: ${{ needs.backend-deploy-production.result }}
          FRONTEND_R: ${{ needs.frontend-deploy-production.result }}
          ADMIN_R: ${{ needs.frontend-admin-deploy-production.result }}
          BGATEWAY_R: ${{ needs.bgateway-cutover.result }}
          # notify-on-failure와 동일한 이유로 env 경유(2026-07-24).
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          COMMIT_SHA: ${{ github.sha }}
          BRANCH_RAW: ${{ github.ref_name }}
        run: |
          REPO_URL="$SERVER_URL/$REPOSITORY"
          RUN_URL="$REPO_URL/actions/runs/$RUN_ID"
          SHA_SHORT="$(printf '%s' "$COMMIT_SHA" | cut -c1-8)"
          DEPLOYED=""
          add() { DEPLOYED="${DEPLOYED:+$DEPLOYED, }$1"; }
          [ "$BACKEND_R" = "success" ] && add "backend"
          [ "$FRONTEND_R" = "success" ] && add "frontend"
          [ "$ADMIN_R" = "success" ] && add "frontend-admin"
          [ "$BGATEWAY_R" = "success" ] && add "b-gateway"
          # JSON 조립은 notify-on-failure와 동일하게 jq로(2026-07-24, 그쪽 주석 참고).
          TEXT=":white_check_mark: *$DEPLOYED* 프로덕션 배포 완료"
          TEXT="$TEXT (\`$BRANCH_RAW\` @ $SHA_SHORT)"
          TEXT="$TEXT"$'\n'"<$RUN_URL|실행 보기>"
          jq -nc --arg t "$TEXT" '{text: $t}' > slack-payload.json
          curl -sf -X POST \
            -H 'Content-type: application/json' \
            --data @slack-payload.json \
            "$SLACK_WEBHOOK_URL"
