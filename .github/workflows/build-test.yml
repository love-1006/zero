name: Build & Test

on:
  push:
  pull_request:
    branches: [main]

# 같은 브랜치에 연달아 push되면 deploy job이 harbor VM에 동시에 두 번 돌 수 있어서
# (docker compose up이 겹치는 배포 사고로 이어질 수 있음), main push에서는 순차 실행을
# 강제하고 진행 중인 배포를 취소하지 않는다(cancel-in-progress: false).
# 반면 PR에 커밋을 연달아 push하는 경우는 배포가 아니라서 취소해도 안전한데, 기존엔
# false를 전체에 고정해둬서 옛 커밋의 실행이 self-hosted 러너 1대를 계속 붙잡고 있었다
# (공식 문서: cancel-in-progress는 github.ref/event_name 기준 조건식으로 다르게 줄 수 있음 -
# yamllint disable-line rule:line-length
# https://docs.github.com/actions/using-workflows/control-the-concurrency-of-workflows-and-jobs).
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: ${{ github.event_name == 'pull_request' }}

env:
  IMAGE_NAME: harbor.hizero.local/dangdang/ci-sandbox

# GITHUB_TOKEN 기본 권한을 워크플로 파일에 명시적으로 최소화한다. 저장소 설정(현재 read)에만
# 의존하면, 나중에 누군가 저장소 기본값을 write로 바꿀 때 이 워크플로도 같이 영향을 받는다 -
# 공식 하드닝 가이드 권고. pull-requests: read는 dorny/paths-filter가 PR의 변경 파일
# 목록을 GitHub API로 조회할 때 필요(처음엔 안 넣었다가 "Resource not accessible by
# integration" 에러로 실제 PR 실행에서 확인 후 추가함):
# yamllint disable-line rule:line-length
# https://docs.github.com/actions/security-guides/security-hardening-for-github-actions
permissions:
  contents: read
  pull-requests: read

jobs:
  # backend/ 디렉터리 존재 여부를 먼저 체크아웃해서 확인한다. job 레벨 if:는 체크아웃 전
  # (파일시스템에 아직 접근 못 하는 시점)에 평가되기 때문에 hashFiles()를 job 레벨 if:에서
  # 바로 쓸 수 없다(실제로 시도했다가 "Unrecognized function: hashFiles" 에러로 확인함) -
  # 그래서 이렇게 별도 job에서 먼저 체크아웃 후 확인해 output으로 넘기는 방식이 필요하다.
  detect-backend:
    runs-on: ubuntu-latest
    outputs:
      exists: ${{ steps.check.outputs.exists }}
      services: ${{ steps.filter.outputs.changes }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - id: check
        run: |
          if [ -d backend ] && [ -n "$(find backend -type f | head -1)" ]; then
            echo "exists=true" >> "$GITHUB_OUTPUT"
          else
            echo "exists=false" >> "$GITHUB_OUTPUT"
          fi
      # 8개 서비스 중 이번 커밋에서 실제로 파일이 바뀐 서비스만 골라 backend-build-test/
      # backend-image-scanning 매트릭스에 넘긴다. 예전엔 커밋 하나에서 서비스 1개만 고쳐도
      # 8개 전부 다시 빌드+Trivy 스캔을 돌려서, self-hosted 러너 1대에 큐가 쌓여 실제로
      # 51분까지 걸린 적이 있었음(2026-07-16 직접 확인) - dorny/paths-filter(변경 경로 기반
      # 매트릭스 생성의 공식 예시 패턴)로 필요한 것만 돌리게 줄인다.
      # v4
      - uses: dorny/paths-filter@7b450fff21473bca461d4b92ce414b9d0420d706
        id: filter
        if: steps.check.outputs.exists == 'true'
        with:
          filters: |
            admin-service: 'backend/admin-service/**'
            community-service: 'backend/community-service/**'
            diet-service: 'backend/diet-service/**'
            ingredients-service: 'backend/ingredients-service/**'
            login-service: 'backend/login-service/**'
            main-service: 'backend/main-service/**'
            product-service: 'backend/product-service/**'
            recipe-service: 'backend/recipe-service/**'

  # 내부망 접근이 필요 없는 단계 - GitHub 클라우드 러너에서 실행
  build-test:
    runs-on: ubuntu-latest
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        # v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: ci_sandbox/requirements.txt
      - name: Install dependencies
        run: pip install -r ci_sandbox/requirements.txt
      - name: Run tests
        run: pytest ci_sandbox/tests

  # backend/*-service는 아직 자체 테스트가 없어서(재헌님 인계 메모 확인, 2026-07-16 기준)
  # pytest를 강제하지 않는다 - 지금 강제하면 테스트 부재로 전부 빨간불이 되어 정작 봐야 할
  # 진짜 실패 신호가 묻힌다. 대신 의존성 설치 + import 스모크 체크로 "최소한 뜨는 코드인가"만
  # 지금 단계에서 검증하고, 테스트가 생기면 이 스텝에 pytest를 추가하면 된다.
  backend-build-test:
    # backend/ 디렉터리가 없거나(main엔 있음), 이번 커밋에서 바뀐 백엔드 서비스가 하나도
    # 없으면(예: docs만 수정) 건너뛴다. services가 빈 배열이면 매트릭스에 항목이 없어
    # 그냥 아무 것도 안 도는데, 그래도 if 조건으로 한 번 더 명시해서 의도를 분명히 한다.
    needs: detect-backend
    if: >-
      needs.detect-backend.outputs.exists == 'true' &&
      needs.detect-backend.outputs.services != '[]'
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-backend.outputs.services) }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Set up Python
        # v5
        uses: actions/setup-python@a26af69be951a213d495a4c3e4e4022e16d87065
        with:
          python-version: '3.12'
          cache: 'pip'
          cache-dependency-path: backend/${{ matrix.service }}/requirements.txt
      - name: Install dependencies
        run: pip install -r backend/${{ matrix.service }}/requirements.txt
      - name: Import smoke check
        working-directory: backend/${{ matrix.service }}
        run: python -c "import app.main"

  # 아래부터는 내부 SonarQube/Harbor에 접근해야 하므로 self-hosted(harbor VM) 러너에서 실행
  code-scanning:
    needs: build-test
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: SonarQube scan
        # v6
        uses: SonarSource/sonarqube-scan-action@fd88b7d7ccbaefd23d8f36f73b59db7a3d246602  # yamllint disable-line rule:line-length
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  # code-scanning(SonarQube, 소스 대상)과 image-scanning(Trivy, 빌드된 이미지 대상)은 서로
  # 결과를 안 쓰는데 지금까지 순차 실행이었다 - build-test 성공 후 병렬로 돌려도 되는 걸
  # 학습자료 8장에 이미 적어뒀으면서 실제로 반영은 안 하고 있었다. 이번에 반영.
  #
  # push까지 이 job 안에서 한다: self-hosted 러너는 한 번에 job 하나만 실행하고, needs로
  # 연결된 job이라도 같은 라벨의 다른 러너에 배정될 수 있다는 보장 부재가 공식적으로 확인됨
  # (러너가 1대일 때는 우연히 항상 같은 머신이라 문제가 드러나지 않았음). 그래서 원래
  # 별도 job이던 image-push를 여기로 합쳐, 빌드해서 로컬 docker에 올려둔 이미지를 같은
  # 러너 안에서 바로 push하도록 만든다 - 러너를 2대로 늘려도 안전하게.
  image-scanning:
    needs: build-test
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
      - name: Build image
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: .
          pull: true
          tags: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          load: true
          cache-from: type=gha
          cache-to: type=gha,mode=max
      # 기본 캐시 경로($GITHUB_WORKSPACE/.cache/trivy)는 actions/checkout이 매번
      # clean해서 매 job마다 취약점 DB를 새로 받고 있었다(실측: 5개 서비스 부하
      # 테스트에서 job당 2~3분 중 상당 부분이 이 다운로드였음). RUNNER_TEMP로
      # 옮기면 해결될 줄 알았으나, 실제로 재실행해서 로그를 보니("Need to update DB")
      # RUNNER_TEMP도 job이 끝나면 비워지는 걸 실측으로 확인함 - _work 트리 자체를
      # 벗어난 경로가 필요하다. harbor-runner/harbor-runner-2가 같은 VM(bruce 계정)을
      # 공유하므로 runner.name으로 러너별 경로를 분리해 동시 쓰기 충돌도 피한다.
      #
      # trivy-action은 매번 aquasecurity/setup-trivy를 호출해 바이너리를 설치하는데,
      # 이 액션의 기본 설치 경로가 $HOME/.local/bin/trivy-bin으로 고정돼 있어(경로를
      # 바꿀 입력을 trivy-action이 열어주지 않음) 두 러너가 같은 bruce 계정을 공유하는
      # 이 환경에서는 두 잡이 동시에 같은 바이너리 파일을 설치하다 "Text file busy"로
      # 충돌한다(실제로 2번 재현/재실행으로 확인함). 공식 우회: setup-trivy를 직접
      # 호출해 러너별 경로에 설치하고, trivy-action에는 skip-setup-trivy로 재설치를
      # 건너뛰게 한다(https://github.com/aquasecurity/trivy-action#custom-setup - 및
      # yamllint disable-line rule:line-length
      # aquasecurity/setup-trivy action.yaml의 skip-setup-trivy 입력 설명 참고).
      - name: Install Trivy (per-runner path)
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Push image
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # backend/*-service 이미지를 빌드+스캔하고, 통과한 것만 Harbor에 push한다(2026-07-17
  # 추가 - 그 전까지는 스캔만 하고 push가 없어서 배포 대상이 될 수 없었다). 태그는 두 개:
  # :<sha>(추적용, 불변)와 :stable(배포용, 이동 태그) - 커밋마다 바뀐 서비스만 다시
  # 빌드되므로(paths-filter 매트릭스), 안 바뀐 서비스의 :stable은 이전 그대로 유지되고
  # 바뀐 서비스만 :stable이 갱신되는 방식으로 8개 서비스의 "부분 배포"를 자연스럽게 처리한다.
  backend-image-scanning:
    needs: [detect-backend, build-test]
    if: >-
      needs.detect-backend.outputs.exists == 'true' &&
      needs.detect-backend.outputs.services != '[]'
    runs-on: self-hosted
    strategy:
      fail-fast: false
      matrix:
        service: ${{ fromJSON(needs.detect-backend.outputs.services) }}
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      # v4
      - uses: docker/setup-buildx-action@bb05f3f5519dd87d3ba754cc423b652a5edd6d2c  # yamllint disable-line rule:line-length
      - name: Build image
        # v7
        uses: docker/build-push-action@53b7df96c91f9c12dcc8a07bcb9ccacbed38856a
        with:
          context: backend/${{ matrix.service }}
          pull: true
          tags: backend-${{ matrix.service }}:${{ github.sha }}
          load: true
          cache-from: type=gha,scope=${{ matrix.service }}
          cache-to: type=gha,mode=max,scope=${{ matrix.service }}
      # image-scanning job의 같은 이름 스텝 참고 - setup-trivy 기본 설치 경로가
      # $HOME/.local/bin/trivy-bin로 고정돼 있어 harbor-runner/harbor-runner-2가
      # 동시에 스캔을 돌리면 "Text file busy"로 충돌한다(실제로 재현함). 러너별
      # 경로에 직접 설치하고 trivy-action의 재설치는 건너뛴다.
      - name: Install Trivy (per-runner path)
        # v0.2.6
        uses: aquasecurity/setup-trivy@3fb12ec12f41e471780db15c232d5dd185dcb514
        with:
          path: /home/bruce/.trivy-bin/${{ runner.name }}
      - name: Trivy vulnerability scan
        # v0.36.0
        uses: aquasecurity/trivy-action@ed142fd0673e97e23eac54620cfb913e5ce36c25
        with:
          image-ref: backend-${{ matrix.service }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'
          cache-dir: /home/bruce/.trivy-cache/${{ runner.name }}
          skip-setup-trivy: true
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Tag and push (sha + stable)
        run: |
          IMAGE="harbor.hizero.local/dangdang/backend-${{ matrix.service }}"
          SHA="${{ github.sha }}"
          LOCAL="backend-${{ matrix.service }}:$SHA"
          docker tag "$LOCAL" "$IMAGE:$SHA"
          docker tag "$LOCAL" "$IMAGE:stable"
          docker push "$IMAGE:$SHA"
          docker push "$IMAGE:stable"

  # main 병합 시에만 배포한다(PR은 배포하지 않음). backend-image-scanning이 이번 커밋에서
  # 바뀐 서비스가 없어 스킵되면(needs 기본 동작) 이 job도 자동으로 스킵된다 - 바뀐 게
  # 없으면 재배포할 것도 없으므로 의도된 동작이다. 8개 서비스를 한 스택으로 묶어
  # docker compose로 한 번에 pull/up하고, 실패 시 이전 :stable 이미지 digest로 되돌린다.
  backend-deploy:
    needs: backend-image-scanning
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    env:
      SERVICES: >-
        admin-service community-service diet-service ingredients-service
        login-service main-service product-service recipe-service
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Write runtime .env
        working-directory: infra/backend
        run: |
          cat > .env <<EOF
          POSTGRES_HOST=${{ secrets.POSTGRES_HOST }}
          POSTGRES_PORT=${{ secrets.POSTGRES_PORT }}
          POSTGRES_DB=${{ secrets.POSTGRES_DB }}
          POSTGRES_USER=${{ secrets.POSTGRES_USER }}
          POSTGRES_PASSWORD=${{ secrets.POSTGRES_PASSWORD }}
          REDIS_HOST=${{ secrets.REDIS_HOST }}
          REDIS_PORT=${{ secrets.REDIS_PORT }}
          JWT_SECRET=${{ secrets.JWT_SECRET }}
          EOF
      - name: Record previous stable digests
        working-directory: infra/backend
        run: |
          mkdir -p ~/backend-state
          for s in $SERVICES; do
            IMAGE="harbor.hizero.local/dangdang/backend-$s:stable"
            docker inspect --format '{{.Id}}' "$IMAGE" 2>/dev/null \
              > ~/backend-state/"$s".prev-digest || true
          done
      - name: Deploy via Docker Compose
        working-directory: infra/backend
        run: |
          docker compose pull
          docker compose up -d
      - name: Health check
        run: |
          declare -A PORTS=(
            [admin-service]=8001 [community-service]=8002 [diet-service]=8003
            [ingredients-service]=8004 [login-service]=8005 [main-service]=8006
            [product-service]=8007 [recipe-service]=8008
          )
          for s in $SERVICES; do
            PORT="${PORTS[$s]}"
            OK=""
            for i in $(seq 1 10); do
              if curl -fs "http://localhost:$PORT/health" >/dev/null; then
                OK=1
                break
              fi
              sleep 3
            done
            if [ -z "$OK" ]; then
              echo "Health check failed for $s (port $PORT)"
              exit 1
            fi
          done
          echo "All backend services healthy"
      - name: Rollback failed services on failed health check
        if: failure()
        working-directory: infra/backend
        run: |
          for s in $SERVICES; do
            PREV=$(cat ~/backend-state/"$s".prev-digest 2>/dev/null || true)
            if [ -n "$PREV" ]; then
              IMAGE="harbor.hizero.local/dangdang/backend-$s"
              docker tag "$PREV" "$IMAGE:stable"
            fi
          done
          docker compose up -d

  # PR을 여는 것만으로 실제 서버에 배포되면 안 되므로, main에 push(=병합)된 경우에만 배포한다.
  # github.event (객체)가 아니라 github.event_name (문자열)으로 비교해야 한다 - 공식 문서/이슈에서
  # 확인된 흔한 실수 포인트(actions/runner#950).
  deploy:
    needs: image-scanning
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5
      - name: Log in to Harbor
        # v3
        uses: docker/login-action@c94ce9fb468520275223c153574b00df6fe4bcc9
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Pull image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Record previously deployed tag
        run: |
          mkdir -p ~/ci-sandbox-state
          PREV_TAG=$(cat ~/ci-sandbox-state/last-good-tag 2>/dev/null || true)
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
          echo "Previous good tag: ${PREV_TAG:-<none>}"
      - name: Deploy via Docker Compose
        working-directory: infra/ci-sandbox
        run: IMAGE_TAG=${{ github.sha }} docker compose up -d
      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fs http://localhost:8080/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after retries"
          exit 1
      - name: Rollback on failed health check
        if: failure()
        working-directory: infra/ci-sandbox
        run: |
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous good tag: $PREV_TAG"
            IMAGE_TAG=$PREV_TAG docker compose up -d
          else
            echo "No previous good tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-good
        if: success()
        run: echo "${{ github.sha }}" > ~/ci-sandbox-state/last-good-tag

  notify-on-failure:
    needs:
      - build-test
      - backend-build-test
      - code-scanning
      - image-scanning
      - backend-image-scanning
      - deploy
      - backend-deploy
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          BACKEND_TEST_RESULT: ${{ needs.backend-build-test.result }}
          CODE_SCANNING_RESULT: ${{ needs.code-scanning.result }}
          IMAGE_SCANNING_RESULT: ${{ needs.image-scanning.result }}
          BACKEND_SCAN_RESULT: ${{ needs.backend-image-scanning.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
          BACKEND_DEPLOY_RESULT: ${{ needs.backend-deploy.result }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="$REPO_URL/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          FAILED_JOBS=""
          add_failed() {
            if [ -z "$FAILED_JOBS" ]; then
              FAILED_JOBS="$1"
            else
              FAILED_JOBS="$FAILED_JOBS, $1"
            fi
          }
          [ "$BUILD_TEST_RESULT" = "failure" ] && add_failed "build-test"
          if [ "$BACKEND_TEST_RESULT" = "failure" ]; then
            add_failed "backend-build-test"
          fi
          [ "$CODE_SCANNING_RESULT" = "failure" ] && add_failed "code-scanning"
          if [ "$IMAGE_SCANNING_RESULT" = "failure" ]; then
            add_failed "image-scanning"
          fi
          if [ "$BACKEND_SCAN_RESULT" = "failure" ]; then
            add_failed "backend-image-scanning"
          fi
          [ "$DEPLOY_RESULT" = "failure" ] && add_failed "deploy"
          if [ "$BACKEND_DEPLOY_RESULT" = "failure" ]; then
            add_failed "backend-deploy"
          fi
          TEXT=":x: *${FAILED_JOBS^}* failed on \`$BRANCH\` ($SHA)"
          TEXT="$TEXT\n<$RUN_URL|결과 보기>"
          curl -sf -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"$TEXT\"}" \
            "$SLACK_WEBHOOK_URL"
