name: Build & Test

on:
  push:
  pull_request:
    branches: [main]

# 같은 브랜치에서 연달아 push되면 deploy job이 harbor VM에 동시에 두 번 돌 수 있어서
# (docker compose up이 겹치는 배포 사고로 이어질 수 있음), 순차 실행을 강제한다.
# 진행 중인 배포를 취소하면 오히려 중간 상태로 남을 수 있어 cancel-in-progress는 false로 둔다.
concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: false

env:
  IMAGE_NAME: harbor.hizero.local/dangdang/ci-sandbox

jobs:
  # 내부망 접근이 필요 없는 단계 - GitHub 클라우드 러너에서 실행
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Install dependencies
        run: pip install -r ci_sandbox/requirements.txt
      - name: Run tests
        run: pytest ci_sandbox/tests

  # 아래부터는 내부 SonarQube/Harbor에 접근해야 하므로 self-hosted(harbor VM) 러너에서 실행
  code-scanning:
    needs: build-test
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: SonarQube scan
        uses: SonarSource/sonarqube-scan-action@v6
        env:
          SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
          SONAR_HOST_URL: ${{ vars.SONAR_HOST_URL }}

  image-scanning:
    needs: code-scanning
    runs-on: self-hosted
    steps:
      - name: Force failure (Slack alert test)
        run: exit 1
      - uses: actions/checkout@v4
      - name: Build image
        run: docker build -t ${{ env.IMAGE_NAME }}:${{ github.sha }} .
      - name: Trivy vulnerability scan
        uses: aquasecurity/trivy-action@v0.36.0
        with:
          image-ref: ${{ env.IMAGE_NAME }}:${{ github.sha }}
          severity: 'CRITICAL,HIGH'
          exit-code: '1'

  image-push:
    needs: image-scanning
    runs-on: self-hosted
    steps:
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Push image
        run: docker push ${{ env.IMAGE_NAME }}:${{ github.sha }}

  # PR을 여는 것만으로 실제 서버에 배포되면 안 되므로, main에 push(=병합)된 경우에만 배포한다.
  # github.event (객체)가 아니라 github.event_name (문자열)으로 비교해야 한다 - 공식 문서/이슈에서
  # 확인된 흔한 실수 포인트(actions/runner#950).
  deploy:
    needs: image-push
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: self-hosted
    steps:
      - uses: actions/checkout@v4
      - name: Log in to Harbor
        uses: docker/login-action@v3
        with:
          registry: harbor.hizero.local
          username: ${{ secrets.HARBOR_ROBOT_USER }}
          password: ${{ secrets.HARBOR_ROBOT_TOKEN }}
      - name: Pull image
        run: docker pull ${{ env.IMAGE_NAME }}:${{ github.sha }}
      - name: Record previously deployed tag
        run: |
          mkdir -p ~/ci-sandbox-state
          PREV_TAG=$(cat ~/ci-sandbox-state/last-good-tag 2>/dev/null || true)
          echo "PREV_TAG=$PREV_TAG" >> "$GITHUB_ENV"
          echo "Previous good tag: ${PREV_TAG:-<none>}"
      - name: Deploy via Docker Compose
        working-directory: infra/ci-sandbox
        run: IMAGE_TAG=${{ github.sha }} docker compose up -d
      - name: Health check
        run: |
          for i in $(seq 1 10); do
            if curl -fs http://localhost:8080/health; then
              echo "Health check passed"
              exit 0
            fi
            echo "Health check attempt $i failed, retrying in 3s..."
            sleep 3
          done
          echo "Health check failed after retries"
          exit 1
      - name: Rollback on failed health check
        if: failure()
        working-directory: infra/ci-sandbox
        run: |
          if [ -n "$PREV_TAG" ]; then
            echo "Rolling back to previous good tag: $PREV_TAG"
            IMAGE_TAG=$PREV_TAG docker compose up -d
          else
            echo "No previous good tag recorded - nothing to roll back to"
          fi
      - name: Record this deploy as last-good
        if: success()
        run: echo "${{ github.sha }}" > ~/ci-sandbox-state/last-good-tag

  notify-on-failure:
    needs: [build-test, code-scanning, image-scanning, image-push, deploy]
    if: failure()
    runs-on: ubuntu-latest
    steps:
      - name: Notify Slack
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          BUILD_TEST_RESULT: ${{ needs.build-test.result }}
          CODE_SCANNING_RESULT: ${{ needs.code-scanning.result }}
          IMAGE_SCANNING_RESULT: ${{ needs.image-scanning.result }}
          IMAGE_PUSH_RESULT: ${{ needs.image-push.result }}
          DEPLOY_RESULT: ${{ needs.deploy.result }}
        run: |
          REPO_URL="${{ github.server_url }}/${{ github.repository }}"
          RUN_URL="$REPO_URL/actions/runs/${{ github.run_id }}"
          SHA="${{ github.sha }}"
          BRANCH="${{ github.ref_name }}"
          FAILED_JOBS=""
          add_failed() {
            if [ -z "$FAILED_JOBS" ]; then FAILED_JOBS="$1"; else FAILED_JOBS="$FAILED_JOBS, $1"; fi
          }
          [ "$BUILD_TEST_RESULT" = "failure" ] && add_failed "build-test"
          [ "$CODE_SCANNING_RESULT" = "failure" ] && add_failed "code-scanning"
          [ "$IMAGE_SCANNING_RESULT" = "failure" ] && add_failed "image-scanning"
          [ "$IMAGE_PUSH_RESULT" = "failure" ] && add_failed "image-push"
          [ "$DEPLOY_RESULT" = "failure" ] && add_failed "deploy"
          TEXT=":x: *${FAILED_JOBS^}* failed on \`$BRANCH\` ($SHA)"
          TEXT="$TEXT\n<$RUN_URL|결과 보기>"
          curl -sf -X POST \
            -H 'Content-type: application/json' \
            --data "{\"text\": \"$TEXT\"}" \
            "$SLACK_WEBHOOK_URL"
