# 2026-07-24, 수동 배포 스택의 설정 드리프트 감시.
#
# 배경: infra/ 아래 스택 중 b-gateway만 CI 배포 경로(bgateway-cutover)가 있고,
# cadvisor/alloy-logs/sonarqube/monitoring은 사람이 VM에서 직접 `docker compose
# up -d`로 올린다. 저장소와 실제 배포본을 맞춰주는 장치가 없어서, 둘이 갈라져도
# 아무도 모른다.
#
# 실제로 이날 갈라졌다: cAdvisor du 스캔 폭주(production 루트 디스크 포화)
# 대응으로 4개 VM에 수정이 먼저 배포됐는데 PR(#155)은 열린 채로 남아, 약 1시간
# 동안 "누가 main 기준으로 재배포하면 그 사고가 재현되는" 상태였다. 점검 중
# 우연히 발견했을 뿐, 알려주는 장치가 없었다.
#
# 이 워크플로는 그 상태를 매일 한 번 자동으로 확인한다. 비교는 주석/공백을
# 제외한 "실질 설정"만 본다 - 주석 문구 차이로 알람이 울리면 금방 무시하게 되고,
# 실제로 위 사건에서도 20줄짜리 diff의 실질 차이는 한 줄뿐이었다.
#
# 한계(의도적으로 남김): self-hosted 러너가 harbor VM에 있어 그 VM의 스택만
# 검사한다. monitoring VM은 harbor에서 SSH 키 인증이 안 되고(실측: publickey
# denied), 그걸 뚫으려면 VM 간 신뢰 경로를 새로 만들어야 해서 별도 결정이 필요하다.
# 근본 해결은 이 스택들도 b-gateway처럼 CI 배포로 돌리는 것이고, 쿠버네티스
# 이관 때 함께 정리하는 게 맞다.
name: Infra Drift Check

on:
  schedule:
    # 매일 23:00 UTC = 08:00 KST. 업무 시작 시점에 결과가 나와 있게 한다.
    # (공식 문서상 schedule은 정확 보장이 아니라 최선 노력 - 일 1회 점검엔 충분)
    - cron: '0 23 * * *'
  workflow_dispatch: {}

# 저장소 파일을 읽기만 한다.
permissions:
  contents: read

jobs:
  drift-check:
    runs-on: self-hosted
    steps:
      # v4
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5

      # 검사 대상을 손으로 나열하지 않는다. 이 저장소에서 반복된 사고 원인이
      # "하드코딩 목록에 새 항목을 안 넣어서 조용히 누락"이라, 실행 중인
      # 컨테이너의 compose 라벨에서 배포 위치를 직접 읽어온다.
      # 그 위치를 저장소 경로로 매핑하는 표만 유지하면 되고, 표에 없는 스택이
      # 발견되면 "관리 밖"으로 보고한다(조용히 빠지지 않게).
      # 2026-07-24 2차: 검사 범위를 harbor VM 밖으로 넓힌다.
      # 1차 구현은 러너가 있는 harbor VM만 봤는데, 정작 이날 드리프트가 생긴
      # cAdvisor는 harbor/production/DB 3곳에 배포돼 있어서 2곳이 깜깜했다.
      # production/DB는 이미 있는 시크릿(PROD_VM_SSH_PASSWORD, DB_VM_SSH_PASSWORD)
      # 으로 도달 가능하므로 추가 자격증명 없이 100% 커버가 된다.
      # 읽기 전용(cat/docker inspect)이라 대상 VM에 영향이 없다.
      #
      # DB VM 계정명은 아직 워크플로에서 쓰인 적이 없어 미검증이다 - 접속 실패는
      # job 실패가 아니라 UNREACHABLE 보고로 처리해서, 첫 실행이 실증 자료가
      # 되게 한다(한 대가 안 닿는다고 나머지 점검이 죽으면 안 된다).
      - name: Compare deployed stacks against repo
        id: drift
        env:
          PROD_PW: ${{ secrets.PROD_VM_SSH_PASSWORD }}
          DB_PW: ${{ secrets.DB_VM_SSH_PASSWORD }}
        run: |
          # 배포 디렉터리의 basename -> 저장소 경로. VM마다 경로가 달라도
          # basename 규약은 같아서, 절대경로 대신 이걸로 매핑한다.
          MAP="cadvisor|infra/cadvisor/docker-compose.yml
          alloy|infra/alloy-logs/docker-compose.yml
          sonarqube|infra/sonarqube/docker-compose.yml
          monitoring|infra/monitoring/docker-compose.yml"
          # CI가 배포하는 스택 - 손으로 안 만지는 게 전제라 여기선 제외한다
          # (b-gateway는 bgateway-cutover, backend/frontend류는 deploy job).
          CI_MANAGED="backend frontend frontend-admin b-gateway"
          # Harbor 제품 자체 설치본은 이 저장소가 소유하지 않는다(./prepare가 생성).
          EXTERNAL="harbor"

          strip() { grep -vE '^[[:space:]]*#|^[[:space:]]*$' "$1"; }

          REPORT=""
          add() { REPORT="${REPORT}${1}"$'\n'; }

          # 배포 위치 열거는 로컬/원격 모두 "같은 한 줄짜리 명령 문자열"을
          # 실행한다. 원격에서 인자를 쪼개 넘기면 Go 템플릿의 큰따옴표를
          # 원격 쉘이 한 번 더 벗겨내 템플릿이 깨진다 - 문자열째 넘겨서
          # 원격 쉘이 딱 한 번만 파싱하게 한다.
          WD='com.docker.compose.project.working_dir'
          ENUM='docker ps --format "{{.Names}}" | while read -r c; do
            docker inspect "$c" --format "{{index .Config.Labels \"'"$WD"'\"}}"
            2>/dev/null; done | grep -v "^$" | sort -u'
          ENUM=$(printf '%s' "$ENUM" | tr '\n' ' ')

          # $1=RUN 접두(빈 값이면 로컬), $2=명령 문자열
          run_cmd() {
            if [ -n "$1" ]; then $1 "$2"; else sh -c "$2"; fi
          }

          # $1=표시이름 $2=원격접속 접두(빈 값이면 로컬)
          check_vm() {
            vm="$1"; RUN="$2"
            if [ -n "$RUN" ] && ! $RUN true >/dev/null 2>&1; then
              add "UNREACHABLE: $vm (SSH 실패 - 계정/자격증명 확인 필요)"
              return 0
            fi
            dirs=$(run_cmd "$RUN" "$ENUM" 2>/dev/null)
            for dir in $dirs; do
              name=$(basename "$dir")
              case " $EXTERNAL " in *" $name "*) continue ;; esac
              case " $CI_MANAGED " in *" $name "*) continue ;; esac
              repo=$(printf '%s\n' "$MAP" | sed 's/^[[:space:]]*//' \
                | awk -F'|' -v d="$name" '$1==d {print $2}')
              if [ -z "$repo" ]; then
                add "UNMANAGED: $vm:$dir (저장소 매핑 없음 - 표에 추가 필요)"
                continue
              fi
              if [ ! -f "$repo" ]; then
                add "MISSING: $repo 가 저장소에 없음 (배포: $vm:$dir)"
                continue
              fi
              tmp="/tmp/drift-live.$$"
              if ! run_cmd "$RUN" "cat '$dir/docker-compose.yml'" \
                   > "$tmp" 2>/dev/null || [ ! -s "$tmp" ]; then
                add "MISSING: $vm:$dir/docker-compose.yml 를 읽을 수 없음"
                rm -f "$tmp"
                continue
              fi
              if ! diff -q <(strip "$tmp") <(strip "$repo") >/dev/null; then
                n=$(diff <(strip "$tmp") <(strip "$repo") | grep -c '^[<>]')
                add "DRIFT: $vm:$dir vs $repo (실질 차이 ${n}줄)"
              fi
              rm -f "$tmp"
            done
          }

          SSHOPT="-o StrictHostKeyChecking=accept-new -o ConnectTimeout=10"
          check_vm "harbor" ""
          # sshpass는 SSHPASS 환경변수를 읽는다(-p 인자 노출 회피, 기존
          # build-test.yml 배포 job과 동일 방식). 함수 호출 앞 인라인 대입은
          # 함수에 확실히 전달된다는 보장이 없어 export로 명시한다.
          export SSHPASS="$PROD_PW"
          check_vm "production" "sshpass -e ssh $SSHOPT bruce@10.10.10.30"
          export SSHPASS="$DB_PW"
          check_vm "db" "sshpass -e ssh $SSHOPT zero@10.10.20.10"
          unset SSHPASS

          if [ -n "$REPORT" ]; then
            printf '%s\n' "$REPORT"
            {
              echo "found=true"
              echo "report<<EOF"
              printf '%s\n' "$REPORT"
              echo "EOF"
            } >> "$GITHUB_OUTPUT"
          else
            echo "모든 배포 스택이 저장소와 일치"
            echo "found=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Notify Slack on drift
        if: steps.drift.outputs.found == 'true'
        env:
          SLACK_WEBHOOK_URL: ${{ secrets.SLACK_WEBHOOK_URL }}
          SERVER_URL: ${{ github.server_url }}
          REPOSITORY: ${{ github.repository }}
          RUN_ID: ${{ github.run_id }}
          REPORT: ${{ steps.drift.outputs.report }}
        run: |
          RUN_URL="$SERVER_URL/$REPOSITORY/actions/runs/$RUN_ID"
          TEXT=":warning: *인프라 드리프트* - harbor VM 배포본이 main과 다릅니다"
          TEXT="$TEXT"$'\n'"$REPORT"
          TEXT="$TEXT"$'\n'"배포된 변경이 아직 머지 안 됐거나,"
          TEXT="$TEXT 저장소 변경이 아직 배포 안 된 상태입니다."
          TEXT="$TEXT"$'\n'"<$RUN_URL|실행 보기>"
          # 문자열 결합 대신 jq로 JSON을 만든다(build-test.yml의 알람과 동일 이유 -
          # 본문에 따옴표류가 섞이면 payload가 깨져 알람이 통째로 안 나간다).
          jq -nc --arg t "$TEXT" '{text: $t}' > slack-payload.json
          curl -sf -X POST -H 'Content-type: application/json' \
            --data @slack-payload.json "$SLACK_WEBHOOK_URL"
