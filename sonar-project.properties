sonar.projectKey=zerocheck
sonar.projectName=ZeroCheck
# sonar.sources는 build-test.yml의 code-scanning job이 frontend/backend 존재 여부를 보고
# -Dsonar.sources로 동적으로 넘긴다(둘 다 없는 브랜치는 없다고 가정) - 여기서 고정하지 않는다.
sonar.python.version=3.12
sonar.exclusions=frontend/node_modules/**,frontend/.next/**,frontend/public/**
# 2026-07-20, PR #51에서 New Code 중복률 20%로 Quality Gate 실패(기준 3%) - 원인은
# backend/*/app/core/config.py들이 서로 거의 동일한 pydantic Settings boilerplate라서.
# 진짜 root cause는 각 서비스의 Docker 빌드 컨텍스트가 backend/${{ matrix.service }}로
# 완전히 격리돼 있어(build-test.yml) 서비스 간에 실제 코드를 import로 공유할 수 없다는
# 구조적 제약 - 이 상태에서 shared 모듈로 뽑으려면 8개 서비스 전부의 Docker 빌드
# 컨텍스트/Dockerfile을 바꿔야 해서 리스크가 훨씬 큼. 마이크로서비스에서 배포 독립성을
# 위해 설정 boilerplate를 의도적으로 각자 들고 있는 건 흔히 받아들여지는 트레이드오프라,
# 공식 문서(docs.sonarsource.com CPD exclusions)가 제공하는 정식 메커니즘으로 이 파일
# 패턴만 중복 검사 대상에서 제외한다 - 이 PR 한정 우회가 아니라, 앞으로 어떤 서비스의
# config.py를 고쳐도 똑같이 걸리는 문제 자체를 프로젝트 차원에서 없앤 것.
sonar.cpd.exclusions=backend/*/app/core/config.py
