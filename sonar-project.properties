sonar.projectKey=zerocheck
sonar.projectName=ZeroCheck
# sonar.sources는 build-test.yml의 code-scanning job이 frontend/backend 존재 여부를 보고
# -Dsonar.sources로 동적으로 넘긴다(둘 다 없는 브랜치는 없다고 가정) - 여기서 고정하지 않는다.
sonar.python.version=3.12
sonar.exclusions=frontend/node_modules/**,frontend/.next/**,frontend/public/**
