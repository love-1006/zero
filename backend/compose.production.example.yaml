# 8개 backend 서비스를 한 번에 구동한다. Harbor(192.168.0.53/dangdang-backend/*)에
# 올라간 이미지를 그대로 pull해서 쓴다 — 로컬 빌드 안 함.
# (2026-07-18 인프라 네트워크 재구성 공지 — Harbor/CICD 새 주소는 10.10.10.20.
# 예전 192.168.0.51은 사실 모니터링 서버 주소였고, 실제 Harbor는 192.168.0.53이었음.
# 옛 192.168.0.x 대역은 당분간 병행 유지된다고 해서, 이미지 레지스트리 주소는
# 아직 192.168.0.53 그대로 두고 팀 결정에 따라 나중에 순차 전환 예정 — DB/Redis
# 주소(아래)만 먼저 10.10.20.10으로 반영함.)
#
# 사전 준비: backend/.env.example을 backend/.env로 복사해 실제 값(POSTGRES_*,
# JWT_SECRET 등)을 채운다. 9개 서비스가 이 파일 하나를 공유해서 읽는다(통합 env
# — 아래 "통합 env" 절 참고). Postgres/Redis는 이 파일에서 컨테이너로 띄우지
# 않는다 — 전 서비스가 공유 원격 인스턴스(10.10.20.10:5432, 10.10.20.10:6379)를
# 쓰기 때문에(.env.example 참고), 여기서 로컬 DB를 새로 띄우면 오히려 실제 데이터와
# 어긋난다.
#
# 실행: docker compose -f backend/docker-compose.yaml pull && \
#      docker compose -f backend/docker-compose.yaml up -d
# 특정 태그 고정: TAG=<sha 등> docker compose -f backend/docker-compose.yaml \
#   up -d (미지정 시 latest)
#
# 런타임 하드닝은 docs/ops/Backend_Dockerfile_하드닝_템플릿.md의 "컨테이너 실행
# 시점 하드닝" 절(= infra/ci-sandbox/docker-compose.yml과 동일 기준)을 그대로
# 따른다.
#
# 2026-07-20, 이 파일은 원래 git 추적 대상이 아니라 production VM에만
# 존재했다 - PR #52(ai 서비스 추가)가 이미지는 build+push했는데 이 파일에
# "ai" 블록이 없어서 배포 마지막 단계가 "no such service: ai"로 실패했다.
# frontend(compose.production.example.yaml, CI가 매 배포마다 scp)와 같은
# 패턴으로 git 추적 + 자동 동기화하도록 전환 - 새 서비스 추가가 계속
# 있을 예정이라, 다음부터는 이 파일을 고치는 PR 리뷰에서 누락이 바로
# 보이고, CI가 production에 자동으로 반영한다.
x-hardening: &hardening
  restart: unless-stopped
  cap_drop:
    - ALL
  security_opt:
    - no-new-privileges:true
  read_only: true
  tmpfs:
    - /tmp
  environment:
    - PYTHONDONTWRITEBYTECODE=1
  mem_limit: 256m
  cpus: 0.5
  pids_limit: 100
  logging:
    driver: json-file
    options:
      max-size: "10m"
      max-file: "3"

services:
  login-service:
    image: 192.168.0.53/dangdang-backend/login-service:${TAG:-latest}
    container_name: login-service
    env_file: ./.env
    # 2026-07-20, OTel 계측 파일럿 - login-service 하나로 먼저 검증
    # (otel-guide.md 참고). Alloy 없이 Tempo(4318)/Loki(3100)/
    # Prometheus(9090) OTLP 엔드포인트로 직접 전송한다. 재헌님이
    # requirements.txt/Dockerfile에 계측 코드를 추가하기 전까지는
    # 이 env들은 아무 효과 없음(SDK 자체가 없어서) - 코드 쪽 PR과
    # 같이 반영되는 걸 전제로 미리 넣어둔다.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - OTEL_SERVICE_NAME=login-service
      - OTEL_EXPORTER_OTLP_TRACES_ENDPOINT=http://10.10.10.40:4318/v1/traces
      - OTEL_EXPORTER_OTLP_TRACES_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_LOGS_ENDPOINT=http://10.10.10.40:3100/otlp/v1/logs
      - OTEL_EXPORTER_OTLP_LOGS_PROTOCOL=http/protobuf
      - OTEL_TRACES_EXPORTER=otlp
      - OTEL_LOGS_EXPORTER=otlp
      - OTEL_METRICS_EXPORTER=otlp
      - OTEL_EXPORTER_OTLP_METRICS_ENDPOINT=http://10.10.10.40:9090/api/v1/otlp/v1/metrics
      - OTEL_EXPORTER_OTLP_METRICS_PROTOCOL=http/protobuf
      - OTEL_PYTHON_LOG_CORRELATION=true
    ports:
      - "8000:8000"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  admin-service:
    image: 192.168.0.53/dangdang-backend/admin-service:${TAG:-latest}
    container_name: admin-service
    env_file: ./.env
    ports:
      - "8008:8008"
    <<: *hardening

  # 2026-07-20, PR #52(MN-0111)로 추가된 AI 챗봇 서비스. 필요 env는
  # backend/ai/.env.example 참고(JWT_SECRET/BEDROCK_*/POSTGRES_* 등) -
  # 다른 서비스와 동일하게 통합 .env 하나를 공유해서 읽는다.
  ai:
    image: 192.168.0.53/dangdang-backend/ai:${TAG:-latest}
    container_name: ai
    env_file: ./.env
    volumes:
      - ${HOME}/.aws:/home/appuser/.aws:ro   # Bedrock 자격증명(non-root 유저 appuser의 홈)
    ports:
      - "8022:8022"
    <<: *hardening

  main-service:
    image: 192.168.0.53/dangdang-backend/main-service:${TAG:-latest}
    container_name: main-service
    env_file: ./.env
    ports:
      - "8010:8010"
    <<: *hardening

  community-service:
    image: 192.168.0.53/dangdang-backend/community-service:${TAG:-latest}
    container_name: community-service
    env_file: ./.env
    ports:
      - "8012:8012"
    <<: *hardening

  recipe-service:
    image: 192.168.0.53/dangdang-backend/recipe-service:${TAG:-latest}
    container_name: recipe-service
    env_file: ./.env
    ports:
      - "8014:8014"
    <<: *hardening

  product-service:
    image: 192.168.0.53/dangdang-backend/product-service:${TAG:-latest}
    container_name: product-service
    env_file: ./.env
    ports:
      - "8016:8016"
    <<: *hardening

  ingredients-service:
    image: 192.168.0.53/dangdang-backend/ingredients-service:${TAG:-latest}
    container_name: ingredients-service
    env_file: ./.env
    ports:
      - "8018:8018"
    <<: *hardening

  diet-service:
    image: 192.168.0.53/dangdang-backend/diet-service:${TAG:-latest}
    container_name: diet-service
    env_file: ./.env
    # .env의 PRODUCT_SERVICE_URL은 로컬 단독 실행 기준(localhost:8016)이라,
    # 같은 compose 네트워크 안에서는 컨테이너명으로 덮어써야 한다.
    environment:
      - PYTHONDONTWRITEBYTECODE=1
      - PRODUCT_SERVICE_URL=http://product-service:8016
    depends_on:
      product-service:
        condition: service_healthy
    ports:
      - "8020:8020"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

  # /b/ 프리픽스 게이트웨이 — harbor-template에서 검증 완료된 구성 그대로.
  # POST /admin(product-service 상품관리 vs ingredients-service 태그관리)과
  # /community/gam-list(community-service vs ingredients-service)는 두 서비스가
  # 실제로 같은 경로를 쓰고 있어서 생기는 임시 워크어라운드다 — gateway/nginx.conf
  # 주석과 services/알릴거.md 참고. 근본 해결(경로 분리)은 별도 작업.
  b-gateway:
    image: openresty/openresty:alpine
    container_name: b-gateway
    volumes:
      - ./gateway/nginx.conf:/usr/local/openresty/nginx/conf/nginx.conf:ro
    ports:
      - "8080:8080"
    # default(backend_default)만으로는 frontend가 컨테이너명 b-gateway를 못
    # 찾는다 — frontend는 dangdang-edge에 있다. 이게 없으면 compose로 재기동할
    # 때마다 frontend<->b-gateway 연결이 끊긴다(2026-07-20 발견).
    networks:
      - default
      - dangdang-edge
    depends_on:
      login-service: { condition: service_healthy }
      admin-service: { condition: service_healthy }
      main-service: { condition: service_healthy }
      community-service: { condition: service_healthy }
      recipe-service: { condition: service_healthy }
      product-service: { condition: service_healthy }
      ingredients-service: { condition: service_healthy }
      diet-service: { condition: service_healthy }
    restart: unless-stopped
    cap_drop:
      - ALL
    # docker-openresty 엔트리포인트가 시작 시 임시 디렉터리를 nobody(65534)로
    # chown하고 워커 프로세스 권한을 낮추는 데 필요한 최소 권한만 다시 부여한다.
    cap_add:
      - CHOWN
      - SETUID
      - SETGID
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp
      - /var/run/openresty
      - /usr/local/openresty/nginx/logs
      - /usr/local/openresty/nginx/client_body_temp
      - /usr/local/openresty/nginx/proxy_temp
      - /usr/local/openresty/nginx/fastcgi_temp
      - /usr/local/openresty/nginx/uwsgi_temp
      - /usr/local/openresty/nginx/scgi_temp
    mem_limit: 128m
    cpus: 0.3
    pids_limit: 50
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# dangdang-edge는 frontend가 만드는 외부 네트워크 — 여기서는 참조만 하고
# 소유하지 않는다. 다른 서비스는 top-level networks 선언이 없어도 계속
# 기존 default(backend_default) 네트워크에 자동으로 붙는다.
networks:
  dangdang-edge:
    external: true
