      - OTEL_EXPORTER_OTLP_METRICS_PROTOCOL=http/protobuf
      - OTEL_PYTHON_LOG_CORRELATION=true
    depends_on:
      product-service:
        condition: service_healthy
    ports:
      - "127.0.0.1:8020:8020"
    restart: unless-stopped
    cap_drop:
      - ALL
    security_opt:
      - no-new-privileges:true
    read_only: true
    tmpfs:
      - /tmp:rw,noexec,nosuid
    mem_limit: 256m
    cpus: 0.5
    pids_limit: 100
    logging:
      driver: json-file
      options:
        max-size: "10m"
        max-file: "3"

# 2026-07-24, b-gateway 서비스 정의를 이 파일에서 제거했다.
#
# 이 파일이 정의하던 b-gateway는 실제 운영본과 달랐다:
#   - 여기: openresty 공식 이미지 + ./gateway/nginx.conf 볼륨 마운트 + root 실행
#     (cap_add로 CHOWN/SETUID/SETGID 재부여)
#   - 실제: infra/b-gateway/ (Dockerfile로 nginx.conf를 이미지에 굽고 USER 101
#     non-root 실행). bgateway-cutover job이 이걸 배포하며, 그게 유일한 배포 경로.
# 게다가 여기가 참조하는 ./gateway/nginx.conf 는 이 저장소에 존재하지도 않는다.
#
# 문제는 이 파일이 backend-deploy-production에 의해 매 배포마다 production VM의
# ~/backend/docker-compose.yaml 로 덮어써진다는 점이다. 즉 낡은(root 실행) 정의가
# 배포 때마다 production에 다시 심어지고 있었고, 누군가 ~/backend에서 서비스 단위가
# 아닌 전체 `docker compose up -d`를 한 번만 실행하면 2026-07-19에 적용한 non-root
# 하드닝이 조용히 원복되는 경로였다. b-gateway는 컨테이너명도 프로젝트명(backend)도
# 같아서 compose가 자기 관리 대상으로 인식한다.
#
# 소유권을 infra/b-gateway/ 한 곳으로 정리한다. 실행 중인 b-gateway 컨테이너에는
# 영향이 없다(배포는 `up -d --no-deps <service>`로 서비스 단위 실행이라 b-gateway를
# 건드리지 않는다). 다만 이 파일로 compose를 돌리면 b-gateway가 이 프로젝트의
# "orphan container"로 경고에 뜬다 - 제거하지 않는 한 실행에는 영향 없고, 오히려
# 소유자가 다른 파일임을 드러내주는 신호라 그대로 둔다(--remove-orphans 금지).
#
# top-level networks(dangdang-edge)도 함께 제거했다 - b-gateway가 유일한 참조자였고,
# 나머지 서비스는 선언 없이 default(backend_default)에 자동으로 붙는다.
